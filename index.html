<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#05080f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Nodnalb">
<title>Nodnalb</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#05080f;--surf:#090d17;--surf2:#0d1220;--brd:#1a2035;--brd2:#243050;
  --gold:#e8b84b;--golddim:#7a5f1e;--acc:#4dc4ff;--accdim:#1a4a6a;
  --green:#4dff9a;--red:#ff4d6a;--purple:#c47dff;
  --txt:#c8d8f0;--dim:#4a5878;--dimmer:#2a3348;
  --r0:#787878;--r1:#60a860;--r2:#4a8adc;--r3:#b060e8;--r4:#ff9a30;--r5:#ff3060;--r6:#ffe040;
  --font:'Rajdhani',sans-serif;--font2:'Exo 2',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:var(--font);}
body{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;position:relative;}

/* ── HEADER ── */
#hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 14px;padding-top:max(8px,env(safe-area-inset-top));
  background:var(--surf);border-bottom:1px solid var(--brd);flex-shrink:0;
  gap:8px;
}
#logo{font-size:1.1rem;letter-spacing:5px;font-weight:700;color:var(--gold);
  text-shadow:0 0 16px rgba(232,184,75,.5);text-transform:uppercase;}
.hbar{display:flex;align-items:center;gap:10px;}
.hstat{display:flex;flex-direction:column;align-items:center;line-height:1;}
.hstat-lbl{font-size:.55rem;letter-spacing:1px;color:var(--dim);text-transform:uppercase;}
.hstat-val{font-size:.95rem;font-weight:700;}
.hstat-val.gold{color:var(--gold);}
.hstat-val.acc{color:var(--acc);}
.hstat-val.grn{color:var(--green);}
#lvl-bar-wrap{width:40px;height:4px;background:var(--dimmer);border-radius:2px;margin-top:2px;}
#lvl-bar{height:4px;background:var(--acc);border-radius:2px;transition:width .4s;}

/* ── TABS ── */
#tabs{display:flex;background:var(--surf);border-bottom:1px solid var(--brd);flex-shrink:0;}
.tab{flex:1;padding:8px 4px;text-align:center;font-size:.7rem;letter-spacing:1.5px;
  text-transform:uppercase;cursor:pointer;color:var(--dim);transition:color .2s,border-color .2s;
  border-bottom:2px solid transparent;font-family:var(--font);font-weight:600;position:relative;}
.tab.on{color:var(--gold);border-bottom-color:var(--gold);}
.tab-badge{position:absolute;top:4px;right:6px;background:var(--red);color:#fff;
  font-size:.5rem;border-radius:10px;padding:1px 4px;font-weight:700;}

/* ── VIEWS ── */
.view{display:none;flex:1;overflow:hidden;flex-direction:column;min-height:0;}
.view.on{display:flex;}
.scroll-view{flex:1;overflow-y:auto;padding:10px 12px;overscroll-behavior:contain;}
.scroll-view::-webkit-scrollbar{width:4px;}
.scroll-view::-webkit-scrollbar-track{background:var(--bg);}
.scroll-view::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:2px;}

/* ── GAME VIEW ── */
#cwrap{flex:1;position:relative;min-height:0;}
#c{position:absolute;top:0;left:0;width:100%;height:100%;}
#hint-overlay{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);
  font-size:.6rem;color:var(--dim);pointer-events:none;white-space:nowrap;
  font-family:var(--font2);font-style:italic;}

/* ── ROLL BAR ── */
#rollbar{
  padding:8px 12px;background:var(--surf);border-top:1px solid var(--brd);
  display:flex;align-items:center;gap:8px;flex-shrink:0;
  padding-bottom:max(8px,env(safe-area-inset-bottom));
}
#rbtn{
  flex:1;background:linear-gradient(135deg,#3a2c08,var(--gold) 45%,#5a4010 55%,#3a2c08);
  border:none;color:#04060a;padding:12px;font-size:.95rem;font-family:var(--font);
  letter-spacing:3px;text-transform:uppercase;font-weight:700;cursor:pointer;border-radius:6px;
  box-shadow:0 0 20px rgba(232,184,75,.25);transition:box-shadow .2s,opacity .2s,transform .1s;}
#rbtn:hover:not(:disabled){box-shadow:0 0 35px rgba(232,184,75,.5);}
#rbtn:active:not(:disabled){transform:scale(.97);}
#rbtn:disabled{opacity:.3;cursor:not-allowed;}
.roll-info{display:flex;flex-direction:column;align-items:flex-end;min-width:60px;}
.roll-cost{font-size:.7rem;color:var(--dim);letter-spacing:1px;}
.roll-timer{font-size:.65rem;color:var(--golddim);}

/* ── SECTION HEADERS ── */
.sec-hdr{font-size:.7rem;letter-spacing:3px;text-transform:uppercase;color:var(--dim);
  padding:8px 0 5px;border-bottom:1px solid var(--brd);margin-bottom:8px;font-weight:600;}

/* ── CARDS ── */
.card{background:var(--surf);border:1px solid var(--brd);border-radius:8px;padding:10px;margin-bottom:8px;}
.card-title{font-size:.8rem;font-weight:700;letter-spacing:1px;margin-bottom:4px;}

/* ── GALLERY ── */
.ggrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:7px;}
.gi{background:var(--surf);border-radius:8px;padding:6px 4px;text-align:center;
  cursor:pointer;border:1px solid;transition:transform .15s,box-shadow .15s;}
.gi:active{transform:scale(.95);}
.gi canvas{display:block;margin:0 auto;}
.gi .gn{font-size:.58rem;color:var(--dim);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--font2);}
.gi .gc{font-size:.7rem;color:var(--gold);font-weight:700;}
.gi .gv{font-size:.58rem;color:var(--green);}
.r0{border-color:#444;}.r1{border-color:#4a784a;}.r2{border-color:#2a5aaa;}
.r3{border-color:#7040b0;}.r4{border-color:#c07020;}.r5{border-color:#c02050;box-shadow:0 0 6px rgba(255,48,96,.2);}
.r6{border-color:#d0b000;box-shadow:0 0 10px rgba(255,224,64,.3);}

/* ── WORKSHOP ── */
.recipe-card{background:var(--surf);border:1px solid var(--brd);border-radius:8px;
  padding:10px;margin-bottom:8px;display:flex;align-items:center;gap:10px;}
.recipe-card.can{border-color:var(--accdim);cursor:pointer;transition:border-color .2s,background .2s;}
.recipe-card.can:hover{border-color:var(--acc);background:var(--surf2);}
.recipe-card:active{transform:scale(.98);}
.rec-inputs{display:flex;align-items:center;gap:4px;flex-wrap:wrap;flex:1;}
.rec-arrow{font-size:1rem;color:var(--dim);flex-shrink:0;}
.rec-out{text-align:center;min-width:52px;}
.rec-out canvas{display:block;margin:0 auto;}
.rec-out .rec-name{font-size:.58rem;color:var(--txt);margin-top:2px;}
.rec-item{text-align:center;}
.rec-item canvas{display:block;margin:0 auto;}
.rec-item .ri-name{font-size:.52rem;color:var(--dim);}
.rec-item .ri-cnt{font-size:.6rem;font-weight:700;}
.ri-cnt.ok{color:var(--green);}
.ri-cnt.no{color:var(--red);}
.craft-btn{background:var(--accdim);color:var(--acc);border:1px solid var(--acc);
  border-radius:5px;padding:6px 10px;font-size:.7rem;font-family:var(--font);
  letter-spacing:1px;cursor:pointer;font-weight:700;flex-shrink:0;transition:background .2s;}
.craft-btn:hover{background:var(--acc);color:#000;}
.craft-btn:disabled{opacity:.3;cursor:not-allowed;}

/* ── SHOP / UPGRADES ── */
.upg-card{background:var(--surf);border:1px solid var(--brd);border-radius:8px;
  padding:10px;margin-bottom:8px;display:flex;align-items:center;gap:10px;cursor:pointer;
  transition:border-color .2s,background .2s;}
.upg-card:hover{border-color:var(--brd2);background:var(--surf2);}
.upg-card.maxed{opacity:.4;cursor:default;}
.upg-icon{font-size:1.4rem;width:36px;text-align:center;flex-shrink:0;}
.upg-body{flex:1;}
.upg-name{font-size:.85rem;font-weight:700;letter-spacing:.5px;}
.upg-desc{font-size:.65rem;color:var(--dim);margin-top:2px;font-family:var(--font2);}
.upg-lvl{font-size:.6rem;color:var(--acc);}
.upg-cost{text-align:right;flex-shrink:0;}
.upg-cost-val{font-size:.82rem;font-weight:700;color:var(--gold);}
.upg-cost-lbl{font-size:.55rem;color:var(--dim);}

.powerup-card{background:var(--surf);border:1px solid var(--brd);border-radius:8px;
  padding:10px;margin-bottom:8px;display:flex;align-items:center;gap:10px;cursor:pointer;
  transition:border-color .2s;}
.powerup-card:hover{border-color:var(--purple);}
.pu-active{border-color:var(--purple);background:rgba(196,125,255,.08);}

/* ── MISSIONS ── */
.miss-card{background:var(--surf);border:1px solid var(--brd);border-radius:8px;
  padding:10px;margin-bottom:8px;}
.miss-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.miss-name{font-size:.82rem;font-weight:700;}
.miss-rew{font-size:.72rem;color:var(--gold);font-weight:700;}
.miss-desc{font-size:.65rem;color:var(--dim);margin-bottom:6px;font-family:var(--font2);}
.miss-bar-wrap{background:var(--dimmer);border-radius:3px;height:5px;margin-bottom:4px;}
.miss-bar{height:5px;border-radius:3px;transition:width .4s;background:var(--acc);}
.miss-prog{font-size:.6rem;color:var(--dim);display:flex;justify-content:space-between;}
.miss-claim{background:var(--green);color:#001a0a;border:none;border-radius:4px;
  padding:5px 12px;font-size:.72rem;font-family:var(--font);font-weight:700;cursor:pointer;
  letter-spacing:1px;margin-top:5px;}
.miss-done{color:var(--dim);font-size:.65rem;font-style:italic;}

/* ── POPUP ── */
#popup{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
  background:var(--surf2);border:1px solid var(--brd2);border-radius:14px;
  padding:20px 28px;text-align:center;z-index:200;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;
  min-width:180px;box-shadow:0 0 40px rgba(0,0,0,.6);}
#popup.show{transform:translate(-50%,-50%) scale(1);}
#pop-canvas{display:block;margin:0 auto 8px;}
#pop-name{font-size:1.15rem;font-weight:700;letter-spacing:2px;}
#pop-rar{font-size:.7rem;color:var(--dim);margin-top:3px;letter-spacing:2px;text-transform:uppercase;font-family:var(--font2);}
#pop-val{font-size:.8rem;color:var(--green);margin-top:4px;}

/* ── TOAST ── */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--surf2);border:1px solid var(--brd2);border-radius:20px;
  padding:8px 18px;font-size:.75rem;color:var(--txt);opacity:0;transition:all .3s;
  pointer-events:none;z-index:300;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── ACTIVE BUFFS BAR ── */
#buffs-bar{display:flex;gap:5px;padding:4px 12px;background:var(--surf);
  border-bottom:1px solid var(--brd);flex-shrink:0;min-height:0;overflow:hidden;
  transition:max-height .3s;}
#buffs-bar:empty{padding:0;border-bottom:none;}
.buff-chip{background:rgba(196,125,255,.15);border:1px solid var(--purple);
  border-radius:20px;padding:2px 8px;font-size:.6rem;color:var(--purple);white-space:nowrap;}

/* ── MISC ── */
.empty-state{text-align:center;padding:40px 20px;color:var(--dim);font-size:.8rem;font-family:var(--font2);}
.dd-color{color:var(--green);}
.credit-color{color:var(--gold);}
.pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.6rem;font-weight:700;letter-spacing:1px;}
.pill-r0{background:rgba(120,120,120,.2);color:#aaa;}
.pill-r1{background:rgba(96,168,96,.2);color:#6c8;}
.pill-r2{background:rgba(74,138,220,.2);color:#6af;}
.pill-r3{background:rgba(176,96,232,.2);color:#c8f;}
.pill-r4{background:rgba(255,154,48,.2);color:#fb8;}
.pill-r5{background:rgba(255,48,96,.2);color:#f68;}
.pill-r6{background:rgba(255,224,64,.2);color:#fe8;}

/* ── SELL ROW ── */
.sell-row{display:flex;align-items:center;justify-content:space-between;
  background:var(--surf2);border-radius:6px;padding:6px 8px;margin-bottom:5px;}
.sell-row canvas{display:block;}
.sell-row-info{flex:1;padding:0 8px;}
.sell-row-name{font-size:.78rem;font-weight:700;}
.sell-row-sub{font-size:.6rem;color:var(--dim);font-family:var(--font2);}
.sell-btn{background:rgba(77,255,154,.15);color:var(--green);border:1px solid rgba(77,255,154,.3);
  border-radius:5px;padding:5px 10px;font-size:.68rem;font-family:var(--font);font-weight:700;
  cursor:pointer;transition:background .2s;white-space:nowrap;}
.sell-btn:hover{background:rgba(77,255,154,.3);}
.sell-all-btn{background:rgba(232,184,75,.15);color:var(--gold);border:1px solid rgba(232,184,75,.3);
  border-radius:5px;padding:5px 10px;font-size:.68rem;font-family:var(--font);font-weight:700;
  cursor:pointer;transition:background .2s;}
.sell-all-btn:hover{background:rgba(232,184,75,.3);}
</style>
</head>
<body>

<div id="hdr">
  <div id="logo">Nodnalb</div>
  <div class="hbar">
    <div class="hstat">
      <span class="hstat-lbl">Credits</span>
      <span class="hstat-val gold" id="hcreds">10</span>
    </div>
    <div class="hstat">
      <span class="hstat-lbl">DD</span>
      <span class="hstat-val grn" id="hdd">0</span>
    </div>
    <div class="hstat">
      <span class="hstat-lbl">Level</span>
      <span class="hstat-val acc" id="hlvl">1</span>
      <div id="lvl-bar-wrap"><div id="lvl-bar" style="width:0%"></div></div>
    </div>
  </div>
</div>

<div id="buffs-bar"></div>

<div id="tabs">
  <div class="tab on" id="tab-mine" onclick="switchTab('mine')">⛏ Mine</div>
  <div class="tab" id="tab-col" onclick="switchTab('col')">💎 Vault</div>
  <div class="tab" id="tab-work" onclick="switchTab('work')">⚗️ Forge</div>
  <div class="tab" id="tab-shop" onclick="switchTab('shop')">🏪 Shop</div>
  <div class="tab" id="tab-miss" onclick="switchTab('miss')">📋 Goals<span class="tab-badge" id="miss-badge" style="display:none">!</span></div>
</div>

<!-- MINE -->
<div class="view on" id="view-mine">
  <div id="cwrap"><canvas id="c"></canvas><div id="hint-overlay">tap a ball to collect</div></div>
  <div id="rollbar">
    <button id="rbtn" onclick="roll()">ROLL</button>
    <div class="roll-info">
      <span class="roll-cost credit-color">◈ 1 per roll</span>
      <span class="roll-timer" id="roll-timer">+1 in 30s</span>
    </div>
  </div>
</div>

<!-- VAULT / GALLERY -->
<div class="view" id="view-col">
  <div class="scroll-view">
    <div class="sec-hdr">Your Collection</div>
    <div id="sell-all-row" style="display:flex;justify-content:flex-end;gap:6px;margin-bottom:8px;"></div>
    <div class="ggrid" id="ggrid"></div>
  </div>
</div>

<!-- FORGE / WORKSHOP -->
<div class="view" id="view-work">
  <div class="scroll-view">
    <div class="sec-hdr">Ore Processing</div>
    <div id="recipe-list"></div>
  </div>
</div>

<!-- SHOP -->
<div class="view" id="view-shop">
  <div class="scroll-view">
    <div class="sec-hdr">Upgrades</div>
    <div id="upg-list"></div>
    <div class="sec-hdr" style="margin-top:8px">Power-ups</div>
    <div id="pu-list"></div>
    <div class="sec-hdr" style="margin-top:8px">Level Up</div>
    <div id="lvlup-card"></div>
  </div>
</div>

<!-- MISSIONS -->
<div class="view" id="view-miss">
  <div class="scroll-view">
    <div class="sec-hdr">Active Goals</div>
    <div id="miss-list"></div>
  </div>
</div>

<!-- POPUP -->
<div id="popup">
  <canvas id="pop-canvas" width="90" height="90"></canvas>
  <div id="pop-name"></div>
  <div id="pop-rar"></div>
  <div id="pop-val"></div>
</div>
<div id="toast"></div>

<script>
// ══════════════════════════════════════════════
//  ORE DEFINITIONS  (rarity 0-6)
//  Weight at level 1; higher levels boost rare weights
// ══════════════════════════════════════════════
const RNAMES = ['Common','Uncommon','Rare','Epic','Legendary','Mythic','Cosmic'];
const RCOLS  = ['#888','#60c870','#5090e0','#b060e8','#e09030','#ff3060','#ffe040'];

const ALL_ORES = [
  // r0 - Common
  {id:'coal',      name:'Coal',          r:0, baseW:80,  val:1,   unlockLvl:1},

  {id:'iron',      name:'Iron',          r:1, baseW:30,  val:5,   unlockLvl:1},

  // r2 - Rare
  {id:'gold',      name:'Gold',          r:2, baseW:10,  val:20,  unlockLvl:1},
  {id:'quartz',    name:'Quartz',        r:2, baseW:9,   val:18,  unlockLvl:1},
  {id:'lapis',     name:'Lapis',         r:2, baseW:8,   val:22,  unlockLvl:2},
  {id:'redstone',  name:'Redstone',      r:2, baseW:7,   val:25,  unlockLvl:2},
  {id:'obsidian',  name:'Obsidian',      r:2, baseW:7,   val:28,  unlockLvl:3},
  {id:'pyrite',    name:'Pyrite',        r:2, baseW:8,   val:15,  unlockLvl:3},

  {id:'diamond',   name:'Diamond',       r:3, baseW:2,   val:200, unlockLvl:2},
  {id:'ruby',      name:'Ruby',          r:3, baseW:2,   val:180, unlockLvl:3},
  {id:'sapphire',  name:'Sapphire',      r:3, baseW:2,   val:180, unlockLvl:3},
  {id:'titanium',  name:'Titanium',      r:3, baseW:2.5, val:150, unlockLvl:4},
  {id:'tanzanite', name:'Tanzanite',     r:3, baseW:1.5, val:220, unlockLvl:5},
  {id:'alexandrite',name:'Alexandrite',  r:3, baseW:1.2, val:280, unlockLvl:6},
  // r4 - Legendary
  {id:'opal',      name:'Opal',          r:4, baseW:.8,  val:500, unlockLvl:3},
  {id:'netherite', name:'Netherite',     r:4, baseW:.7,  val:600, unlockLvl:4},
  {id:'plutonium', name:'Plutonium',     r:4, baseW:.5,  val:800, unlockLvl:5},
  {id:'painite',   name:'Painite',       r:4, baseW:.4,  val:1000,unlockLvl:6},
  {id:'benitoite', name:'Benitoite',     r:4, baseW:.5,  val:900, unlockLvl:7},
  {id:'grandidierite',name:'Grandidierite',r:4,baseW:.35,val:1200,unlockLvl:8},
  // r5 - Mythic
  {id:'void',      name:'Void Shard',    r:5, baseW:.15, val:3000,unlockLvl:5},
  {id:'dragonite', name:'Dragonite',     r:5, baseW:.12, val:4000,unlockLvl:7},
  {id:'starcore',  name:'Star Core',     r:5, baseW:.10, val:5000,unlockLvl:8},
  {id:'darkmatter',name:'Dark Matter',   r:5, baseW:.08, val:6000,unlockLvl:9},

function drawBall(ctx, id, cx, cy, R, t=0){
  ctx.save();
  ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.clip();
  const fn = DRAWFNS[id] || DRAWFNS._default;
  fn(ctx,cx,cy,R,t,id);
  // universal specular highlight
  const h=ctx.createRadialGradient(cx-R*.3,cy-R*.38,0,cx-R*.1,cy-R*.18,R*.65);
  h.addColorStop(0,'rgba(255,255,255,.35)');h.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=h;ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fill();
  // bottom shadow
  const bs=ctx.createRadialGradient(cx+R*.2,cy+R*.35,0,cx,cy+R*.2,R*.8);
  bs.addColorStop(0,'rgba(0,0,0,.3)');bs.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=bs;ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fill();
  ctx.restore();
  // glow ring for r3+
  const ore=ORE_MAP[id];
  if(ore&&ore.r>=3){
    const rcs=['','','','rgba(176,96,232,.7)','rgba(255,154,48,.8)','rgba(255,48,96,.9)','rgba(255,224,64,1)'];
    ctx.save();ctx.strokeStyle=rcs[ore.r]||'';ctx.lineWidth=1.5;
    ctx.shadowColor=rcs[ore.r];ctx.shadowBlur=ore.r>=5?18:10;
    ctx.beginPath();ctx.arc(cx,cy,R+1,0,Math.PI*2);ctx.stroke();ctx.restore();
  }
}

const DRAWFNS = {
  _default(ctx,cx,cy,R,t,id){
    const ore=ORE_MAP[id]; const c=ore?RCOLS[ore.r]:'#888';
    const g=ctx.createRadialGradient(cx-R*.2,cy-R*.2,0,cx,cy,R);
    g.addColorStop(0,c);g.addColorStop(1,'#111');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fill();
  },
  coal(ctx,cx,cy,R){
    const g=ctx.createRadialGradient(cx-R*.3,cy-R*.3,R*.05,cx,cy,R);
    g.addColorStop(0,'#4a4540');g.addColorStop(.5,'#1e1a16');g.addColorStop(1,'#0d0b09');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.5)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(cx-R*.1,cy-R*.2);ctx.lineTo(cx+R*.2,cy+R*.1);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx+R*.1,cy-R*.1);ctx.lineTo(cx-R*.15,cy+R*.25);ctx.stroke();
  },
  dirt(ctx,cx,cy,R){
    const g=ctx.createRadialGradient(cx-R*.2,cy-R*.2,0,cx,cy,R);
    g.addColorStop(0,'#8B5E3C');g.addColorStop(.5,'#6B4226');g.addColorStop(1,'#4a2c18');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fill();
    for(let i=0;i<6;i++){const a=i*1.05;const d=R*.3*Math.random()+R*.1;
      ctx.fillStyle='rgba(100,70,30,.4)';ctx.beginPath();ctx.arc(cx+Math.cos(a)*d,cy+Math.sin(a)*d,R*.08,0,Math.PI*2);ctx.fill();}
  },
  gravel(ctx,cx,cy,R){
    const g=ctx.createRadialGradient(cx-R*.2,cy-R*.2,0,cx,cy,R);
    g.addColorStop(0,'#909090');g.addColorStop(.5,'#606060');g.addColorStop(1,'#383838');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fill();
    for(let i=0;i<8;i++){const a=i*.785;const d=R*(.15+.3*(i%3)/3);
      ctx.fillStyle=`rgba(${80+i*8},${80+i*8},${80+i*8},.35)`;
      ctx.beginPath();ctx.arc(cx+Math.cos(a)*d,cy+Math.sin(a)*d,R*.06,0,Math.PI*2);ctx.fill();}

  flint(ctx,cx,cy,R){

    ctx.strokeStyle='rgba(180,160,200,.3)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(cx-R*.4,cy-R*.2);ctx.lineTo(cx+R*.35,cy+R*.3);ctx.stroke();

  quartz(ctx,cx,cy,R){

  fluorite(ctx,cx,cy,R,t){

      ctx.beginPath();ctx.arc(cx+dx,cy+dy,R*.055,0,Math.PI*2);ctx.fill();}
  },
  alloy(ctx,cx,cy,R,t){
    const g=ctx.createLinearGradient(cx-R,cy-R,cx+R,cy+R);
    g.addColorStop(0,'#e0d0b0');g.addColorStop(.25,'#a09070');g.addColorStop(.5,'#c0b080');g.addColorStop(.75,'#808060');g.addColorStop(1,'#404030');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(255,230,150,.3)';ctx.lineWidth=1.5;
    for(let i=0;i<4;i++){const a=i*Math.PI/4+t*.05;ctx.beginPath();ctx.arc(cx,cy,R*(.4+i*.1),a,a+Math.PI*.35);ctx.stroke();}
  },
  stardust(ctx,cx,cy,R,t){
    ctx.fillStyle='#000008';ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fill();
    for(let i=0;i<18;i++){
      const a=i*.349+t*.12;const d=R*(.05+.8*(i/18));const tw=.2+.8*Math.abs(Math.sin(t*2+i*.4));
      const h=(i*20+t*30)%360;
      ctx.fillStyle=`hsla(${h},90%,70%,${tw})`;
      ctx.beginPath();ctx.arc(cx+Math.cos(a)*d,cy+Math.sin(a)*d,R*.05,0,Math.PI*2);ctx.fill();}
    const eg=ctx.createRadialGradient(cx,cy,0,cx,cy,R*.5);
    eg.addColorStop(0,`rgba(255,255,200,${.3+.2*Math.sin(t*4)})`);eg.addColorStop(1,'rgba(100,50,200,0)');
    ctx.fillStyle=eg;ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fill();
  },
};

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let S = {
  credits: 10, dd: 0, xp: 0, level: 1,
  col: {},       // {oreId: count}
  upgrades: {},  // {upgradeId: level}
  powerups: {},  // {puId: endTimestamp}
  missions: {},  // {missionId: {progress, claimed}}
  totalRolls: 0, totalCrafts: 0, totalEarnedDD: 0,
  lastSeen: Date.now(),
};

function getUpgLvl(id){ return S.upgrades[id]||0; }
function getUpg(id){ return UPGRADES.find(u=>u.id===id); }

// ── XP / LEVEL ──
const XP_PER_LEVEL = lvl => Math.floor(100 * Math.pow(1.4, lvl - 1));
function addXP(amt){
  S.xp += amt;
  let needed = XP_PER_LEVEL(S.level);
  while(S.xp >= needed){ S.xp -= needed; S.level++; needed = XP_PER_LEVEL(S.level); toast(`Level Up! Now Level ${S.level}! 🎉`); }
  updateUI();
}

// ── WEIGHT CALC ──
function getOreWeight(ore){
  if(ore.crafted) return 0;
  if(ore.unlockLvl > S.level) return 0;
  let w = ore.baseW;
  // Scale rare weight up as level increases
  const luckMult = 1 + getUpgLvl('luck') * 0.25;
  const puLuck = isPowerupActive('mega_luck') ? 3 : 1;
  if(ore.r >= 1) w *= luckMult * puLuck;
  // Level scaling: each level above unlock adds bonus
  const lvlBonus = Math.max(0, S.level - ore.unlockLvl);
  if(ore.r >= 2) w *= (1 + lvlBonus * 0.15);
  // At very high levels, rare ores become more accessible
  if(ore.r >= 4 && S.level >= 5) w *= (1 + (S.level - 5) * 0.1);
  return Math.max(0, w);
}

function pickOre(){
  const available = ALL_ORES.filter(o=>!o.crafted && getOreWeight(o)>0);
  const totW = available.reduce((s,o)=>s+getOreWeight(o),0);
  let v = Math.random()*totW;
  for(const o of available){ v -= getOreWeight(o); if(v<=0) return o; }
  return available[0];
}

// ── POWERUPS ──
function isPowerupActive(id){ return S.powerups[id] && S.powerups[id] > Date.now(); }
function activatePowerup(id){
  const pu = POWERUPS.find(p=>p.id===id);
  if(!pu) return;
  if(pu.id==='credit_burst'){ S.credits+=5; toast('+5 Credits!'); updateUI(); return; }
  S.powerups[id] = Date.now() + pu.dur * 1000;
  updateBuffsBar();
}

function updateBuffsBar(){
  const bar = document.getElementById('buffs-bar');
  bar.innerHTML = '';
  for(const pu of POWERUPS){
    if(isPowerupActive(pu.id)){
      const rem = Math.ceil((S.powerups[pu.id]-Date.now())/1000);
      const chip = document.createElement('div');
      chip.className='buff-chip';chip.textContent=`${pu.icon} ${pu.name} ${rem}s`;
      bar.appendChild(chip);
    }
  }
}

// ══════════════════════════════════════════════
//  PHYSICS & CANVAS
// ══════════════════════════════════════════════
const GR=0.44, BNC=0.44, FRC=0.984;
const BALL_R = 24;
let balls=[], gtime=0;
let autoCollectTimers = {};

const cv = document.getElementById('c');
function logW(){ return cv.width/(window.devicePixelRatio||1); }
function logH(){ return cv.height/(window.devicePixelRatio||1); }

function maxBalls(){ return [5,8,12,18,25][getUpgLvl('ball_cap')]; }
function dropSpeed(){ return 1 + getUpgLvl('drop_speed') * 0.2; }

function mkBall(ore){
  return {ore, x: logW()/2 + (Math.random()-.5)*8, y:90,
    vx:(Math.random()-.5)*1.5*dropSpeed(), vy:0.5*dropSpeed(),
    r:BALL_R, id: Math.random().toString(36).slice(2)};
}

function step(){
  const W=logW(), H=logH(), floor=H-BALL_R-8;
  for(const b of balls){
    b.vy+=GR; b.x+=b.vx; b.y+=b.vy;
    if(b.y>=floor){b.y=floor;b.vy*=-BNC;b.vx*=FRC;if(Math.abs(b.vy)<0.8)b.vy=0;}
    if(b.x-b.r<0){b.x=b.r;b.vx=Math.abs(b.vx)*.65;}
    if(b.x+b.r>W){b.x=W-b.r;b.vx=-Math.abs(b.vx)*.65;}
    if(b.y-b.r<0){b.y=b.r;b.vy=Math.abs(b.vy)*.5;}
    for(const b2 of balls){
      if(b2===b) continue;
      const dx=b2.x-b.x, dy=b2.y-b.y, dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<b.r+b2.r&&dist>0){
        const nx=dx/dist, ny=dy/dist, ov=(b.r+b2.r-dist)/2;
        b.x-=nx*ov; b.y-=ny*ov; b2.x+=nx*ov; b2.y+=ny*ov;
        const rv=(b.vx-b2.vx)*nx+(b.vy-b2.vy)*ny;
        if(rv>0){b.vx-=rv*nx*.5;b.vy-=rv*ny*.5;b2.vx+=rv*nx*.5;b2.vy+=rv*ny*.5;}
      }
    }
  }
}

// Auto-collect after 8s
function checkAutoCollect(){
  if(getUpgLvl('auto_collect')===0) return;
  const now = Date.now();
  for(const b of balls){
    if(!autoCollectTimers[b.id]) autoCollectTimers[b.id]=now+8000;
    if(now >= autoCollectTimers[b.id]){ collectBall(b); }
  }
}

function render(){
  const ctx=cv.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const W=logW(), H=logH();
  ctx.save(); ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#05080f'; ctx.fillRect(0,0,W,H);
  // subtle hex grid
  ctx.strokeStyle='rgba(30,45,80,.3)'; ctx.lineWidth=1;
  const gs=38;
  for(let x=-gs;x<W+gs;x+=gs*1.5){for(let y=-gs;y<H+gs;y+=gs){
    const row=Math.floor(y/gs);const ox=row%2?gs*.75:0;
    ctx.beginPath();ctx.moveTo(x+ox+gs*.5,y);ctx.lineTo(x+ox+gs,y+gs*.5);ctx.lineTo(x+ox+gs*.5,y+gs);ctx.lineTo(x+ox,y+gs);ctx.lineTo(x+ox-gs*.5,y+gs*.5);ctx.lineTo(x+ox,y);ctx.closePath();ctx.stroke();}}
  // floor glow
  const fg=ctx.createLinearGradient(0,H-60,0,H);
  fg.addColorStop(0,'rgba(77,196,255,0)');fg.addColorStop(1,'rgba(77,196,255,.08)');
  ctx.fillStyle=fg;ctx.fillRect(0,H-60,W,60);
  ctx.strokeStyle='rgba(77,196,255,.25)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(0,H-8);ctx.lineTo(W,H-8);ctx.stroke();
  // dispenser
  const dx=W/2;
  ctx.fillStyle='#0a1020';ctx.fillRect(dx-20,-4,40,20);
  ctx.strokeStyle='#1a2840';ctx.lineWidth=2;ctx.strokeRect(dx-20,-4,40,20);
  ctx.strokeStyle='#243050';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(dx-14,0);ctx.lineTo(dx-14,90);ctx.stroke();
  ctx.beginPath();ctx.moveTo(dx+14,0);ctx.lineTo(dx+14,90);ctx.stroke();
  // balls
  for(const b of balls) drawBall(ctx, b.ore.id, b.x, b.y, b.r, gtime);
  ctx.restore();
  gtime+=0.016;
}

function resizeCv(){
  const dpr=window.devicePixelRatio||1;
  const wrap=document.getElementById('cwrap');
  const W=wrap.clientWidth, H=wrap.clientHeight;
  if(cv.width!==W*dpr||cv.height!==H*dpr){cv.width=W*dpr;cv.height=H*dpr;}
}

function loop(){ resizeCv(); step(); checkAutoCollect(); render(); requestAnimationFrame(loop); }

// ── INTERACTION ──
function getXY(e, rect){
  const dpr=window.devicePixelRatio||1;
  return [(e.clientX-rect.left)*cv.width/rect.width/dpr, (e.clientY-rect.top)*cv.height/rect.height/dpr];
}

cv.addEventListener('click', e=>{
  const rect=cv.getBoundingClientRect();
  const [x,y]=getXY(e,rect);
  for(let i=balls.length-1;i>=0;i--){
    const b=balls[i];
    const dx=b.x-x, dy=b.y-y;
    if(dx*dx+dy*dy<b.r*b.r){ collectBall(b); break; }
  }
});
cv.addEventListener('touchstart', e=>{
  e.preventDefault();
  const t=e.changedTouches[0];
  cv.dispatchEvent(new MouseEvent('click',{clientX:t.clientX,clientY:t.clientY}));
},{passive:false});

function collectBall(b){
  const idx=balls.indexOf(b);
  if(idx===-1) return;
  balls.splice(idx,1);
  delete autoCollectTimers[b.id];
  addToCollection(b.ore);
  showPopup(b.ore);
  trackMission('roll_collect', b.ore);
}

// ── POPUP ──
let popTimer=null;
function showPopup(ore){
  const pop=document.getElementById('popup');
  const pc=document.getElementById('pop-canvas');
  const ctx=pc.getContext('2d');
  ctx.clearRect(0,0,90,90);
  drawBall(ctx, ore.id, 45, 45, 38, gtime);
  document.getElementById('pop-name').textContent=ore.name.toUpperCase();
  document.getElementById('pop-name').style.color=RCOLS[ore.r];
  document.getElementById('pop-rar').textContent=RNAMES[ore.r];
  const sv = Math.floor(ore.val * (1+getUpgLvl('sell_bonus')*.2) * (isPowerupActive('gold_rush')?2:1));
  document.getElementById('pop-val').textContent=`Worth ${sv} DD`;
  pop.classList.add('show');
  clearTimeout(popTimer);
  popTimer=setTimeout(()=>pop.classList.remove('show'),1800);
}

// ── ROLL ──
function roll(){
  if(S.credits<1) return;
  if(balls.length >= maxBalls()){ toast('Tray is full! Collect some balls first.'); return; }
  S.credits--; save();
  const count = isPowerupActive('double_drop') ? 2 : 1;
  for(let i=0;i<count;i++){
    if(balls.length < maxBalls()) balls.push(mkBall(pickOre()));
  }
  S.totalRolls++;
  trackMission('roll',null);
  updateUI();
}

// ── COLLECTION ──
function addToCollection(ore){
  S.col[ore.id]=(S.col[ore.id]||0)+1;
  addXP(ore.r*2+1);
  save(); updateUI();
  checkMissBadge();
}

function sellOre(id, qty=1){
  if(!S.col[id]||S.col[id]<qty) return;
  const ore=ORE_MAP[id];
  const mult=(1+getUpgLvl('sell_bonus')*.2)*(isPowerupActive('gold_rush')?2:1);
  const earned=Math.floor(ore.val*mult*qty);
  S.col[id]-=qty;
  if(S.col[id]<=0) delete S.col[id];
  S.dd+=earned;
  S.totalEarnedDD+=earned;
  toast(`Sold ${qty}× ${ore.name} for ${earned} DD`);
  trackMission('sell_dd',null,{amount:earned});
  save(); updateUI(); buildGallery();
}

function sellAll(){
  let total=0;
  const mult=(1+getUpgLvl('sell_bonus')*.2)*(isPowerupActive('gold_rush')?2:1);
  for(const [id,cnt] of Object.entries(S.col)){
    const ore=ORE_MAP[id];
    if(!ore) continue;
    total+=Math.floor(ore.val*mult*cnt);
  }
  if(!total){toast('Nothing to sell!');return;}
  if(!confirm(`Sell EVERYTHING for ${total} DD?`)) return;
  const earned=total;
  S.col={};
  S.dd+=earned;
  S.totalEarnedDD+=earned;
  toast(`Sold all ores for ${earned} DD!`);
  save(); updateUI(); buildGallery();
}

// ── CRAFT ──
function craft(recipeId){
  const rec=RECIPES.find(r=>r.id===recipeId);
  if(!rec) return;
  for(const inp of rec.inputs){
    if((S.col[inp.id]||0)<inp.n){toast('Not enough materials!');return;}
  }
  for(const inp of rec.inputs){ S.col[inp.id]-=inp.n; if(S.col[inp.id]<=0) delete S.col[inp.id]; }
  S.col[rec.out]=(S.col[rec.out]||0)+rec.qty;
  S.totalCrafts++;
  const ore=ORE_MAP[rec.out];
  addXP(ore.r*5+5);
  toast(`Crafted ${rec.qty}× ${ore.name}!`);
  trackMission('craft',null);
  save(); updateUI(); buildRecipes(); buildGallery();
}

// ── UPGRADES / SHOP ──
function buyUpgrade(id){
  const upg=getUpg(id);
  if(!upg) return;
  const lvl=getUpgLvl(id);
  if(lvl>=upg.maxLvl){toast('Already maxed!');return;}
  const cost=upg.cost(lvl);
  if(S[upg.type]<cost){toast(`Not enough ${upg.type==='dd'?'DD':'credits'}!`);return;}
  S[upg.type]-=cost;
  S.upgrades[id]=(lvl+1);
  toast(`${upg.name} upgraded to level ${lvl+1}!`);
  save(); updateUI(); buildShop();
}

function buyPowerup(id){
  const pu=POWERUPS.find(p=>p.id===id);
  if(!pu) return;
  if(S.dd<pu.cost){toast('Not enough DD!');return;}
  S.dd-=pu.cost;
  activatePowerup(id);
  save(); updateUI(); buildShop();
}

function levelUp(){
  const cost = S.level * 500;
  if(S.dd < cost){toast('Not enough DD!');return;}
  S.dd -= cost;
  S.level++;
  S.xp = 0;
  toast(`Welcome to Level ${S.level}! New ores unlocked!`);
  save(); updateUI(); buildShop();
}

// ── MISSIONS ──
function getMissions(){ return makeMissions(S); }

function getMissionProgress(m){
  const ms=S.missions[m.id]||{progress:0,claimed:false};
  const t=m.target;
  let prog=ms.progress;
  // recompute from live state for some types
  if(t.type==='rarity') prog=Object.entries(S.col).filter(([id,_])=>ORE_MAP[id]&&ORE_MAP[id].r===t.r).reduce((s,[_,c])=>s+c,0);
  if(t.type==='unique') prog=Object.keys(S.col).length;
  if(t.type==='level') prog=S.level;
  if(t.type==='roll') prog=S.totalRolls;
  if(t.type==='craft') prog=S.totalCrafts;
  if(t.type==='earned_dd') prog=S.totalEarnedDD;
  if(t.type==='ore') prog=S.col[t.id]||0;
  return {prog:Math.min(prog,t.n), claimed:ms.claimed||false};
}

function trackMission(event, ore, extra={}){
  for(const m of getMissions()){
    const ms=S.missions[m.id]||{progress:0,claimed:false};
    if(ms.claimed) continue;
    const t=m.target;
    // progress-tracked missions
    if(event==='sell_dd'&&t.type==='earned_dd'){ S.missions[m.id]={...ms,progress:(ms.progress||0)+extra.amount}; }
  }
  checkMissBadge(); save();
}

function claimMission(id){
  const m=getMissions().find(x=>x.id===id);
  if(!m) return;
  const {prog,claimed}=getMissionProgress(m);
  if(claimed||prog<m.target.n) return;
  S.missions[id]={...S.missions[id],claimed:true};
  if(m.reward.dd){S.dd+=m.reward.dd;toast(`Claimed! +${m.reward.dd} DD`);}
  if(m.reward.credits){S.credits+=m.reward.credits;toast(`+${m.reward.credits} Credits!`);}
  save(); updateUI(); buildMissions(); checkMissBadge();
}

function checkMissBadge(){
  const ready=getMissions().some(m=>{ const {prog,claimed}=getMissionProgress(m); return !claimed&&prog>=m.target.n; });
  document.getElementById('miss-badge').style.display=ready?'':'none';
}

function buildGallery(){
  const grid=document.getElementById('ggrid');
  const row=document.getElementById('sell-all-row');
  grid.innerHTML='';
  row.innerHTML='';
  const col=ALL_ORES.filter(o=>S.col[o.id]>0);
  if(!col.length){
    grid.innerHTML='<div class="empty-state">No ores collected yet.<br>Roll to start mining!</div>';
    return;
  }
  // sell all button
  const sa=document.createElement('button');sa.className='sell-all-btn';sa.textContent='Sell All';sa.onclick=sellAll;row.appendChild(sa);
  col.sort((a,b)=>b.r-a.r||S.col[b.id]-S.col[a.id]);
  const mult=(1+getUpgLvl('sell_bonus')*.2)*(isPowerupActive('gold_rush')?2:1);
  for(const ore of col){
    const cnt=S.col[ore.id];
    const sv=Math.floor(ore.val*mult);
    const div=document.createElement('div');
    div.className=`gi r${ore.r}`;
    const c=document.createElement('canvas');c.width=56;c.height=56;c.dataset.tid=ore.id;
    drawBall(c.getContext('2d'),ore.id,28,28,24,gtime);
    div.appendChild(c);
    const nm=document.createElement('div');nm.className='gn';nm.textContent=ore.name;
    const gc=document.createElement('div');gc.className='gc';gc.textContent=`×${cnt}`;
    const gv=document.createElement('div');gv.className='gv';gv.textContent=`${sv}DD ea`;
    div.appendChild(nm);div.appendChild(gc);div.appendChild(gv);
    div.onclick=()=>sellOre(ore.id,1);
    grid.appendChild(div);
  }
}

function buildRecipes(){
  const list=document.getElementById('recipe-list');
  list.innerHTML='';
  for(const rec of RECIPES){
    const out=ORE_MAP[rec.out];
    const canCraft=rec.inputs.every(inp=>(S.col[inp.id]||0)>=inp.n);
    const div=document.createElement('div');
    div.className=`recipe-card${canCraft?' can':''}`;

    const ri=document.createElement('div');ri.className='rec-inputs';
    for(const inp of rec.inputs){
      const ore=ORE_MAP[inp.id];
      const have=S.col[inp.id]||0;
      const item=document.createElement('div');item.className='rec-item';
      const c=document.createElement('canvas');c.width=36;c.height=36;
      drawBall(c.getContext('2d'),ore.id,18,18,15,gtime);
      const cn=document.createElement('div');cn.className='ri-name';cn.textContent=ore.name;
      const cc=document.createElement('div');cc.className=`ri-cnt ${have>=inp.n?'ok':'no'}`;
      cc.textContent=`${have}/${inp.n}`;
      item.appendChild(c);item.appendChild(cn);item.appendChild(cc);ri.appendChild(item);
    }
    const arr=document.createElement('div');arr.className='rec-arrow';arr.textContent='→';
    const ro=document.createElement('div');ro.className='rec-out';
    const oc=document.createElement('canvas');oc.width=48;oc.height=48;
    drawBall(oc.getContext('2d'),out.id,24,24,20,gtime);
    const on=document.createElement('div');on.className='rec-name';on.textContent=out.name;
    ro.appendChild(oc);ro.appendChild(on);
    const btn=document.createElement('button');btn.className='craft-btn';btn.textContent='Forge';
    btn.disabled=!canCraft;btn.onclick=()=>craft(rec.id);

    div.appendChild(ri);div.appendChild(arr);div.appendChild(ro);div.appendChild(btn);
    const desc=document.createElement('div');
    desc.style.cssText='font-size:.6rem;color:var(--dim);font-family:var(--font2);width:100%;margin-top:4px;';
    desc.textContent=rec.desc;div.appendChild(desc);
    list.appendChild(div);
  }
}

function buildShop(){
  // Upgrades
  const ul=document.getElementById('upg-list');ul.innerHTML='';
  for(const upg of UPGRADES){
    const lvl=getUpgLvl(upg.id);
    const maxed=lvl>=upg.maxLvl;
    const cost=upg.cost(lvl);
    const card=document.createElement('div');
    card.className=`upg-card${maxed?' maxed':''}`;

      <div class="upg-icon">${upg.icon}</div>
      <div class="upg-body">
        <div class="upg-name">${upg.name}</div>
        <div class="upg-desc">${upg.desc(lvl)}</div>

      </div>
      <div class="upg-cost">
        <div class="upg-cost-val">${maxed?'MAX':cost}</div>
        <div class="upg-cost-lbl">${maxed?'':upg.type.toUpperCase()}</div>
      </div>`;
    if(!maxed) card.onclick=()=>buyUpgrade(upg.id);
    ul.appendChild(card);
  }
  // Powerups
  const pl=document.getElementById('pu-list');pl.innerHTML='';
  for(const pu of POWERUPS){
    const active=isPowerupActive(pu.id);
    const rem=active?Math.ceil((S.powerups[pu.id]-Date.now())/1000):0;
    const card=document.createElement('div');
    card.className=`powerup-card${active?' pu-active':''}`;
    card.style.borderColor=active?pu.color:'';
    card.innerHTML=`
      <div class="upg-icon" style="color:${pu.color}">${pu.icon}</div>
      <div class="upg-body">
        <div class="upg-name">${pu.name}</div>
        <div class="upg-desc">${pu.desc}</div>
        ${active?`<div class="upg-lvl" style="color:${pu.color}">${rem}s remaining</div>`:''}
      </div>
      <div class="upg-cost">
        <div class="upg-cost-val" style="color:var(--green)">${pu.cost}</div>
        <div class="upg-cost-lbl">DD</div>
      </div>`;
    if(!active) card.onclick=()=>buyPowerup(pu.id);
    pl.appendChild(card);
  }
  // Level up
  const lc=document.getElementById('lvlup-card');
  const lvcost=S.level*500;
  lc.innerHTML=`
    <div class="card">
      <div class="card-title">Level ${S.level} → ${S.level+1}</div>
      <div style="font-size:.68rem;color:var(--dim);font-family:var(--font2);margin-bottom:8px">
        Unlocks new ores, improves rare drop chances, and increases XP gain.<br>
        Currently: ${Object.values(ALL_ORES).filter(o=>!o.crafted&&o.unlockLvl<=S.level).length} ore types available.
        Next level unlocks: ${ALL_ORES.filter(o=>!o.crafted&&o.unlockLvl===S.level+1).map(o=>o.name).join(', ')||'No new ores'}
      </div>
      <button class="craft-btn" style="width:100%" onclick="levelUp()">Level Up — ${lvcost} DD</button>
    </div>`;
}

function buildMissions(){
  const list=document.getElementById('miss-list');list.innerHTML='';
  const missions=getMissions();
  for(const m of missions){
    const {prog,claimed}=getMissionProgress(m);
    const pct=Math.min(100,prog/m.target.n*100);
    const done=prog>=m.target.n;
    const card=document.createElement('div');card.className='miss-card';
    const rewardStr=[m.reward.dd?`${m.reward.dd} DD`:'',m.reward.credits?`${m.reward.credits} Credits`:''].filter(Boolean).join(' + ');
    card.innerHTML=`
      <div class="miss-hdr">
        <div class="miss-name">${m.name}</div>
        <div class="miss-rew">+${rewardStr}</div>
      </div>
      <div class="miss-desc">${m.desc}</div>
      <div class="miss-bar-wrap"><div class="miss-bar" style="width:${pct}%"></div></div>
      <div class="miss-prog"><span>${prog}/${m.target.n}</span><span>${Math.floor(pct)}%</span></div>
      ${done&&!claimed?`<button class="miss-claim" onclick="claimMission('${m.id}')">Claim Reward!</button>`:''}
      ${claimed?`<div class="miss-done">✓ Completed</div>`:''}`;
    list.appendChild(card);
  }
}

// ══════════════════════════════════════════════
//  UI HELPERS
// ══════════════════════════════════════════════
function updateUI(){
  document.getElementById('hcreds').textContent=S.credits;
  document.getElementById('hdd').textContent=S.dd;
  document.getElementById('hlvl').textContent=S.level;
  const needed=XP_PER_LEVEL(S.level);
  document.getElementById('lvl-bar').style.width=`${Math.min(100,S.xp/needed*100)}%`;
  document.getElementById('rbtn').disabled=S.credits<1;
  updateBuffsBar();
}

let toastTimer=null;
function toast(msg){
  const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2200);
}

let currentTab='mine';
function switchTab(tab){
  currentTab=tab;
  ['mine','col','work','shop','miss'].forEach(t=>{
    document.getElementById(`view-${t}`).className='view'+(t===tab?' on':'');
    document.getElementById(`tab-${t}`).className='tab'+(t===tab?' on':'');
  });
  if(tab==='col') buildGallery();
  if(tab==='work') buildRecipes();
  if(tab==='shop') buildShop();
  if(tab==='miss') buildMissions();
}

// Animate gallery canvases
setInterval(()=>{
  document.querySelectorAll('#ggrid canvas[data-tid]').forEach(c=>{
    const ctx=c.getContext('2d');ctx.clearRect(0,0,56,56);
    drawBall(ctx,c.dataset.tid,28,28,24,gtime);
  });
},50);

// Refresh forge/shop when tabs are open
setInterval(()=>{
  if(currentTab==='work') buildRecipes();
  if(currentTab==='shop') buildShop();
},5000);

// ══════════════════════════════════════════════
//  SAVE / LOAD / OFFLINE CREDIT
// ══════════════════════════════════════════════
function save(){
  try{ localStorage.setItem('nodnalb_v1', JSON.stringify(S)); }catch(e){}
}

function load(){
  try{
    const raw=localStorage.getItem('nodnalb_v1');
    if(!raw) return;
    const saved=JSON.parse(raw);
    S={...S,...saved};
    // offline credit calculation
    const nowMs=Date.now();
    const elapsedSec=Math.max(0,(nowMs - (S.lastSeen||nowMs))/1000);
    const creditInterval=[30,24,18,12,8][getUpgLvl('credit_rate')];
    const earned=Math.floor(elapsedSec/creditInterval);
    if(earned>0){
      S.credits+=earned;
      if(earned>=1) setTimeout(()=>toast(`Welcome back! +${earned} credits earned while away.`),500);
    }
    S.lastSeen=nowMs;
    save();
  }catch(e){ console.warn('Load error',e); }
}

// Credit timer – robust visibility-aware approach
let creditAccum=0;
let lastTickMs=Date.now();

function tickCredit(){
  const now=Date.now();
  const delta=(now-lastTickMs)/1000;
  lastTickMs=now;
  creditAccum+=delta;
  const interval=[30,24,18,12,8][getUpgLvl('credit_rate')];
  while(creditAccum>=interval){
    creditAccum-=interval;
    S.credits++;
    save();
    updateUI();
  }
  const nextIn=Math.ceil(interval-creditAccum);
  document.getElementById('roll-timer').textContent=`+1 in ${nextIn}s`;
}
setInterval(tickCredit, 1000);

// On visibility change, record lastSeen so offline calc is correct next time
document.addEventListener('visibilitychange',()=>{
  if(document.hidden){ S.lastSeen=Date.now(); save(); }
  else {
    // Re-apply offline credits for any gap
    const nowMs=Date.now();
    const elapsedSec=Math.max(0,(nowMs-(S.lastSeen||nowMs))/1000);
    const interval=[30,24,18,12,8][getUpgLvl('credit_rate')];
    const earned=Math.floor(elapsedSec/interval);
    if(earned>0){ S.credits+=earned; toast(`+${earned} credits earned while away!`); updateUI(); }
    S.lastSeen=nowMs; lastTickMs=nowMs; creditAccum=0; save();
  }
});

// Powerup tick refresh
setInterval(()=>{ updateBuffsBar(); if(currentTab==='shop') buildShop(); },1000);

// ══════════════════════════════════════════════
//  PWA
// ══════════════════════════════════════════════
const mf={name:'Nodnalb',short_name:'Nodnalb',start_url:'.',display:'standalone',
  background_color:'#05080f',theme_color:'#05080f',
  icons:[{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%2305080f'/%3E%3Ccircle cx='50' cy='50' r='35' fill='%23e8b84b'/%3E%3Ctext x='50' y='63' font-size='32' text-anchor='middle'%3E⛏%3C/text%3E%3C/svg%3E",sizes:'any',type:'image/svg+xml'}]};
try{
  const ml=document.createElement('link');ml.rel='manifest';
  ml.href=URL.createObjectURL(new Blob([JSON.stringify(mf)],{type:'application/manifest+json'}));
  document.head.appendChild(ml);
}catch(e){}

if('serviceWorker' in navigator){
  const sw=`
    const CACHE='nodnalb-v1';
    self.addEventListener('install',e=>{self.skipWaiting();});
    self.addEventListener('activate',e=>{self.clients.claim();});
    self.addEventListener('fetch',e=>{
      if(e.request.method!=='GET') return;
      e.respondWith(caches.open(CACHE).then(c=>c.match(e.request).then(r=>r||fetch(e.request).then(res=>{c.put(e.request,res.clone());return res;}))));
    });`;
  try{ navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'text/javascript'}))).catch(()=>{}); }catch(e){}
}

// ── INIT ──
load(); updateUI(); checkMissBadge(); loop();
</script>
