<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#080604">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Ore Gacha</title>
<style>
:root{--bg:#080604;--surf:#111009;--brd:#2a2016;--gold:#c9a227;--txt:#d4b896;--dim:#6b5a42;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:'Georgia','Times New Roman',serif;touch-action:manipulation;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
body{display:flex;flex-direction:column;height:100dvh;}
button,.tab,.gi,#c{touch-action:manipulation;-webkit-user-select:none;user-select:none;}

/* ── HEADER ── */
#hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;
  background:var(--surf);border-bottom:1px solid var(--brd);flex-shrink:0;}
#ttl{font-size:1rem;letter-spacing:4px;text-transform:uppercase;color:var(--gold);text-shadow:0 0 12px rgba(201,162,39,.4);}
#cred-box{display:flex;align-items:center;gap:6px;font-size:.85rem;flex-wrap:wrap;justify-content:flex-end;}
#cred-count{color:var(--gold);font-size:1rem;}
#dd-count{color:#7cf8ff;font-size:1rem;}
#tmr{font-size:.65rem;color:var(--dim);min-width:60px;text-align:right;}

/* ── TABS ── */
#tabs{display:flex;background:var(--surf);border-bottom:1px solid var(--brd);flex-shrink:0;}
.tab{flex:1;padding:9px;text-align:center;font-size:.75rem;letter-spacing:2px;text-transform:uppercase;
  cursor:pointer;color:var(--dim);transition:color .2s;border-bottom:2px solid transparent;}
.tab.on{color:var(--gold);border-bottom-color:var(--gold);}

/* ── GAME AREA ── */
#game{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;}

/* ── MINE BAR ── */
#mine-bar{display:flex;align-items:center;gap:8px;padding:5px 12px;
  background:var(--surf);border-bottom:1px solid var(--brd);flex-shrink:0;}
#mine-bar-icon{font-size:1rem;line-height:1;flex-shrink:0;}
#mine-bar-name{flex:1;font-size:.75rem;letter-spacing:2px;text-transform:uppercase;color:var(--gold);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#mine-bar-cost{font-size:.62rem;color:var(--dim);white-space:nowrap;flex-shrink:0;}
#mine-switch-btn{border:1px solid var(--brd);background:transparent;color:var(--dim);
  border-radius:4px;padding:4px 9px;font-size:.62rem;letter-spacing:1px;text-transform:uppercase;
  cursor:pointer;font-family:inherit;transition:color .2s,border-color .2s;flex-shrink:0;}
#mine-switch-btn:hover{color:var(--gold);border-color:var(--gold);}

/* ── CANVAS ── */
#cwrap{flex:1;position:relative;min-height:0;}
#c{position:absolute;top:0;left:0;width:100%;height:100%;cursor:crosshair;}
#hint{position:absolute;bottom:12px;left:0;right:0;text-align:center;
  font-size:.62rem;color:var(--dim);pointer-events:none;font-style:italic;letter-spacing:.5px;}

/* ── ROLL BAR ── */
#rollbar{padding:10px 14px;background:var(--surf);border-top:1px solid var(--brd);
  display:flex;align-items:center;justify-content:center;gap:14px;flex-shrink:0;}
#rbtn{background:linear-gradient(135deg,#5a3c0e,#c9a227 45%,#8a6010 55%,#5a3c0e);
  border:none;color:#0a0603;padding:11px 36px;font-size:.95rem;font-family:inherit;
  letter-spacing:3px;text-transform:uppercase;font-weight:bold;cursor:pointer;border-radius:3px;
  box-shadow:0 0 18px rgba(201,162,39,.3);transition:box-shadow .2s,opacity .2s;}
#rbtn:hover:not(:disabled){box-shadow:0 0 30px rgba(201,162,39,.6);}
#rbtn:disabled{opacity:.35;cursor:not-allowed;}
#rcost{font-size:.75rem;color:var(--dim);}

/* ── GALLERY / INVENTORY ── */
#gal-view{flex:1;overflow-y:auto;padding:14px;display:none;}
#inv-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;
  padding:12px 14px;margin-bottom:12px;background:var(--surf);border:1px solid var(--brd);border-radius:10px;}
#inv-title{font-size:.95rem;letter-spacing:2px;text-transform:uppercase;color:var(--gold);}
#inv-sub{margin-top:4px;font-size:.72rem;color:var(--dim);line-height:1.35;max-width:42ch;}
#dd-pill{display:flex;align-items:center;gap:8px;flex-shrink:0;background:#0c1620;border:1px solid #2d5672;
  border-radius:999px;padding:8px 12px;color:#c9f5ff;font-size:.82rem;letter-spacing:1px;text-transform:uppercase;}
#dd-pill b{font-size:1rem;color:#7cf8ff;}
#inv-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end;}
#cycle-pill{display:flex;align-items:center;gap:8px;flex-shrink:0;background:#1a140f;border:1px solid #4c3a24;
  border-radius:999px;padding:8px 12px;color:#eedfc4;font-size:.82rem;letter-spacing:1px;text-transform:uppercase;}
#cycle-pill b{font-size:1rem;color:var(--gold);}
.modebtn{border:none;border-radius:999px;padding:8px 12px;cursor:pointer;
  background:linear-gradient(135deg,#2d1f12,#5a3c0e 50%,#2d1f12);color:#f8ead0;
  font-size:.72rem;letter-spacing:1px;text-transform:uppercase;min-width:92px;}
.modebtn.on{background:linear-gradient(135deg,#173447,#2f718f 50%,#173447);color:#dff9ff;}
.modebtn:hover{filter:brightness(1.08);}
.ggrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(126px,1fr));gap:10px;}
.gi{background:var(--surf);border-radius:10px;padding:10px;text-align:center;
  cursor:default;border:1px solid;transition:transform .15s,box-shadow .15s;}
.gi:hover{transform:translateY(-1px);}
.gi canvas{display:block;margin:0 auto;}
.gi .gname{font-size:.82rem;font-weight:bold;color:var(--txt);margin-top:6px;letter-spacing:.5px;}
.gi .gr{font-size:.6rem;color:var(--dim);margin-top:2px;text-transform:uppercase;letter-spacing:1px;}
.gi .gc{font-size:.72rem;color:var(--gold);margin-top:4px;}
.gi .cnt{font-size:.72rem;color:#c9f5ff;margin-top:2px;}
.sellbtn{width:100%;margin-top:8px;padding:7px 8px;border:none;border-radius:6px;
  background:linear-gradient(135deg,#123041,#2f718f 50%,#123041);color:#dff9ff;
  font-size:.72rem;letter-spacing:1px;text-transform:uppercase;cursor:pointer;}
.sellbtn:hover{filter:brightness(1.12);}
.sellbtn:disabled{opacity:.35;cursor:not-allowed;}
.r0{border-color:#444;}.r1{border-color:#888;}.r2{border-color:#3a9;}
.r3{border-color:#58f;}.r4{border-color:#f5a;box-shadow:0 0 6px rgba(255,80,180,.3);}
.r5{border-color:#fd0;box-shadow:0 0 10px rgba(255,210,0,.4);}

/* ── WORKSHOP ── */
.shophead{margin:14px 0 10px;font-size:.78rem;letter-spacing:2px;text-transform:uppercase;color:var(--gold);}
.shopgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:18px;}
.shopcard{background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:10px;display:flex;flex-direction:column;gap:6px;}
.shopcard.locked{opacity:.62;filter:saturate(.75);}
.shopcard.owned{border-color:#2d8f75;box-shadow:0 0 0 1px rgba(60,255,190,.12) inset;}
.shopname{font-size:.9rem;letter-spacing:1px;color:var(--txt);}
.shopmeta{font-size:.62rem;color:var(--dim);text-transform:uppercase;letter-spacing:1px;}
.shopeff{font-size:.72rem;color:#c9f5ff;line-height:1.3;}
.shopreq{font-size:.68rem;color:var(--dim);line-height:1.35;}
.shopbadge{display:inline-block;width:max-content;padding:3px 7px;border-radius:999px;
  background:#0c1620;border:1px solid #2d5672;color:#b9edf6;font-size:.62rem;letter-spacing:1px;text-transform:uppercase;}
.craftbtn{width:100%;margin-top:4px;padding:8px 10px;border:none;border-radius:6px;
  background:linear-gradient(135deg,#4b2f09,#c9a227 55%,#4b2f09);color:#0b0603;
  font-size:.72rem;letter-spacing:1px;text-transform:uppercase;font-weight:bold;cursor:pointer;}
.craftbtn:hover:not(:disabled){filter:brightness(1.1);}
.craftbtn:disabled{opacity:.4;cursor:not-allowed;}
.recipe{display:flex;flex-direction:column;gap:6px;}
.reqs{display:flex;flex-wrap:wrap;gap:6px;align-items:flex-start;}
.reqtok{width:44px;min-height:58px;display:flex;flex-direction:column;align-items:center;
  justify-content:flex-start;gap:4px;padding:5px 4px 4px;border-radius:9px;
  background:#0d0b08;border:1px solid #3c3427;color:#f5ead6;position:relative;}
.reqtok.locked{opacity:.38;filter:grayscale(1);}
.reqtok canvas{display:block;}
.reqtok .qty{font-size:.62rem;line-height:1;letter-spacing:1px;color:var(--gold);}
.reqtok .lbl{font-size:.52rem;line-height:1;color:var(--dim);text-transform:uppercase;
  letter-spacing:.6px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.recmeta{font-size:.66rem;color:var(--dim);line-height:1.25;}

/* ── MINE PANEL ── */
#mine-panel{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.84);
  display:none;flex-direction:column;align-items:center;justify-content:flex-end;}
#mine-panel.open{display:flex;}
#mine-panel-inner{width:100%;max-width:480px;background:#0d0b08;
  border-top:1px solid #3a2e1a;border-radius:16px 16px 0 0;
  padding:16px 14px 24px;max-height:85vh;overflow-y:auto;}
.mpanel-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.mpanel-title{font-size:.85rem;letter-spacing:3px;text-transform:uppercase;color:var(--gold);}
.mpanel-close{border:1px solid var(--brd);background:transparent;color:var(--dim);
  border-radius:4px;padding:4px 10px;font-size:.72rem;cursor:pointer;font-family:inherit;}
.mcard{background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:12px;margin-bottom:10px;}
.mcard.active{border-color:var(--gold);}
.mcard.locked-card{opacity:.68;}
.mcard-hdr{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.mcard-icon{font-size:1.4rem;line-height:1;flex-shrink:0;}
.mcard-title{font-size:.92rem;letter-spacing:1px;color:var(--txt);font-weight:bold;flex:1;}
.mcard-badge{font-size:.58rem;letter-spacing:1px;text-transform:uppercase;
  padding:2px 8px;border-radius:999px;white-space:nowrap;flex-shrink:0;}
.badge-active{background:#1e1808;border:1px solid #8a6820;color:#d4b050;}
.badge-unlocked{background:#0c1a10;border:1px solid #2a6040;color:#70c090;}
.badge-locked{background:#1a0c0c;border:1px solid #6a2020;color:#c06060;}
.mcard-desc{font-size:.7rem;color:var(--dim);line-height:1.45;margin-bottom:8px;}
.mcard-stats{display:flex;gap:10px;margin-bottom:8px;flex-wrap:wrap;}
.mstat{font-size:.66rem;color:var(--txt);background:#0a0804;border:1px solid var(--brd);
  border-radius:5px;padding:3px 8px;}
.mstat b{color:var(--gold);}
.mstat.expensive b{color:#f08060;}
.mrar-chips{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px;}
.rchip{font-size:.56rem;padding:2px 7px;border-radius:999px;letter-spacing:.5px;border:1px solid;}
.mfeatured{font-size:.62rem;color:var(--dim);margin-bottom:10px;line-height:1.5;}
.mfeatured b{color:var(--txt);}
.maction-btn{width:100%;padding:10px;border:none;border-radius:6px;font-family:inherit;
  font-size:.75rem;letter-spacing:1.5px;text-transform:uppercase;font-weight:bold;cursor:pointer;transition:filter .2s;}
.maction-btn.select{background:linear-gradient(135deg,#4b2f09,#c9a227 55%,#4b2f09);color:#0b0603;}
.maction-btn.unlock{background:linear-gradient(135deg,#0f2c40,#1e6090 50%,#0f2c40);color:#c0e8ff;}
.maction-btn.current{background:#1e1810;color:var(--dim);cursor:default;}
.maction-btn:hover:not(.current):not(:disabled){filter:brightness(1.12);}
.maction-btn:disabled{opacity:.38;cursor:not-allowed;}

/* ── POPUP ── */
#popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
  background:var(--surf);border:1px solid var(--brd);border-radius:12px;
  padding:18px 24px;text-align:center;z-index:9999;
  min-width:210px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  box-shadow:0 0 28px rgba(0,0,0,.35);transition:transform .25s cubic-bezier(.34,1.56,.64,1);pointer-events:none;}
#popup.show{transform:translate(-50%,-50%) scale(1);}
#pop-canvas{display:block;margin:0;}
#pop-name{font-size:1.08rem;letter-spacing:1.5px;color:var(--gold);text-align:center;line-height:1.2;}
#pop-rar{font-size:.75rem;color:var(--dim);margin-top:1px;letter-spacing:1px;text-align:center;}
</style>
</head>
<body>

<div id="hdr">
  <div id="ttl">⛏ Ore Gacha</div>
  <div id="cred-box">
    <span style="color:var(--gold)">◈</span>
    <span id="cred-count">10 / 20</span>
    <span style="color:#7cf8ff">DD</span>
    <span id="dd-count">0</span>
    <span id="tmr"></span>
  </div>
</div>

<div id="tabs">
  <div class="tab on" id="tab-game" onclick="switchTab('game')">Dispenser</div>
  <div class="tab"    id="tab-gal"  onclick="switchTab('gal')">Inventory</div>
</div>

<div id="game">
  <div id="mine-bar">
    <span id="mine-bar-icon">⛏</span>
    <span id="mine-bar-name">The Shallows</span>
    <span id="mine-bar-cost">◈ 1 credit / roll</span>
    <button id="mine-switch-btn" onclick="openMinePanel()">Switch Mine</button>
  </div>
  <div id="cwrap">
    <canvas id="c"></canvas>
    <div id="hint">Tap a ball to collect it</div>
  </div>
  <div id="rollbar">
    <span id="rcost">◈ 1 credit per roll</span>
    <button id="rbtn" onclick="roll()">ROLL</button>
  </div>
</div>

<div id="gal-view">
  <div id="inv-top">
    <div>
      <div id="inv-title">Inventory</div>
      <div id="inv-sub">Sell ores for DD. Credits stay separate and keep powering rolls.</div>
    </div>
    <div id="inv-actions">
      <div id="dd-pill">DD <b id="dd-pill-count">0</b></div>
      <div id="cycle-pill">Cycle <b id="cycle-count">30s</b></div>
      <button id="sellmode-btn" class="modebtn" onclick="toggleSellMode()">Sell 1</button>
    </div>
  </div>
  <div class="shophead">Ore Inventory</div>
  <div class="ggrid" id="ggrid"></div>
  <div class="shophead">Workshop Upgrades</div>
  <div class="shopgrid" id="shopgrid"></div>
  <div class="shophead">Credit Capacity Upgrades</div>
  <div class="shopgrid" id="capgrid"></div>
</div>

<!-- Mine Selector Panel -->
<div id="mine-panel" onclick="if(event.target===this)closeMinePanel()">
  <div id="mine-panel-inner">
    <div class="mpanel-hdr">
      <div class="mpanel-title">⛰ Choose Mine</div>
      <button class="mpanel-close" onclick="closeMinePanel()">✕ Close</button>
    </div>
    <div id="mine-cards"></div>
  </div>
</div>

<div id="popup">
  <canvas id="pop-canvas" width="80" height="80"></canvas>
  <div id="pop-name"></div>
  <div id="pop-rar"></div>
</div>

<script>

  // ── r3 Epic ──
  {id:'amethyst',    name:'Amethyst',      r:3, w:1.8, style:'crystal', c:['#e0b0ff','#9040d0','#2a0060']},

function getCurrentMine(){ return MINES.find(m=>m.id===S.mine)||MINES[0]; }

function pickFromMine(){
  const mine = getCurrentMine();
  const pool = mysteryAllowed() ? mine.ores : mine.ores.filter(o=>o.id!=='mystery');
  const totW = pool.reduce((s,o)=>s+o.w,0);
  let v = Math.random()*totW;
  for(const o of pool){
    v -= o.w;
    if(v<=0){ const t=TYPES.find(x=>x.id===o.id); return t||TYPES[0]; }
  }
  const t=TYPES.find(x=>x.id===pool[0].id);
  return t||TYPES[0];
}

function clamp01(v){return Math.max(0,Math.min(1,v));}
function addStop(g,stops){for(const[o,c]of stops)g.addColorStop(o,c);return g;}
function drawSpecks(ctx,cx,cy,R,n,baseAlpha=0.16,palette=['#fff']){
  for(let i=0;i<n;i++){
    const a=i*2.39996323,d=R*(0.1+0.75*((i*13)%17)/17),sz=R*(0.02+0.03*((i*7)%5));
    const col=palette[i%palette.length];
    ctx.fillStyle=col.replace(')',`,${baseAlpha+((i%3)*0.04)})`).replace('rgb(','rgba(');
    ctx.beginPath();ctx.arc(cx+Math.cos(a)*d,cy+Math.sin(a)*d,sz,0,Math.PI*2);ctx.fill();
  }
}
function drawFacets(ctx,cx,cy,R,lines=4,alpha=.35){
  ctx.strokeStyle=`rgba(255,255,255,${alpha})`;ctx.lineWidth=1;
  for(let i=0;i<lines;i++){
    const a=i*(Math.PI*2/lines)+.2;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(a)*R*.76,cy+Math.sin(a)*R*.76);ctx.stroke();
  }
}
function drawCoreGlow(ctx,cx,cy,R,colors,throb=0){
  const g=ctx.createRadialGradient(cx,cy,0,cx,cy,R);
  addStop(g,[[0,colors[0]],[.42,colors[1]],[1,colors[2]]]);
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fill();
  const hg=ctx.createRadialGradient(cx,cy,0,cx,cy,R*.85);
  addStop(hg,[[0,`rgba(255,255,255,${.12+.05*Math.sin(throb)})`],[.55,'rgba(255,255,255,0)'],[1,'rgba(255,255,255,0)']]);
  ctx.fillStyle=hg;ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fill();
}

};

function drawBall(ctx,id,cx,cy,R,t=0){
  const tp=TYPES.find(x=>x.id===id)||TYPES[0];
  const fn=STYLES[tp.style]||STYLES.rock;
  ctx.save();ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.clip();
  fn(ctx,cx,cy,R,t,tp);
  if(id!=='void'){
    const h=ctx.createRadialGradient(cx-R*.3,cy-R*.38,0,cx-R*.15,cy-R*.2,R*.6);
    h.addColorStop(0,'rgba(255,255,255,.38)');h.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=h;ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
  const rar=tp.r;
  if(rar>=3){
    const rc=['','','','rgba(80,110,255,.7)','rgba(255,60,200,.8)','rgba(255,215,0,.9)'][rar];
    ctx.save();ctx.strokeStyle=rc;ctx.lineWidth=1.5;
    ctx.shadowColor=rc;ctx.shadowBlur=10;
    ctx.beginPath();ctx.arc(cx,cy,R+1,0,Math.PI*2);ctx.stroke();ctx.restore();
  }
}

// ─── PHYSICS ──────────────────────────────────────────────────────────
const GR=0.46,BNC=0.46,FRC=0.984,BR=26;
let balls=[],gtime=0;

const cv=document.getElementById('c');
function logW(){return cv.width/(window.devicePixelRatio||1);}
function logH(){return cv.height/(window.devicePixelRatio||1);}

function mkBall(type){
  return{type,x:logW()/2+(Math.random()-.5)*8,y:88,vx:(Math.random()-.5)*1.5,vy:.5,r:BR,collected:false};
}

function step(){
  const W=logW(),H=logH(),floor=H-BR-8;
  for(const b of balls){
    if(b.collected)continue;
    b.vy+=GR;b.x+=b.vx;b.y+=b.vy;
    if(b.y>=floor){b.y=floor;b.vy*=-BNC;b.vx*=FRC;if(Math.abs(b.vy)<0.8)b.vy=0;}
    if(b.x-b.r<0){b.x=b.r;b.vx=Math.abs(b.vx)*.65;}
    if(b.x+b.r>W){b.x=W-b.r;b.vx=-Math.abs(b.vx)*.65;}
    if(b.y-b.r<0){b.y=b.r;b.vy=Math.abs(b.vy)*.5;}
    for(const b2 of balls){
      if(b2===b||b2.collected)continue;
      const dx=b2.x-b.x,dy=b2.y-b.y,dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<b.r+b2.r&&dist>0){
        const nx=dx/dist,ny=dy/dist,ov=(b.r+b2.r-dist)/2;
        b.x-=nx*ov;b.y-=ny*ov;b2.x+=nx*ov;b2.y+=ny*ov;
        const rv=(b.vx-b2.vx)*nx+(b.vy-b2.vy)*ny;
        if(rv>0){b.vx-=rv*nx*.5;b.vy-=rv*ny*.5;b2.vx+=rv*nx*.5;b2.vy+=rv*ny*.5;}
      }
    }
  }
  balls=balls.filter(b=>!b.collected);
}

// ─── RENDER ───────────────────────────────────────────────────────────
function render(){
  const ctx=cv.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const W=logW(),H=logH();
  const th=getCurrentMine().theme;
  ctx.save();ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle=th.bg;ctx.fillRect(0,0,W,H);
  ctx.strokeStyle=th.grid;ctx.lineWidth=1;
  for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  const fg=ctx.createLinearGradient(0,H-50,0,H);
  fg.addColorStop(0,th.floorGlow[0]);fg.addColorStop(1,th.floorGlow[1]);
  ctx.fillStyle=fg;ctx.fillRect(0,H-50,W,50);
  ctx.strokeStyle=th.floorLine;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(0,H-8);ctx.lineTo(W,H-8);ctx.stroke();
  const dx=W/2;
  ctx.strokeStyle=th.chute;ctx.lineWidth=4;
  ctx.beginPath();ctx.moveTo(dx-18,0);ctx.lineTo(dx-18,88);ctx.stroke();
  ctx.beginPath();ctx.moveTo(dx+18,0);ctx.lineTo(dx+18,88);ctx.stroke();
  ctx.fillStyle=th.chuteBox;ctx.fillRect(dx-22,-4,44,20);
  ctx.strokeStyle=th.chuteStroke;ctx.lineWidth=2;ctx.strokeRect(dx-22,-4,44,20);
  for(const b of balls)drawBall(ctx,b.type.id,b.x,b.y,b.r,gtime);
  ctx.restore();
  gtime+=0.016;
}

function resizeCv(){
  const dpr=window.devicePixelRatio||1;
  const wrap=document.getElementById('cwrap');
  const W=wrap.clientWidth,H=wrap.clientHeight;
  if(cv.width!==W*dpr||cv.height!==H*dpr){cv.width=W*dpr;cv.height=H*dpr;}
}
function loop(){resizeCv();step();render();requestAnimationFrame(loop);}

// ─── INTERACTION ──────────────────────────────────────────────────────
function getXY(e,rect){
  const dpr=window.devicePixelRatio||1;
  const sx=cv.width/rect.width,sy=cv.height/rect.height;
  return[(e.clientX-rect.left)*sx/dpr,(e.clientY-rect.top)*sy/dpr];
}
cv.addEventListener('click',e=>{
  const rect=cv.getBoundingClientRect();
  const[x,y]=getXY(e,rect);
  for(let i=balls.length-1;i>=0;i--){
    const b=balls[i];
    if(!b.collected){
      const dx=b.x-x,dy=b.y-y;
      if(dx*dx+dy*dy<b.r*b.r){
        b.collected=true;
        if(b.type.id==='mystery'){
          const gain=5+Math.floor(Math.random()*26);
          addCredits(gain);
          S.mysteryLock={grant:gain,spent:0};
          save();updateUI();
          showPopup(b.type,{title:`BONUS +${gain} CREDITS`,color:'#7cf8ff',sub:'Mystery reward'});
        }else{
          addToCollection(b.type);
          showPopup(b.type);
        }
        break;
      }
    }
  }
});
cv.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.changedTouches[0];
  cv.dispatchEvent(new MouseEvent('click',{clientX:t.clientX,clientY:t.clientY}));
},{passive:false});

  mysteryLock:null,lastSeen:Date.now(),nextIn:30,
  mine:'shallows',unlockedMines:['shallows'],
};
let nextIn=30;

const UPGRADE_ITEMS=[
  {id:'clockwork',  name:'Clockwork Module', tier:'I',  reduce:3,dd:25, mats:{coal:2,iron:1,copper:1},          effect:'Reduces credit wait by 3s.'},

  {id:'silvercap',  name:'Silver Capacitor', tier:'III',reduce:4,dd:80, mats:{brassgov:1,silver:6,quartz:4,lapis:2},effect:'Reduces credit wait by 4s.'},

const CAP_CREDIT_ITEMS=[
  {id:'vault1',name:'Copper Vault',  tier:'I',  max:50,  dd:20, mats:{coal:4,copper:2,iron:1},             effect:'Raises max credits to 50.'},

];

const CAP_CREDIT_INDEX=Object.fromEntries(CAP_CREDIT_ITEMS.map(u=>[u.id,u]));
const UPGRADE_INDEX=Object.fromEntries(UPGRADE_ITEMS.map(u=>[u.id,u]));
const ORE_INDEX=Object.fromEntries(TYPES.map(t=>[t.id,t]));

function getCraftedCount(){return Array.isArray(S.upgrades)?S.upgrades.length:0;}
function getCapCraftedCount(){return Array.isArray(S.capUpgrades)?S.capUpgrades.length:0;}

function getOwnedAmount(id){
  if(ORE_INDEX[id])return S.col[id]||0;
  if(id in UPGRADE_INDEX)return(S.upgrades||[]).includes(id)?1:0;
  return S.col[id]||0;
}
function hasRequirement(id,amt){return getOwnedAmount(id)>=amt;}
function getReqLabel(id){
  if(ORE_INDEX[id])return ORE_INDEX[id].name;
  if(id in UPGRADE_INDEX)return UPGRADE_INDEX[id].name;
  return id;
}
function getOreLabel(id){
  const t=TYPES.find(x=>x.id===id);if(t)return t.name;
  if(id in UPGRADE_INDEX)return UPGRADE_INDEX[id].name;
  return id;
}
function getCreditInterval(){
  const reduce=(S.upgrades||[]).reduce((sum,id)=>sum+(UPGRADE_INDEX[id]?.reduce||0),0);
  return Math.max(8,30-reduce);
}
function getMaxCredits(){
  const tier=Array.isArray(S.capUpgrades)?S.capUpgrades.length:0;
  if(tier<=0)return 20;
  return CAP_CREDIT_ITEMS[Math.min(tier,CAP_CREDIT_ITEMS.length)-1]?.max??20;
}
function addCredits(amount){
  if(!Number.isFinite(amount)||amount<=0)return;
  S.credits=Math.min(getMaxCredits(),(S.credits||0)+amount);
}
function getMysteryLock(){
  if(!S.mysteryLock||typeof S.mysteryLock!=='object')return null;
  if(!Number.isFinite(S.mysteryLock.grant)||S.mysteryLock.grant<=0)return null;
  if(!Number.isFinite(S.mysteryLock.spent))S.mysteryLock.spent=0;
  if(S.mysteryLock.spent>=S.mysteryLock.grant){S.mysteryLock=null;return null;}
  return S.mysteryLock;
}
function mysteryAllowed(){return !getMysteryLock();}
function syncTimerToInterval(){
  const iv=getCreditInterval();
  if(!Number.isFinite(nextIn)||nextIn<=0)nextIn=iv;
  nextIn=Math.min(nextIn,iv);S.nextIn=nextIn;
}

// ─── SAVE / LOAD ──────────────────────────────────────────────────────
function save(){
  S.lastSeen=Date.now();S.nextIn=nextIn;
  try{localStorage.setItem('ore_g2',JSON.stringify(S));}catch(e){}
}
function load(){
  try{
    // Try new key, fall back to old
    const raw=localStorage.getItem('ore_g2')||localStorage.getItem('ore_g1');
    if(raw){
      const parsed=JSON.parse(raw);
      S={...S,...parsed,col:{...S.col,...(parsed.col||{})}};
      if(!Array.isArray(S.upgrades))S.upgrades=[];
      if(!Array.isArray(S.capUpgrades))S.capUpgrades=[];
      if(typeof S.sellAllMode!=='boolean')S.sellAllMode=false;
      if(typeof S.dd!=='number'||!Number.isFinite(S.dd))S.dd=0;
      if(typeof S.credits!=='number'||!Number.isFinite(S.credits))S.credits=10;
      S.credits=Math.min(S.credits,getMaxCredits());
      if(typeof S.lastSeen!=='number'||!Number.isFinite(S.lastSeen))S.lastSeen=Date.now();
      if(!S.mine)S.mine='shallows';
      if(!Array.isArray(S.unlockedMines))S.unlockedMines=['shallows'];
      if(!S.unlockedMines.includes('shallows'))S.unlockedMines.unshift('shallows');
      if(S.mysteryLock&&typeof S.mysteryLock==='object'){
        if(!Number.isFinite(S.mysteryLock.grant)||S.mysteryLock.grant<=0||S.mysteryLock.spent>=S.mysteryLock.grant)S.mysteryLock=null;
        else if(!Number.isFinite(S.mysteryLock.spent))S.mysteryLock.spent=0;
      }else S.mysteryLock=null;
      const secs=(Date.now()-S.lastSeen)/1000;
      const earn=Math.floor(secs/Math.max(1,getCreditInterval()));
      if(earn>0){addCredits(earn);S.lastSeen=Date.now();}
      nextIn=typeof S.nextIn==='number'&&Number.isFinite(S.nextIn)?S.nextIn:getCreditInterval();
      syncTimerToInterval();
    }else{nextIn=getCreditInterval();syncTimerToInterval();}
  }catch(e){nextIn=getCreditInterval();syncTimerToInterval();}
}

// ─── MINE PANEL ───────────────────────────────────────────────────────
function openMinePanel(){buildMinePanel();document.getElementById('mine-panel').classList.add('open');}
function closeMinePanel(){document.getElementById('mine-panel').classList.remove('open');}

function getMineRaritySet(mine){
  const seen=new Set();
  for(const o of mine.ores){
    const t=TYPES.find(x=>x.id===o.id);
    if(t&&t.id!=='mystery')seen.add(t.r);
  }
  return [...seen].sort((a,b)=>a-b);
}

function buildMinePanel(){
  const container=document.getElementById('mine-cards');
  container.innerHTML='';
  for(const mine of MINES){
    const isActive=S.mine===mine.id;
    const isUnlocked=S.unlockedMines.includes(mine.id);
    const canAfford=S.dd>=mine.unlockCost;

    const card=document.createElement('div');
    card.className='mcard'+(isActive?' active':'')+((!isUnlocked)?' locked-card':'');

    // Header
    const hdr=document.createElement('div');hdr.className='mcard-hdr';
    const icon=document.createElement('span');icon.className='mcard-icon';icon.textContent=mine.icon;
    const title=document.createElement('span');title.className='mcard-title';title.textContent=mine.name;
    const badge=document.createElement('span');badge.className='mcard-badge';
    if(isActive){badge.textContent='▶ Active';badge.classList.add('badge-active');}
    else if(isUnlocked){badge.textContent='Unlocked';badge.classList.add('badge-unlocked');}
    else{badge.textContent='🔒 Locked';badge.classList.add('badge-locked');}
    hdr.appendChild(icon);hdr.appendChild(title);hdr.appendChild(badge);
    card.appendChild(hdr);

    // Desc
    const desc=document.createElement('div');desc.className='mcard-desc';desc.textContent=mine.desc;
    card.appendChild(desc);

    // Stats
    const stats=document.createElement('div');stats.className='mcard-stats';
    const costStat=document.createElement('div');
    costStat.className='mstat'+(mine.rollCost>1?' expensive':'');
    costStat.innerHTML=`◈ <b>${mine.rollCost} credit${mine.rollCost>1?'s':''}</b> per roll`;
    stats.appendChild(costStat);
    if(mine.unlockCost>0){
      const unlockStat=document.createElement('div');unlockStat.className='mstat';
      unlockStat.innerHTML=isUnlocked?'<b style="color:#70c090">✓ Unlocked</b>':`Unlock: <b>${mine.unlockCost.toLocaleString()} DD</b>`;
      stats.appendChild(unlockStat);
    }else{
      const freeStat=document.createElement('div');freeStat.className='mstat';
      freeStat.innerHTML='<b style="color:#70c090">✓ Default Mine</b>';
      stats.appendChild(freeStat);
    }
    card.appendChild(stats);

    // Rarity chips
    const chips=document.createElement('div');chips.className='mrar-chips';
    const rarities=getMineRaritySet(mine);
    for(const r of rarities){
      const chip=document.createElement('span');chip.className='rchip';
      chip.textContent=RNAMES[r];
      chip.style.cssText=`color:${RCOLORS[r]};border-color:${RCOLORS[r]}55;background:${RCOLORS[r]}11`;
      chips.appendChild(chip);
    }
    card.appendChild(chips);

    // Featured
    const feat=document.createElement('div');feat.className='mfeatured';
    feat.innerHTML='Notable finds: '+mine.featured.map(n=>`<b>${n}</b>`).join(', ');
    card.appendChild(feat);

    // Action button
    const btn=document.createElement('button');btn.className='maction-btn';
    if(isActive){
      btn.textContent='Currently Active';btn.classList.add('current');
    }else if(isUnlocked){
      btn.textContent=`Switch to ${mine.name}`;btn.classList.add('select');
      btn.addEventListener('click',()=>{selectMine(mine.id);closeMinePanel();});
    }else{
      btn.textContent=`Unlock for ${mine.unlockCost.toLocaleString()} DD`;btn.classList.add('unlock');
      btn.disabled=!canAfford;
      if(!canAfford)btn.textContent+=` (need ${(mine.unlockCost-S.dd).toLocaleString()} more)`;
      btn.addEventListener('click',()=>{unlockMine(mine.id);});
    }
    card.appendChild(btn);
    container.appendChild(card);
  }
}

function selectMine(id){
  if(!S.unlockedMines.includes(id))return;
  S.mine=id;save();updateMineBar();
}

function unlockMine(id){
  const mine=MINES.find(m=>m.id===id);
  if(!mine||S.unlockedMines.includes(id))return;
  if(S.dd<mine.unlockCost)return;
  S.dd-=mine.unlockCost;
  S.unlockedMines.push(id);
  S.mine=id;
  save();updateUI();updateMineBar();
  buildMinePanel(); // refresh panel
}

function updateMineBar(){
  const mine=getCurrentMine();
  document.getElementById('mine-bar-icon').textContent=mine.icon;
  document.getElementById('mine-bar-name').textContent=mine.name;
  document.getElementById('mine-bar-cost').textContent=`◈ ${mine.rollCost} credit${mine.rollCost>1?'s':''} / roll`;
  const cost=mine.rollCost;
  document.getElementById('rcost').textContent=`◈ ${cost} credit${cost>1?'s':''} per roll`;
  document.getElementById('rbtn').disabled=S.credits<cost;
}

// ─── ROLL ─────────────────────────────────────────────────────────────
function roll(){
  const mine=getCurrentMine();
  const cost=mine.rollCost;
  if(S.credits<cost)return;
  S.credits-=cost;
  if(getMysteryLock()){
    S.mysteryLock.spent=Math.min(S.mysteryLock.grant,(S.mysteryLock.spent||0)+1);
    if(S.mysteryLock.spent>=S.mysteryLock.grant)S.mysteryLock=null;
  }
  save();updateUI();
  balls.push(mkBall(pickFromMine()));
}

// ─── COLLECTION ───────────────────────────────────────────────────────
function addToCollection(type){
  S.col[type.id]=(S.col[type.id]||0)+1;
  save();updateUI();
  if(document.getElementById('gal-view').style.display==='block'){buildInventory();buildWorkshop();buildCapWorkshop();}
}

function sellOre(id,amount=1){
  const type=TYPES.find(t=>t.id===id);
  const have=S.col[id]||0;
  if(!type||have<amount||amount<=0)return false;
  S.col[id]=have-amount;
  if(S.col[id]<=0)delete S.col[id];
  S.dd+=orePrice(type)*amount;
  save();updateUI();
  if(document.getElementById('gal-view').style.display==='block'){buildInventory();buildWorkshop();buildCapWorkshop();}
  return true;
}

function toggleSellMode(){
  S.sellAllMode=!S.sellAllMode;save();updateUI();buildInventory();
}

// ─── CRAFTING ─────────────────────────────────────────────────────────
function canCraftUpgrade(up){
  const idx=UPGRADE_ITEMS.findIndex(u=>u.id===up.id);
  if(idx!==getCraftedCount())return false;
  if(S.dd<up.dd)return false;
  for(const[id,amt]of Object.entries(up.mats)){if(!hasRequirement(id,amt))return false;}
  return true;
}
function consumeMaterials(mats){
  for(const[id,amt]of Object.entries(mats)){
    if(ORE_INDEX[id]){S.col[id]=(S.col[id]||0)-amt;if(S.col[id]<=0)delete S.col[id];continue;}
    if(id in UPGRADE_INDEX)continue;
    S.col[id]=(S.col[id]||0)-amt;if(S.col[id]<=0)delete S.col[id];
  }
}
function craftUpgrade(id){
  const up=UPGRADE_INDEX[id];if(!up)return false;
  const idx=UPGRADE_ITEMS.findIndex(u=>u.id===id);
  if(idx!==getCraftedCount())return false;
  if(!canCraftUpgrade(up))return false;
  S.dd-=up.dd;consumeMaterials(up.mats);S.upgrades.push(id);
  syncTimerToInterval();save();updateUI();buildInventory();buildWorkshop();buildCapWorkshop();
  return true;
}
function canCraftCapUpgrade(up){
  const idx=CAP_CREDIT_ITEMS.findIndex(u=>u.id===up.id);
  if(idx!==getCapCraftedCount())return false;
  if(S.dd<up.dd)return false;
  for(const[id,amt]of Object.entries(up.mats)){if((S.col[id]||0)<amt)return false;}
  return true;
}
function craftCapUpgrade(id){
  const up=CAP_CREDIT_INDEX[id];if(!up)return false;
  const idx=CAP_CREDIT_ITEMS.findIndex(u=>u.id===id);
  if(idx!==getCapCraftedCount())return false;
  if(!canCraftCapUpgrade(up))return false;
  S.dd-=up.dd;consumeMaterials(up.mats);S.capUpgrades.push(id);
  S.credits=Math.min(S.credits,getMaxCredits());
  save();updateUI();buildInventory();buildCapWorkshop();
  return true;
}

// ─── UI BUILDERS ──────────────────────────────────────────────────────
function buildInventory(){
  const grid=document.getElementById('ggrid');
  grid.innerHTML='';
  const col=TYPES.filter(t=>S.col[t.id]);
  if(!col.length){
    grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--dim);font-size:.8rem">No ores collected yet.<br>Tap balls in the dispenser to start filling your inventory!</div>';
    return;
  }
  col.sort((a,b)=>b.r-a.r||S.col[b.id]-S.col[a.id]);
  for(const type of col){
    const cnt=S.col[type.id];
    const price=orePrice(type);
    const div=document.createElement('div');div.className=`gi r${type.r}`;
    const c=document.createElement('canvas');c.width=60;c.height=60;c.dataset.tid=type.id;
    drawBall(c.getContext('2d'),type.id,30,30,26,gtime);
    div.appendChild(c);

    // ── FIX: ore name now shown ──
    const nm=document.createElement('div');nm.className='gname';nm.textContent=type.name;
    const gr=document.createElement('div');gr.className='gr';gr.textContent=RNAMES[type.r];
    const gc=document.createElement('div');gc.className='gc';gc.textContent=`${price} DD each`;
    const cntEl=document.createElement('div');cntEl.className='cnt';cntEl.textContent=`Owned ×${cnt}`;

    const btn=document.createElement('button');btn.className='sellbtn';
    btn.textContent=S.sellAllMode?'Sell All':'Sell 1';btn.disabled=cnt<1;
    btn.addEventListener('click',()=>sellOre(type.id,S.sellAllMode?(S.col[type.id]||0):1));

    div.appendChild(nm);div.appendChild(gr);div.appendChild(gc);div.appendChild(cntEl);div.appendChild(btn);
    grid.appendChild(div);
  }
}

function makeMiniBall(id,size=28){
  const c=document.createElement('canvas');c.width=size;c.height=size;
  const ctx=c.getContext('2d');
  const type=TYPES.find(t=>t.id===id);
  if(type){drawBall(ctx,id,size/2,size/2,size/2-2,gtime);}
  else{
    const g=ctx.createRadialGradient(size*.3,size*.3,0,size/2,size/2,size/2);
    g.addColorStop(0,'#4b4f57');g.addColorStop(.5,'#2b2f35');g.addColorStop(1,'#111418');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(size/2,size/2,size/2-2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.75)';
    ctx.font=`bold ${Math.max(10,size*.28)}px Georgia,serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('⚙',size/2,size/2+1);
  }
  return c;
}

function makeRecipeToken(id,amt){
  const tok=document.createElement('div');tok.className='reqtok';
  const enough=hasRequirement(id,amt);if(!enough)tok.classList.add('locked');
  tok.appendChild(makeMiniBall(id,28));
  const qty=document.createElement('div');qty.className='qty';qty.textContent=`×${amt}`;tok.appendChild(qty);
  const lbl=document.createElement('div');lbl.className='lbl';lbl.textContent=getReqLabel(id);tok.appendChild(lbl);
  return tok;
}

function buildRecipeRow(mats){
  const wrap=document.createElement('div');wrap.className='recipe';
  const row=document.createElement('div');row.className='reqs';
  for(const[id,amt]of Object.entries(mats))row.appendChild(makeRecipeToken(id,amt));
  wrap.appendChild(row);return wrap;
}

function buildWorkshop(){
  const grid=document.getElementById('shopgrid');grid.innerHTML='';
  const crafted=getCraftedCount();
  for(let i=0;i<UPGRADE_ITEMS.length;i++){
    const up=UPGRADE_ITEMS[i];
    const owned=S.upgrades.includes(up.id),active=i===crafted,locked=i>crafted;
    const card=document.createElement('div');card.className=`shopcard ${owned?'owned':''} ${locked?'locked':''}`;
    const badge=document.createElement('div');badge.className='shopbadge';
    badge.textContent=owned?'Crafted':(active?'Available':`Tier ${up.tier}`);card.appendChild(badge);
    const name=document.createElement('div');name.className='shopname';name.textContent=up.name;card.appendChild(name);
    const meta=document.createElement('div');meta.className='shopmeta';meta.textContent=`Tier ${up.tier} · -${up.reduce}s credit wait`;card.appendChild(meta);
    const eff=document.createElement('div');eff.className='shopeff';eff.textContent=up.effect;card.appendChild(eff);
    const req=document.createElement('div');req.className='shopreq';
    if(owned){req.textContent='Already installed. The factory cycle bonus is active.';}
    else if(locked){req.textContent=`Locked. Craft ${UPGRADE_ITEMS[i-1].name} first.`;}
    else{
      req.appendChild(buildRecipeRow(up.mats));
      const ml=document.createElement('div');ml.className='recmeta';
      ml.textContent=`Recipe icons show what you need. Grey = not enough yet. Cost: ${up.dd} DD`;req.appendChild(ml);
    }
    card.appendChild(req);
    const btn=document.createElement('button');btn.className='craftbtn';
    if(owned){btn.textContent='Crafted';btn.disabled=true;}
    else if(locked){btn.textContent='Locked';btn.disabled=true;}
    else{btn.textContent=`Craft for ${up.dd} DD`;btn.disabled=!canCraftUpgrade(up);btn.addEventListener('click',()=>craftUpgrade(up.id));}
    card.appendChild(btn);grid.appendChild(card);
  }
}

function buildCapWorkshop(){
  const grid=document.getElementById('capgrid');if(!grid)return;grid.innerHTML='';
  const crafted=getCapCraftedCount();
  for(let i=0;i<CAP_CREDIT_ITEMS.length;i++){
    const up=CAP_CREDIT_ITEMS[i];
    const owned=S.capUpgrades.includes(up.id),active=i===crafted,locked=i>crafted;
    const card=document.createElement('div');card.className=`shopcard ${owned?'owned':''} ${locked?'locked':''}`;
    const badge=document.createElement('div');badge.className='shopbadge';
    badge.textContent=owned?'Crafted':(active?'Available':`Tier ${up.tier}`);card.appendChild(badge);
    const name=document.createElement('div');name.className='shopname';name.textContent=up.name;card.appendChild(name);
    const meta=document.createElement('div');meta.className='shopmeta';meta.textContent=`Tier ${up.tier} · Max ${up.max} credits`;card.appendChild(meta);
    const eff=document.createElement('div');eff.className='shopeff';eff.textContent=up.effect;card.appendChild(eff);
    const req=document.createElement('div');req.className='shopreq';
    if(owned){req.textContent=`Installed. Credit cap is now ${getMaxCredits()}.`;}
    else if(locked){req.textContent=`Locked. Craft ${CAP_CREDIT_ITEMS[i-1].name} first.`;}
    else{
      req.appendChild(buildRecipeRow(up.mats));
      const ml=document.createElement('div');ml.className='recmeta';
      ml.textContent=`Raises your credit cap to ${up.max}. Cost: ${up.dd} DD`;req.appendChild(ml);
    }
    card.appendChild(req);
    const btn=document.createElement('button');btn.className='craftbtn';
    if(owned){btn.textContent='Crafted';btn.disabled=true;}
    else if(locked){btn.textContent='Locked';btn.disabled=true;}
    else{btn.textContent=`Craft for ${up.dd} DD`;btn.disabled=!canCraftCapUpgrade(up);btn.addEventListener('click',()=>craftCapUpgrade(up.id));}
    card.appendChild(btn);grid.appendChild(card);
  }
}

// Animate inventory canvases
setInterval(()=>{
  if(document.getElementById('gal-view').style.display==='block'){
    document.querySelectorAll('#ggrid canvas[data-tid]').forEach(c=>{
      const ctx=c.getContext('2d');ctx.clearRect(0,0,60,60);
      drawBall(ctx,c.dataset.tid,30,30,26,gtime);
    });
  }
},50);

// ─── MAIN UI UPDATE ───────────────────────────────────────────────────
function updateUI(){
  document.getElementById('cred-count').textContent=`${S.credits} / ${getMaxCredits()}`;
  document.getElementById('dd-count').textContent=S.dd;
  const pill=document.getElementById('dd-pill-count');if(pill)pill.textContent=S.dd;
  const cyc=document.getElementById('cycle-count');if(cyc)cyc.textContent=`${getCreditInterval()}s`;
  const sellBtn=document.getElementById('sellmode-btn');
  if(sellBtn){sellBtn.textContent=S.sellAllMode?'Sell All':'Sell 1';sellBtn.classList.toggle('on',S.sellAllMode);}
  updateMineBar();
}

// Credit timer
setInterval(()=>{
  const iv=getCreditInterval();
  if(nextIn>iv)nextIn=iv;
  nextIn--;
  if(nextIn<=0){nextIn=iv;addCredits(1);save();updateUI();}
  else S.nextIn=nextIn;
  document.getElementById('tmr').textContent=`+1 in ${Math.max(0,Math.ceil(nextIn))}s`;
  updateUI();
},1000);

// ─── TABS ─────────────────────────────────────────────────────────────
function switchTab(tab){
  document.getElementById('game').style.display=tab==='game'?'flex':'none';
  document.getElementById('gal-view').style.display=tab==='gal'?'block':'none';
  document.getElementById('tab-game').className='tab'+(tab==='game'?' on':'');
  document.getElementById('tab-gal').className='tab'+(tab==='gal'?' on':'');
  if(tab==='gal'){buildInventory();buildWorkshop();buildCapWorkshop();}
}
