<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#080604">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Ore Gacha</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap');

:root{
  --bg:#05040A;
  --bg2:#08070F;
  --surf:#0D0C16;
  --surf2:#121120;
  --brd:#1E1B30;
  --brd2:#2A2640;
  --gold:#C9A227;
  --gold2:#E8C84A;
  --golddim:#7A5F14;
  --txt:#C8C0D8;
  --dim:#5A5470;
  --dim2:#7A7090;
  --cyan:#7CF8FF;
  --cyandim:#1A4A50;
  --r0clr:#686870;
  --r1clr:#A0A8B0;
  --r2clr:#38B8A0;
  --r3clr:#7888FF;
  --r4clr:#FF5AAA;
  --r5clr:#FFD800;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:'Crimson Pro','Georgia',serif;touch-action:manipulation;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
body{display:flex;flex-direction:column;height:100dvh;}
button,.tab,.gi,#c{touch-action:manipulation;-webkit-user-select:none;user-select:none;}

/* ── HEADER ── */
#hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;height:52px;flex-shrink:0;
  background:linear-gradient(180deg,#0A091A 0%,#080714 100%);
  border-bottom:1px solid var(--brd2);
  position:relative;
}
#hdr::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--golddim),transparent);
}
#ttl{
  font-family:'Cinzel',serif;font-size:.85rem;letter-spacing:5px;
  text-transform:uppercase;color:var(--gold);
  text-shadow:0 0 20px rgba(201,162,39,.5),0 0 40px rgba(201,162,39,.2);
}
#cred-box{display:flex;align-items:center;gap:10px;}
.stat-pill{
  display:flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:6px;
  background:rgba(255,255,255,.04);border:1px solid var(--brd2);
  font-size:.78rem;line-height:1;
}
.stat-pill .sp-icon{font-size:.7rem;opacity:.7;}
.stat-pill .sp-val{font-family:'Cinzel',serif;font-weight:600;font-size:.85rem;}
.stat-pill.sp-credits .sp-val{color:var(--gold);}
.stat-pill.sp-dd .sp-val{color:var(--cyan);}
#tmr{font-size:.6rem;color:var(--dim);letter-spacing:.5px;min-width:52px;text-align:right;line-height:1.3;}

/* ── TABS ── */
#tabs{
  display:flex;flex-shrink:0;
  background:var(--bg2);
  border-bottom:1px solid var(--brd);
  padding:0 8px;
  gap:4px;
}
.tab{
  flex:1;padding:10px 6px 9px;text-align:center;
  font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:3px;text-transform:uppercase;
  cursor:pointer;color:var(--dim);
  transition:color .25s,background .25s;
  border-bottom:2px solid transparent;
  border-radius:6px 6px 0 0;
  margin-top:4px;
}
.tab.on{color:var(--gold);border-bottom-color:var(--gold);background:rgba(201,162,39,.06);}
.tab:hover:not(.on){color:var(--dim2);}

/* ── GAME AREA ── */
#game{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;}

/* ── MINE BAR ── */
#mine-bar{
  display:flex;align-items:center;gap:10px;padding:7px 14px;flex-shrink:0;
  background:linear-gradient(90deg,var(--surf) 0%,rgba(13,12,22,0) 100%);
  border-bottom:1px solid var(--brd);
}
#mine-bar-icon{font-size:1rem;line-height:1;flex-shrink:0;}
#mine-bar-name{
  flex:1;font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:2px;
  text-transform:uppercase;color:var(--gold);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
#mine-bar-cost{
  font-size:.6rem;color:var(--dim2);white-space:nowrap;flex-shrink:0;
  background:rgba(255,255,255,.03);padding:2px 8px;border-radius:4px;border:1px solid var(--brd);
}
#mine-switch-btn{
  border:1px solid var(--brd2);background:transparent;color:var(--dim2);
  border-radius:5px;padding:5px 11px;
  font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:2px;text-transform:uppercase;
  cursor:pointer;transition:all .2s;flex-shrink:0;
}
#mine-switch-btn:hover{color:var(--gold);border-color:var(--golddim);background:rgba(201,162,39,.06);}

/* ── CANVAS ── */
#cwrap{flex:1;position:relative;min-height:0;}
#c{position:absolute;top:0;left:0;width:100%;height:100%;cursor:crosshair;}
#hint{
  position:absolute;bottom:14px;left:0;right:0;text-align:center;
  font-size:.62rem;color:var(--dim);pointer-events:none;
  font-style:italic;letter-spacing:1px;
  text-shadow:0 1px 8px rgba(0,0,0,.8);
}

/* ── ROLL BAR ── */
#rollbar{
  padding:12px 16px;
  background:linear-gradient(0deg,#08070F 0%,#0A0918 100%);
  border-top:1px solid var(--brd2);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
  gap:12px;
}
#rcost{
  font-size:.72rem;color:var(--dim2);letter-spacing:.5px;
  display:flex;flex-direction:column;gap:2px;
}
#rcost-label{font-size:.56rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--dim);font-family:'Cinzel',serif;}
#rbtn{
  background:linear-gradient(135deg,#3A2208,#C9A227 40%,#E8C84A 50%,#C9A227 60%,#3A2208);
  border:none;color:#0A0603;
  padding:12px 36px;
  font-family:'Cinzel',serif;font-size:.9rem;letter-spacing:4px;text-transform:uppercase;font-weight:700;
  cursor:pointer;border-radius:4px;
  box-shadow:0 0 24px rgba(201,162,39,.35),0 2px 0 rgba(0,0,0,.5);
  transition:box-shadow .2s,transform .1s,opacity .2s;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  min-width:130px;position:relative;overflow:hidden;
}
#rbtn::before{
  content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);
  transition:left .5s;
}
#rbtn:hover:not(:disabled)::before{left:150%;}
#rbtn:hover:not(:disabled){box-shadow:0 0 40px rgba(201,162,39,.6),0 2px 0 rgba(0,0,0,.5);}
#rbtn:active:not(:disabled){transform:translateY(1px);}
#rbtn:disabled{opacity:.3;cursor:not-allowed;}
#rbtn .rbtn-main{display:block;line-height:1;}
#rbtn .rbtn-sub{font-family:'Crimson Pro',serif;font-size:.62rem;line-height:1;letter-spacing:1px;color:#0a0603;opacity:.7;}

/* ── GALLERY / INVENTORY ── */
#gal-view{flex:1;display:none;flex-direction:column;overflow:hidden;min-height:0;}
#gal-view
/* ── VAULT SUB-TABS ── */
#vault-tabs{
  display:flex;gap:4px;margin-bottom:14px;
  background:rgba(0,0,0,.3);border:1px solid var(--brd);
  border-radius:10px;padding:4px;flex-shrink:0;
}
.vtab{
  flex:1;padding:7px 4px;border:none;border-radius:7px;cursor:pointer;
  font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:2px;text-transform:uppercase;
  background:transparent;color:var(--dim2);
  transition:background .2s,color .2s;
}
.vtab.on{background:var(--surf2);color:var(--gold);box-shadow:0 1px 6px rgba(0,0,0,.4);}
.vtab:hover:not(.on){color:var(--txt);}
.vault-panel{display:flex;flex-direction:column;flex:1;overflow-y:auto;padding:0 12px 14px;gap:0;scrollbar-width:thin;scrollbar-color:var(--brd2) transparent;}
#vault-tabs{margin:12px 12px 0;}

/* ── UPGRADE TRACKS ── */
.upgrade-tracks{display:flex;flex-direction:column;gap:16px;padding-top:14px;}
.utrack{background:var(--surf);border:1px solid var(--brd2);border-radius:12px;overflow:hidden;}
.utrack-rail-wrap{position:relative;}
.utrack-rail-wrap::after{
  content:'';position:absolute;top:0;right:0;bottom:0;width:40px;pointer-events:none;
  background:linear-gradient(90deg,transparent,var(--surf));border-radius:0 0 12px 0;
}
.utrack-hdr{
  display:flex;align-items:center;gap:11px;
  padding:11px 14px 10px;border-bottom:1px solid var(--brd);background:rgba(0,0,0,.2);
}
.utrack-icon{font-size:1.1rem;line-height:1;flex-shrink:0;opacity:.8;}
.utrack-title{font-family:'Cinzel',serif;font-size:.75rem;letter-spacing:1.5px;color:var(--txt);font-weight:600;}
.utrack-sub{font-size:.58rem;color:var(--dim2);text-transform:uppercase;letter-spacing:1.5px;font-family:'Cinzel',serif;margin-top:1px;}
.utrack-rail{display:flex;align-items:stretch;overflow-x:auto;scrollbar-width:none;padding:0;position:relative;}
.utrack-rail::-webkit-scrollbar{display:none;}
.utrack-rail::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:var(--brd2);transform:translateY(-50%);pointer-events:none;z-index:0;}
.tier-node{display:flex;flex-direction:column;align-items:center;min-width:90px;flex-shrink:0;padding:14px 8px 10px;position:relative;z-index:1;}
.tier-node.node-done{opacity:.5;}
.tier-node.node-locked{opacity:.28;filter:grayscale(.9);}
.tier-dot{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Cinzel',serif;font-size:.6rem;font-weight:700;
  border:2px solid var(--brd2);background:var(--bg2);
  position:relative;z-index:1;flex-shrink:0;
}
.tier-node.node-done .tier-dot{background:rgba(20,40,20,.7);border-color:rgba(70,160,100,.5);color:rgba(112,200,144,.9);}
.tier-node.node-next .tier-dot{border-color:var(--golddim);background:rgba(50,35,8,.8);color:var(--gold);box-shadow:0 0 16px rgba(201,162,39,.4);}
.tier-node.node-locked .tier-dot{color:var(--dim);}
.tier-name{font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:.5px;color:var(--txt);margin-top:7px;text-align:center;line-height:1.3;max-width:80px;}
.tier-node.node-done .tier-name{color:var(--dim2);}
.tier-node.node-locked .tier-name{color:var(--dim);}
.tier-stat{font-size:.56rem;color:var(--dim2);margin-top:3px;text-align:center;letter-spacing:.3px;line-height:1.3;}
.tier-node.node-next .tier-stat{color:var(--cyan);opacity:.9;}
.tier-node.node-next{cursor:pointer;}
.tier-node.node-next:active .tier-dot{transform:scale(.94);}
.tier-tap-hint{font-size:.46rem;color:var(--golddim);text-transform:uppercase;letter-spacing:1px;margin-top:4px;font-family:'Cinzel',serif;}

/* Slide-up craft drawer */
.tier-craft{
  display:none;position:fixed;bottom:0;left:0;right:0;z-index:500;
  background:linear-gradient(0deg,#08070F 0%,#0D0C1C 100%);
  border-top:1px solid var(--brd2);
  padding:14px 16px 24px;
  box-shadow:0 -12px 40px rgba(0,0,0,.7);
  animation:slideUp .22s ease;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.tier-craft.open{display:block;}
.tier-craft-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.tier-craft-name{font-family:'Cinzel',serif;font-size:.82rem;letter-spacing:1.5px;color:var(--gold);font-weight:600;}
.tier-craft-close{border:1px solid var(--brd2);background:transparent;color:var(--dim2);border-radius:5px;padding:4px 10px;font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:1px;cursor:pointer;}
.tier-craft-body{display:flex;flex-direction:column;gap:10px;}
.tier-craft-effect{font-size:.68rem;color:var(--cyan);line-height:1.4;}
.tier-craft-cost{font-size:.64rem;color:var(--dim2);font-style:italic;}

/* Auto-sell filter section */
#autosell-filter-wrap{margin-top:12px;background:var(--surf);border:1px solid var(--brd2);border-radius:12px;overflow:hidden;}
.afs-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--brd);background:rgba(0,0,0,.2);}
.afs-title{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:2px;text-transform:uppercase;color:var(--gold);}
.afs-count{font-family:'Cinzel',serif;font-size:.6rem;color:var(--dim2);letter-spacing:1px;}
.afs-note{padding:8px 14px;font-size:.64rem;color:var(--dim2);font-style:italic;border-bottom:1px solid var(--brd);}
.afs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:6px;padding:10px;max-height:230px;overflow-y:auto;}

::-webkit-scrollbar{width:4px;}
#gal-view::-webkit-scrollbar-track{background:transparent;}
#gal-view::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:2px;}

/* ── INV TOP STATS BAR ── */
#inv-top{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:10px 12px;margin-bottom:14px;margin-top:14px;
  background:var(--surf);border:1px solid var(--brd2);border-radius:10px;
  flex-wrap:wrap;
}
.inv-stat{display:flex;flex-direction:column;gap:1px;min-width:60px;}
.inv-stat-label{font-family:'Cinzel',serif;font-size:.5rem;letter-spacing:2px;text-transform:uppercase;color:var(--dim);}
.inv-stat-val{font-family:'Cinzel',serif;font-size:.95rem;font-weight:600;}
.inv-stat-val.gold{color:var(--gold);}
.inv-stat-val.cyan{color:var(--cyan);}
#inv-actions{display:flex;align-items:center;gap:7px;flex-wrap:wrap;justify-content:flex-end;}
.modebtn{
  border:1px solid var(--brd2);border-radius:5px;padding:6px 12px;cursor:pointer;
  background:rgba(255,255,255,.04);color:var(--txt);
  font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:2px;text-transform:uppercase;
  transition:all .2s;
}
.modebtn.on{background:rgba(44,113,143,.2);border-color:#2f718f;color:#dff9ff;}
.modebtn:hover{filter:brightness(1.15);}

/* ── SECTION HEADS ── */
.shophead{
  display:flex;align-items:center;gap:10px;
  margin:18px 0 10px;
  font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:3px;text-transform:uppercase;color:var(--gold);
}
.shophead::before,.shophead::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--golddim),transparent);}
.shophead::after{background:linear-gradient(90deg,transparent,var(--golddim));}

/* ── ORE GRID ── */
.ggrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;}
.gi{
  background:var(--surf);border-radius:10px;padding:10px 8px;text-align:center;
  cursor:default;border:1px solid;
  transition:transform .18s,box-shadow .18s;
  position:relative;overflow:hidden;
}
.gi::before{
  content:'';position:absolute;inset:0;border-radius:10px;
  background:radial-gradient(circle at 50% 0%,rgba(255,255,255,.04),transparent 60%);
  pointer-events:none;
}
.gi:hover{transform:translateY(-2px);}
.gi canvas{display:block;margin:0 auto;}
.gi .gname{font-family:'Cinzel',serif;font-size:.72rem;font-weight:600;color:var(--txt);margin-top:7px;letter-spacing:.5px;}
.gi .gr{font-size:.56rem;color:var(--dim2);margin-top:2px;text-transform:uppercase;letter-spacing:1.5px;font-family:'Cinzel',serif;}
.gi .gc{font-size:.68rem;color:var(--gold);margin-top:5px;letter-spacing:.3px;}
.gi .cnt{font-size:.7rem;color:var(--cyan);margin-top:2px;letter-spacing:.3px;}
.sellbtn{
  width:100%;margin-top:8px;padding:6px 6px;border:none;border-radius:6px;
  background:linear-gradient(135deg,#0E2535,#1E5A7A 50%,#0E2535);color:#C9F0FF;
  font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:1.5px;text-transform:uppercase;
  cursor:pointer;transition:filter .2s,box-shadow .2s;
}
.sellbtn:hover{filter:brightness(1.2);box-shadow:0 0 10px rgba(44,113,143,.4);}
.sellbtn:disabled{opacity:.3;cursor:not-allowed;}

/* Rarity borders & glows */
.r0{border-color:rgba(104,104,112,.4);}
.r1{border-color:rgba(160,168,176,.45);}
.r2{border-color:rgba(56,184,160,.5);}.r2:hover{box-shadow:0 4px 16px rgba(56,184,160,.2);}
.r3{border-color:rgba(120,136,255,.55);}.r3:hover{box-shadow:0 4px 16px rgba(120,136,255,.25);}
.r4{border-color:rgba(255,90,170,.6);box-shadow:0 0 8px rgba(255,90,170,.12);}.r4:hover{box-shadow:0 4px 20px rgba(255,90,170,.35);}
.r5{border-color:rgba(255,216,0,.7);box-shadow:0 0 12px rgba(255,216,0,.2),0 0 1px rgba(255,216,0,.8) inset;}.r5:hover{box-shadow:0 4px 24px rgba(255,216,0,.4);}

/* ── WORKSHOP CARDS ── */
.shopgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:4px;}
.shopcard{
  background:var(--surf);border:1px solid var(--brd2);border-radius:12px;
  padding:12px;display:flex;flex-direction:column;gap:7px;
  position:relative;overflow:hidden;
}
.shopcard::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--brd2),transparent);
}
.shopcard.locked{opacity:.58;filter:saturate(.7);}
.shopcard.owned{border-color:rgba(45,143,117,.5);box-shadow:0 0 0 1px rgba(60,255,190,.08) inset;}
.shopname{font-family:'Cinzel',serif;font-size:.82rem;letter-spacing:.5px;color:var(--txt);font-weight:600;}
.shopmeta{font-size:.6rem;color:var(--dim2);text-transform:uppercase;letter-spacing:1.5px;font-family:'Cinzel',serif;}
.shopeff{font-size:.7rem;color:var(--cyan);line-height:1.4;opacity:.9;}
.shopreq{font-size:.65rem;color:var(--dim2);line-height:1.4;}
.shopbadge{
  display:inline-flex;align-items:center;width:max-content;
  padding:3px 9px;border-radius:4px;
  background:rgba(44,86,114,.25);border:1px solid rgba(45,86,114,.6);
  color:#A0D8F0;font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:1.5px;text-transform:uppercase;
}
.craftbtn{
  width:100%;margin-top:2px;padding:9px 10px;border:none;border-radius:7px;
  background:linear-gradient(135deg,#3A2208,#C9A227 50%,#3A2208);color:#0b0603;
  font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;
  cursor:pointer;transition:filter .2s,box-shadow .2s;
  box-shadow:0 2px 10px rgba(201,162,39,.2);
}
.craftbtn:hover:not(:disabled){filter:brightness(1.12);box-shadow:0 2px 18px rgba(201,162,39,.4);}
.craftbtn:disabled{opacity:.35;cursor:not-allowed;box-shadow:none;}

/* ── RECIPE TOKENS ── */
.recipe{display:flex;flex-direction:column;gap:6px;}
.reqs{display:flex;flex-wrap:wrap;gap:5px;align-items:flex-start;}
.reqtok{
  width:48px;min-height:62px;display:flex;flex-direction:column;align-items:center;
  justify-content:flex-start;gap:3px;padding:6px 4px 4px;border-radius:9px;
  background:rgba(0,0,0,.3);border:1px solid var(--brd2);color:var(--txt);
}
.reqtok.locked{opacity:.35;filter:grayscale(1);}
.reqtok canvas{display:block;}
.reqtok .qty{font-family:'Cinzel',serif;font-size:.6rem;line-height:1;color:var(--gold);}
.reqtok .lbl{font-size:.5rem;line-height:1;color:var(--dim2);text-transform:uppercase;
  letter-spacing:.5px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.recmeta{font-size:.64rem;color:var(--dim);line-height:1.3;font-style:italic;}

/* ── AUTOSELL ── */
.autosell-note{font-size:.65rem;color:var(--dim2);line-height:1.4;margin-top:2px;font-style:italic;}
.autosell-config{margin-top:12px;padding-top:12px;border-top:1px solid var(--brd);display:flex;flex-direction:column;gap:8px;}
.autosell-config-hdr{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;}
.autosell-config-title{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:2px;text-transform:uppercase;color:var(--gold);}
.autosell-config-count{font-size:.6rem;color:var(--dim2);text-transform:uppercase;letter-spacing:1px;font-family:'Cinzel',serif;}
.autosell-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:5px;max-height:190px;overflow-y:auto;padding-right:2px;}
.autosell-chip{
  display:flex;align-items:center;gap:7px;
  background:rgba(0,0,0,.25);border:1px solid var(--brd);border-radius:8px;
  padding:6px 7px;cursor:pointer;min-width:0;
  transition:border-color .18s,background .18s;
}
.autosell-chip canvas{flex-shrink:0;}

  content:'';position:absolute;top:0;right:0;bottom:0;width:40px;pointer-events:none;

}

.tier-node{display:flex;flex-direction:column;align-items:center;min-width:90px;flex-shrink:0;padding:14px 8px 10px;position:relative;z-index:1;}

.tier-node.node-locked{opacity:.28;filter:grayscale(.9);}
.tier-dot{
  width:36px;height:36px;border-radius:50%;

  font-family:'Cinzel',serif;font-size:.6rem;font-weight:700;

}
.tier-node.node-done .tier-dot{background:rgba(20,40,20,.7);border-color:rgba(70,160,100,.5);color:rgba(112,200,144,.9);}

.tier-node.node-locked .tier-dot{color:var(--dim);}
.tier-name{font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:.5px;color:var(--txt);margin-top:7px;text-align:center;line-height:1.3;max-width:80px;}
.tier-node.node-done .tier-name{color:var(--dim2);}
.tier-node.node-locked .tier-name{color:var(--dim);}
.tier-stat{font-size:.56rem;color:var(--dim2);margin-top:3px;text-align:center;letter-spacing:.3px;line-height:1.3;}
.tier-node.node-next .tier-stat{color:var(--cyan);opacity:.9;}
.tier-node.node-next{cursor:pointer;}
.tier-node.node-next:active .tier-dot{transform:scale(.94);}
.tier-tap-hint{font-size:.46rem;color:var(--golddim);text-transform:uppercase;letter-spacing:1px;margin-top:4px;font-family:'Cinzel',serif;}

/* Slide-up craft drawer */
.tier-craft{
  display:none;position:fixed;bottom:0;left:0;right:0;z-index:500;
  background:linear-gradient(0deg,#08070F 0%,#0D0C1C 100%);
  border-top:1px solid var(--brd2);
  padding:14px 16px 24px;
  box-shadow:0 -12px 40px rgba(0,0,0,.7);
  animation:slideUp .22s ease;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.tier-craft.open{display:block;}
.tier-craft-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.tier-craft-name{font-family:'Cinzel',serif;font-size:.82rem;letter-spacing:1.5px;color:var(--gold);font-weight:600;}
.tier-craft-close{border:1px solid var(--brd2);background:transparent;color:var(--dim2);border-radius:5px;padding:4px 10px;font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:1px;cursor:pointer;}
.tier-craft-body{display:flex;flex-direction:column;gap:10px;}
.tier-craft-effect{font-size:.68rem;color:var(--cyan);line-height:1.4;}
.tier-craft-cost{font-size:.64rem;color:var(--dim2);font-style:italic;}

/* Auto-sell filter section */

.afs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:6px;padding:10px;max-height:230px;overflow-y:auto;}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:2px;}

function getCurrentMine(){ return MINES.find(m=>m.id===S.mine)||MINES[0]; }

function pickFromMine(){
  const mine = getCurrentMine();
  const pool = mysteryAllowed() ? mine.ores : mine.ores.filter(o=>o.id!=='mystery');
  const totW = pool.reduce((s,o)=>s+o.w,0);
  let v = Math.random()*totW;
  for(const o of pool){
    v -= o.w;
    if(v<=0){ const t=TYPES.find(x=>x.id===o.id); return t||TYPES[0]; }
  }
  const t=TYPES.find(x=>x.id===pool[0].id);
  return t||TYPES[0];
}


function getMineTotalWeight(mine){
  return (mine.ores||[]).reduce((sum,o)=>sum+(o.w||0),0);
}
function buildMineOreList(mine){
  const total=getMineTotalWeight(mine);
  const wrap=document.createElement('div');
  wrap.className='mcard-ores';
  const title=document.createElement('div');
  title.className='mcard-desc';
  title.style.marginBottom='0';
  title.textContent='Tap any mine to view spawn rates.';
  wrap.appendChild(title);

  const sorted=[...(mine.ores||[])].slice().sort((a,b)=>(b.w||0)-(a.w||0));
  for(const o of sorted){
    const type=TYPES.find(t=>t.id===o.id);
    if(!type) continue;
    const row=document.createElement('div');
    row.className='oreline'+(isOreDiscovered(type.id)?'':' unknown');
    const ico=makeMiniBall(type.id,24);
    row.appendChild(ico);

    const main=document.createElement('div');
    main.className='oreline-main';
    const nm=document.createElement('div');
    nm.className='oreline-name';
    nm.textContent=getDisplayOreName(type.id);
    const sub=document.createElement('div');
    sub.className='oreline-sub';
    sub.textContent=isOreDiscovered(type.id)?`Spawn weight ${o.w}`:'Undiscovered';
    main.appendChild(nm);
    main.appendChild(sub);
    row.appendChild(main);

    const pct=document.createElement('div');
    pct.className='oreline-pct';
    const chance = total>0 ? (o.w/total*100) : 0;
    pct.textContent=`${chance.toFixed(1)}%`;
    row.appendChild(pct);

    wrap.appendChild(row);
  }
  return wrap;
}

// ─── DRAW ─────────────────────────────────────────────────────────────
function clamp01(v){return Math.max(0,Math.min(1,v));}
function addStop(g,stops){for(const[o,c]of stops)g.addColorStop(o,c);return g;}
function drawSpecks(ctx,cx,cy,R,n,baseAlpha=0.16,palette=['#fff']){
  for(let i=0;i<n;i++){
    const a=i*2.39996323,d=R*(0.1+0.75*((i*13)%17)/17),sz=R*(0.02+0.03*((i*7)%5));
    const col=palette[i%palette.length];
    ctx.fillStyle=col.replace(')',`,${baseAlpha+((i%3)*0.04)})`).replace('rgb(','rgba(');
    ctx.beginPath();ctx.arc(cx+Math.cos(a)*d,cy+Math.sin(a)*d,sz,0,Math.PI*2);ctx.fill();
  }
}
function drawFacets(ctx,cx,cy,R,lines=4,alpha=.35){
  ctx.strokeStyle=`rgba(255,255,255,${alpha})`;ctx.lineWidth=1;
  for(let i=0;i<lines;i++){
    const a=i*(Math.PI*2/lines)+.2;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(a)*R*.76,cy+Math.sin(a)*R*.76);ctx.stroke();
  }
}
function drawCoreGlow(ctx,cx,cy,R,colors,throb=0){
  const g=ctx.createRadialGradient(cx,cy,0,cx,cy,R);
  addStop(g,[[0,colors[0]],[.42,colors[1]],[1,colors[2]]]);
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fill();
  const hg=ctx.createRadialGradient(cx,cy,0,cx,cy,R*.85);
  addStop(hg,[[0,`rgba(255,255,255,${.12+.05*Math.sin(throb)})`],[.55,'rgba(255,255,255,0)'],[1,'rgba(255,255,255,0)']]);
  ctx.fillStyle=hg;ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fill();
}

      ctx.lineTo(cx+Math.cos(a*1.12)*R*.42,cy+Math.sin(a*1.12)*R*.38);ctx.stroke();

    for(let i=-2;i<=2;i++){ctx.beginPath();ctx.moveTo(cx-R,cy+i*R*.24);ctx.lineTo(cx+R,cy+i*R*.24);ctx.stroke();}
    const h=ctx.createLinearGradient(cx-R,cy-R,cx+R,cy+R);
    addStop(h,[[0,'rgba(255,255,255,0)'],[.48,'rgba(255,255,255,0)'],[.52,'rgba(255,255,255,.22)'],[1,'rgba(255,255,255,0)']]);

    ctx.beginPath();ctx.arc(cx,cy,R*.72,0,Math.PI*2);ctx.stroke();
    for(let i=0;i<6;i++){
      const a=t*2+i*1.047,d=R*(.18+.32*((i%3)/3));
      ctx.fillStyle=`rgba(255,255,255,${.16+.18*((i+1)%2)})`;
      ctx.beginPath();ctx.arc(cx+Math.cos(a)*d,cy+Math.sin(a)*d,R*.04,0,Math.PI*2);ctx.fill();

  toxic(ctx,cx,cy,R,t,tp){

    const fog=ctx.createRadialGradient(cx,cy,R*.15,cx,cy,R);

    for(let i=0;i<5;i++){
      const a=t*1.2+i*1.35,d=R*(.18+.34*((i%4)/4));

      ctx.beginPath();ctx.arc(cx+Math.cos(a)*d,cy+Math.sin(a)*d,R*(.04+.01*(i%3)),0,Math.PI*2);ctx.fill();

  shadow(ctx,cx,cy,R,t,tp){

      ctx.beginPath();ctx.arc(cx+Math.cos(a)*d,cy+Math.sin(a)*d,R*(.03+.015*(i%3)),0,Math.PI*2);ctx.fill();

    ctx.strokeStyle='rgba(255,255,255,.08)';ctx.lineWidth=1;

  cosmic(ctx,cx,cy,R,t,tp){

function drawBall(ctx,id,cx,cy,R,t=0){
  const tp=TYPES.find(x=>x.id===id)||TYPES[0];
  const fn=STYLES[tp.style]||STYLES.rock;
  ctx.save();ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.clip();
  fn(ctx,cx,cy,R,t,tp);
  if(id!=='void'){
    const h=ctx.createRadialGradient(cx-R*.3,cy-R*.38,0,cx-R*.15,cy-R*.2,R*.6);
    h.addColorStop(0,'rgba(255,255,255,.38)');h.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=h;ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
  const rar=tp.r;
  if(rar>=3){
    const rc=['','','','rgba(80,110,255,.7)','rgba(255,60,200,.8)','rgba(255,215,0,.9)'][rar];
    ctx.save();ctx.strokeStyle=rc;ctx.lineWidth=1.5;
    ctx.shadowColor=rc;ctx.shadowBlur=10;
    ctx.beginPath();ctx.arc(cx,cy,R+1,0,Math.PI*2);ctx.stroke();ctx.restore();
  }
}

// ─── PHYSICS ──────────────────────────────────────────────────────────
const GR=0.46,BNC=0.46,FRC=0.984,BR=26;
let balls=[],gtime=0;

const cv=document.getElementById('c');
function logW(){return cv.width/(window.devicePixelRatio||1);}
function logH(){return cv.height/(window.devicePixelRatio||1);}

function mkBall(type){
  return{type,x:logW()/2+(Math.random()-.5)*8,y:88,vx:(Math.random()-.5)*1.5,vy:.5,r:BR,collected:false};
}

function step(){
  const W=logW(),H=logH(),floor=H-BR-8;
  for(const b of balls){
    if(b.collected)continue;
    b.vy+=GR;b.x+=b.vx;b.y+=b.vy;
    if(b.y>=floor){b.y=floor;b.vy*=-BNC;b.vx*=FRC;if(Math.abs(b.vy)<0.8)b.vy=0;}
    if(b.x-b.r<0){b.x=b.r;b.vx=Math.abs(b.vx)*.65;}
    if(b.x+b.r>W){b.x=W-b.r;b.vx=-Math.abs(b.vx)*.65;}
    if(b.y-b.r<0){b.y=b.r;b.vy=Math.abs(b.vy)*.5;}
    for(const b2 of balls){
      if(b2===b||b2.collected)continue;
      const dx=b2.x-b.x,dy=b2.y-b.y,dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<b.r+b2.r&&dist>0){
        const nx=dx/dist,ny=dy/dist,ov=(b.r+b2.r-dist)/2;
        b.x-=nx*ov;b.y-=ny*ov;b2.x+=nx*ov;b2.y+=ny*ov;
        const rv=(b.vx-b2.vx)*nx+(b.vy-b2.vy)*ny;
        if(rv>0){b.vx-=rv*nx*.5;b.vy-=rv*ny*.5;b2.vx+=rv*nx*.5;b2.vy+=rv*ny*.5;}
      }
    }
  }
  balls=balls.filter(b=>!b.collected);
}

// ─── RENDER ───────────────────────────────────────────────────────────
function render(){
  const ctx=cv.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const W=logW(),H=logH();
  const th=getCurrentMine().theme;
  ctx.save();ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle=th.bg;ctx.fillRect(0,0,W,H);
  ctx.strokeStyle=th.grid;ctx.lineWidth=1;
  for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  const fg=ctx.createLinearGradient(0,H-50,0,H);
  fg.addColorStop(0,th.floorGlow[0]);fg.addColorStop(1,th.floorGlow[1]);
  ctx.fillStyle=fg;ctx.fillRect(0,H-50,W,50);
  ctx.strokeStyle=th.floorLine;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(0,H-8);ctx.lineTo(W,H-8);ctx.stroke();
  const dx=W/2;
  ctx.strokeStyle=th.chute;ctx.lineWidth=4;
  ctx.beginPath();ctx.moveTo(dx-18,0);ctx.lineTo(dx-18,88);ctx.stroke();
  ctx.beginPath();ctx.moveTo(dx+18,0);ctx.lineTo(dx+18,88);ctx.stroke();
  ctx.fillStyle=th.chuteBox;ctx.fillRect(dx-22,-4,44,20);
  ctx.strokeStyle=th.chuteStroke;ctx.lineWidth=2;ctx.strokeRect(dx-22,-4,44,20);
  for(const b of balls)drawBall(ctx,b.type.id,b.x,b.y,b.r,gtime);
  ctx.restore();
  gtime+=0.016;
}

function resizeCv(){
  const dpr=window.devicePixelRatio||1;
  const wrap=document.getElementById('cwrap');
  const W=wrap.clientWidth,H=wrap.clientHeight;
  if(cv.width!==W*dpr||cv.height!==H*dpr){cv.width=W*dpr;cv.height=H*dpr;}
}
function loop(){resizeCv();step();render();requestAnimationFrame(loop);}

// ─── INTERACTION ──────────────────────────────────────────────────────
function getXY(e,rect){
  const dpr=window.devicePixelRatio||1;
  const sx=cv.width/rect.width,sy=cv.height/rect.height;
  return[(e.clientX-rect.left)*sx/dpr,(e.clientY-rect.top)*sy/dpr];
}
cv.addEventListener('click',e=>{
  const rect=cv.getBoundingClientRect();
  const[x,y]=getXY(e,rect);
  for(let i=balls.length-1;i>=0;i--){
    const b=balls[i];
    if(!b.collected){
      const dx=b.x-x,dy=b.y-y;
      if(dx*dx+dy*dy<b.r*b.r){
        b.collected=true;
        if(b.type.id==='mystery'){
          const gain=5+Math.floor(Math.random()*26);
          addCredits(gain);
          S.mysteryLock={grant:gain,spent:0};
          save();updateUI();
          showPopup(b.type,{title:`BONUS +${gain} CREDITS`,color:'#7cf8ff',sub:'Mystery reward'});
        }else{
          addToCollection(b.type);
          showPopup(b.type);
        }
        break;
      }
    }
  }
});
cv.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.changedTouches[0];
  cv.dispatchEvent(new MouseEvent('click',{clientX:t.clientX,clientY:t.clientY}));
},{passive:false});

function showPopup(type,opts={}){
  const pop=document.getElementById('popup');
  const pc=document.getElementById('pop-canvas');

  ctx.clearRect(0,0,80,80);

}

function normalizeMineProgress(){
  if(!Array.isArray(S.unlockedMines)) S.unlockedMines=['shallows'];
  const ordered=[];
  for(let i=0;i<MINES.length;i++){
    const id=MINES[i].id;
    if(i===0){
      ordered.push(id);
      continue;
    }
    if(S.unlockedMines.includes(id)) ordered.push(id);
    else break;
  }
  S.unlockedMines=ordered.length?ordered:['shallows'];
  if(!S.unlockedMines.includes(S.mine)){
    S.mine=S.unlockedMines[S.unlockedMines.length-1]||'shallows';
  }
}

function isMineUnlocked(id){
  return Array.isArray(S.unlockedMines) && S.unlockedMines.includes(id);
}

function getNextMineIndex(){
  return Math.min((Array.isArray(S.unlockedMines)?S.unlockedMines.length:1), MINES.length-1);
}

function canUnlockMine(id){
  const idx=MINES.findIndex(m=>m.id===id);
  if(idx<0) return false;
  return idx===((Array.isArray(S.unlockedMines)?S.unlockedMines.length:1)) && S.dd>=MINES[idx].unlockCost;
}

function isOreDiscovered(id){
  return Array.isArray(S.discoveredOres) && S.discoveredOres.includes(id);
}

function markOreDiscovered(id){
  if(!id || id==='mystery') return;
  if(!Array.isArray(S.discoveredOres)) S.discoveredOres=[];
  if(!S.discoveredOres.includes(id)) S.discoveredOres.push(id);
}

function getDisplayOreName(id){
  return isOreDiscovered(id) ? (ORE_INDEX[id]?.name || id) : '???';
}

function getDisplayFeaturedName(label){
  const t=TYPES.find(x=>x.name===label);
  if(!t) return label;
  return isOreDiscovered(t.id) ? label : '???';
}

function normalizeAutoSellFilters(){
  if(!Array.isArray(S.autoSellFilters)) S.autoSellFilters=[];
  S.autoSellFilters=S.autoSellFilters.filter(id=>ORE_INDEX[id] && id!=='mystery' && isOreDiscovered(id));
  const limit=getAutoSellSlots();
  if(limit<=0){S.autoSellFilters=[];return;}
  if(S.autoSellFilters.length>limit) S.autoSellFilters=S.autoSellFilters.slice(0,limit);
}
function isAutoSellSelected(id){
  return Array.isArray(S.autoSellFilters) && S.autoSellFilters.includes(id);
}
function canAutoSellSelect(id){
  if(!ORE_INDEX[id] || id==='mystery') return false;
  if(!isOreDiscovered(id)) return false;
  const limit=getAutoSellSlots();
  if(limit<=0) return false;
  if(isAutoSellSelected(id)) return true;
  return S.autoSellFilters.length < limit;
}
function toggleAutoSellFilter(id){
  if(!ORE_INDEX[id] || id==='mystery' || !isOreDiscovered(id)) return false;
  if(!Array.isArray(S.autoSellFilters)) S.autoSellFilters=[];
  const idx=S.autoSellFilters.indexOf(id);
  if(idx>=0){
    S.autoSellFilters.splice(idx,1);
    normalizeAutoSellFilters();
    return true;
  }
  if(S.autoSellFilters.length>=getAutoSellSlots()) return false;
  S.autoSellFilters.push(id);
  normalizeAutoSellFilters();
  return true;
}
function shouldAutoSell(id){
  return isAutoSellSelected(id) && id!=='mystery';
}

function getOwnedAmount(id){
  if(ORE_INDEX[id])return S.col[id]||0;
  if(id in UPGRADE_INDEX)return(S.upgrades||[]).includes(id)?1:0;
  if(id in CAP_CREDIT_INDEX)return(S.capUpgrades||[]).includes(id)?1:0;
  if(id in AUTOSELL_INDEX)return(S.autoSellUpgrades||[]).includes(id)?1:0;
  return S.col[id]||0;
}
function hasRequirement(id,amt){return getOwnedAmount(id)>=amt;}
function getReqLabel(id){
  if(ORE_INDEX[id])return ORE_INDEX[id].name;
  if(id in UPGRADE_INDEX)return UPGRADE_INDEX[id].name;
  if(id in CAP_CREDIT_INDEX)return CAP_CREDIT_INDEX[id].name;
  if(id in AUTOSELL_INDEX)return AUTOSELL_INDEX[id].name;
  return id;
}
function getOreLabel(id){
  const t=TYPES.find(x=>x.id===id);if(t)return t.name;
  if(id in UPGRADE_INDEX)return UPGRADE_INDEX[id].name;
  if(id in CAP_CREDIT_INDEX)return CAP_CREDIT_INDEX[id].name;
  if(id in AUTOSELL_INDEX)return AUTOSELL_INDEX[id].name;
  return id;
}
function getCreditInterval(){
  const mult=(S.upgrades||[]).reduce((prod,id)=>prod*(1-((UPGRADE_INDEX[id]?.pct||0)/100)),1);
  return Math.max(4,Math.ceil(BASE_CREDIT_INTERVAL*mult));
}
function getMaxCredits(){
  const tier=Array.isArray(S.capUpgrades)?S.capUpgrades.length:0;
  if(tier<=0)return 20;
  return CAP_CREDIT_ITEMS[Math.min(tier,CAP_CREDIT_ITEMS.length)-1]?.max??20;
}
function addCredits(amount){
  if(!Number.isFinite(amount)||amount<=0)return;
  S.credits=Math.min(getMaxCredits(),(S.credits||0)+amount);
}
function getMysteryLock(){
  if(!S.mysteryLock||typeof S.mysteryLock!=='object')return null;
  if(!Number.isFinite(S.mysteryLock.grant)||S.mysteryLock.grant<=0)return null;
  if(!Number.isFinite(S.mysteryLock.spent))S.mysteryLock.spent=0;
  if(S.mysteryLock.spent>=S.mysteryLock.grant){S.mysteryLock=null;return null;}
  return S.mysteryLock;
}
function mysteryAllowed(){return !getMysteryLock();}
function syncTimerToInterval(){
  const iv=getCreditInterval();
  if(!Number.isFinite(nextIn)||nextIn<=0)nextIn=iv;
  nextIn=Math.min(nextIn,iv);S.nextIn=nextIn;
}

// ─── SAVE / LOAD ──────────────────────────────────────────────────────
function save(){
  S.lastSeen=Date.now();S.nextIn=nextIn;
  try{localStorage.setItem('ore_g2',JSON.stringify(S));}catch(e){}
}
function load(){
  try{
    // Try new key, fall back to old
    const raw=localStorage.getItem('ore_g2')||localStorage.getItem('ore_g1');
    if(raw){
      const parsed=JSON.parse(raw);
      S={...S,...parsed,col:{...S.col,...(parsed.col||{})}};
      if(!Array.isArray(S.upgrades))S.upgrades=[];
      if(!Array.isArray(S.capUpgrades))S.capUpgrades=[];
      if(!Array.isArray(S.autoSellUpgrades))S.autoSellUpgrades=[];
      if(!Array.isArray(S.autoSellFilters))S.autoSellFilters=[];
      if(!Array.isArray(S.discoveredOres))S.discoveredOres=[];
      if(typeof S.sellAllMode!=='boolean')S.sellAllMode=false;
      if(typeof S.dd!=='number'||!Number.isFinite(S.dd))S.dd=0;
      if(typeof S.credits!=='number'||!Number.isFinite(S.credits))S.credits=10;
      S.credits=Math.min(S.credits,getMaxCredits());
      if(typeof S.lastSeen!=='number'||!Number.isFinite(S.lastSeen))S.lastSeen=Date.now();
      if(!S.mine)S.mine='shallows';
      if(!Array.isArray(S.unlockedMines))S.unlockedMines=['shallows'];
      normalizeMineProgress();
      normalizeAutoSellFilters();
      if(S.mysteryLock&&typeof S.mysteryLock==='object'){
        if(!Number.isFinite(S.mysteryLock.grant)||S.mysteryLock.grant<=0||S.mysteryLock.spent>=S.mysteryLock.grant)S.mysteryLock=null;
        else if(!Number.isFinite(S.mysteryLock.spent))S.mysteryLock.spent=0;
      }else S.mysteryLock=null;
      const secs=(Date.now()-S.lastSeen)/1000;
      const earn=Math.floor(secs/Math.max(1,getCreditInterval()));
      if(earn>0){addCredits(earn);S.lastSeen=Date.now();}
      nextIn=typeof S.nextIn==='number'&&Number.isFinite(S.nextIn)?S.nextIn:BASE_CREDIT_INTERVAL;
      syncTimerToInterval();
    }else{nextIn=BASE_CREDIT_INTERVAL;syncTimerToInterval();}
  }catch(e){nextIn=BASE_CREDIT_INTERVAL;syncTimerToInterval();}
}

// ─── MINE PANEL ───────────────────────────────────────────────────────
function openMinePanel(){buildMinePanel();document.getElementById('mine-panel').classList.add('open');}
function closeMinePanel(){document.getElementById('mine-panel').classList.remove('open');}

function getMineRaritySet(mine){
  const seen=new Set();
  for(const o of mine.ores){
    const t=TYPES.find(x=>x.id===o.id);
    if(t&&t.id!=='mystery')seen.add(t.r);
  }
  return [...seen].sort((a,b)=>a-b);
}

function buildMinePanel(){
  const container=document.getElementById('mine-cards');
  container.innerHTML='';
  for(let i=0;i<MINES.length;i++){
    const mine=MINES[i];
    const isActive=S.mine===mine.id;
    const isUnlocked=isMineUnlocked(mine.id);
    const isNext=i===getNextMineIndex();
    const canAfford=S.dd>=mine.unlockCost;
    const expanded=expandedMineId===mine.id || isActive;

    const card=document.createElement('div');
    card.className='mcard'+(isActive?' active':'')+((!isUnlocked)?' locked-card':'')+(expanded?' open':'');
    card.addEventListener('click',(e)=>{
      if(e.target.closest('button')) return;
      expandedMineId = expandedMineId===mine.id ? '' : mine.id;
      buildMinePanel();
    });

    // Header
    const hdr=document.createElement('div');hdr.className='mcard-hdr';
    const icon=document.createElement('span');icon.className='mcard-icon';icon.textContent=mine.icon;
    const title=document.createElement('span');title.className='mcard-title';title.textContent=mine.name;
    const badge=document.createElement('span');badge.className='mcard-badge';
    if(isActive){badge.textContent='▶ Active';badge.classList.add('badge-active');}
    else if(isUnlocked){badge.textContent='Unlocked';badge.classList.add('badge-unlocked');}
    else if(isNext){badge.textContent='Next';badge.classList.add('badge-locked');}
    else{badge.textContent='Locked';badge.classList.add('badge-locked');}
    hdr.appendChild(icon);hdr.appendChild(title);hdr.appendChild(badge);
    card.appendChild(hdr);

    // Desc
    const desc=document.createElement('div');desc.className='mcard-desc';desc.textContent=mine.desc;
    card.appendChild(desc);

    // Stats
    const stats=document.createElement('div');stats.className='mcard-stats';
    const costStat=document.createElement('div');
    costStat.className='mstat'+(mine.rollCost>1?' expensive':'');
    costStat.innerHTML=`◈ <b>${mine.rollCost} credit${mine.rollCost>1?'s':''}</b> per roll`;
    stats.appendChild(costStat);
    if(mine.unlockCost>0){
      const unlockStat=document.createElement('div');unlockStat.className='mstat';
      unlockStat.innerHTML=isUnlocked?'<b style="color:#70c090">✓ Unlocked</b>':(isNext?`Unlock: <b>${mine.unlockCost.toLocaleString()} DD</b>`:'<b style="color:#c06060">Locked</b>');
      stats.appendChild(unlockStat);
    }else{
      const freeStat=document.createElement('div');freeStat.className='mstat';
      freeStat.innerHTML='<b style="color:#70c090">✓ Default Mine</b>';
      stats.appendChild(freeStat);
    }
    card.appendChild(stats);

    // Rarity chips
    const chips=document.createElement('div');chips.className='mrar-chips';
    const rarities=getMineRaritySet(mine);
    for(const r of rarities){
      const chip=document.createElement('span');chip.className='rchip';
      chip.textContent=RNAMES[r];
      chip.style.cssText=`color:${RCOLORS[r]};border-color:${RCOLORS[r]}55;background:${RCOLORS[r]}11`;
      chips.appendChild(chip);
    }
    card.appendChild(chips);

    // Featured
    const feat=document.createElement('div');feat.className='mfeatured';
    feat.innerHTML='Notable finds: '+mine.featured.map(n=>`<b>${getDisplayFeaturedName(n)}</b>`).join(', ');
    card.appendChild(feat);

    // Spawn table
    card.appendChild(buildMineOreList(mine));

    // Action button
    const btn=document.createElement('button');btn.className='maction-btn';
    if(isActive){
      btn.textContent='Currently Active';btn.classList.add('current');
    }else if(isUnlocked){
      btn.textContent=`Switch to ${mine.name}`;btn.classList.add('select');
      btn.addEventListener('click',()=>{selectMine(mine.id);closeMinePanel();});
    }else if(isNext){
      btn.textContent=`Unlock for ${mine.unlockCost.toLocaleString()} DD`;btn.classList.add('unlock');
      btn.disabled=!canAfford;
      if(!canAfford)btn.textContent+=` (need ${(mine.unlockCost-S.dd).toLocaleString()} more)`;
      btn.addEventListener('click',()=>{unlockMine(mine.id);});
    }else{
      btn.textContent='Reach previous mine first';btn.classList.add('current');
      btn.disabled=true;
    }
    card.appendChild(btn);
    container.appendChild(card);
  }
}

function selectMine(id){
  if(!isMineUnlocked(id))return;
  S.mine=id;save();updateMineBar();
}

function unlockMine(id){
  const idx=MINES.findIndex(m=>m.id===id);
  const mine=MINES[idx];
  if(!mine||isMineUnlocked(id))return;
  if(idx!==getNextMineIndex())return;
  if(S.dd<mine.unlockCost)return;
  S.dd-=mine.unlockCost;
  S.unlockedMines.push(id);
  S.mine=id;
  save();updateUI();updateMineBar();
  buildMinePanel(); // refresh panel
}

function updateMineBar(){
  const mine=getCurrentMine();
  document.getElementById('mine-bar-icon').textContent=mine.icon;
  document.getElementById('mine-bar-name').textContent=mine.name;
  document.getElementById('mine-bar-cost').textContent=`◈ ${mine.rollCost} credit${mine.rollCost>1?'s':''} / roll`;
  const cost=mine.rollCost;
  const rcv=document.getElementById('rcost-val');
  if(rcv)rcv.textContent=`◈ ${cost} credit${cost>1?'s':''}`;
  document.getElementById('rbtn').disabled=S.credits<cost;
  updateRollButton();
}

function updateRollButton(){
  const sub=document.getElementById('rbtn-sub');
  if(!sub) return;
  const iv=getCreditInterval();
  const secs=Math.max(0,Math.ceil(nextIn||iv));
  sub.textContent = `+1 in ${secs}s`;
}

// ─── ROLL ─────────────────────────────────────────────────────────────
function roll(){
  const mine=getCurrentMine();
  const cost=mine.rollCost;
  if(S.credits<cost)return;
  S.credits-=cost;
  if(getMysteryLock()){
    S.mysteryLock.spent=Math.min(S.mysteryLock.grant,(S.mysteryLock.spent||0)+1);
    if(S.mysteryLock.spent>=S.mysteryLock.grant)S.mysteryLock=null;
  }
  save();updateUI();
  balls.push(mkBall(pickFromMine()));
}

// ─── COLLECTION ───────────────────────────────────────────────────────
function addToCollection(type){
  markOreDiscovered(type.id);
  if(shouldAutoSell(type.id)){
    S.dd += orePrice(type);
  }else{
    S.col[type.id]=(S.col[type.id]||0)+1;
  }
  save();updateUI();
  if(document.getElementById('gal-view').style.display==='flex'){buildInventory();buildWorkshop();buildCapWorkshop();buildAutoSellWorkshop();}
}

function sellOre(id,amount=1){
  const type=TYPES.find(t=>t.id===id);
  const have=S.col[id]||0;
  if(!type||have<amount||amount<=0)return false;
  S.col[id]=have-amount;
  if(S.col[id]<=0)delete S.col[id];
  S.dd+=orePrice(type)*amount;
  save();updateUI();
  if(document.getElementById('gal-view').style.display==='flex'){buildInventory();buildWorkshop();buildCapWorkshop();buildAutoSellWorkshop();}
  return true;
}

function toggleSellMode(){
  S.sellAllMode=!S.sellAllMode;save();updateUI();buildInventory();
}

// ─── CRAFTING ─────────────────────────────────────────────────────────
function canCraftUpgrade(up){
  const idx=UPGRADE_ITEMS.findIndex(u=>u.id===up.id);
  if(idx!==getCraftedCount())return false;
  if(S.dd<up.dd)return false;
  for(const[id,amt]of Object.entries(up.mats)){if(!hasRequirement(id,amt))return false;}
  return true;
}
function consumeMaterials(mats){
  for(const[id,amt]of Object.entries(mats)){
    if(ORE_INDEX[id]){S.col[id]=(S.col[id]||0)-amt;if(S.col[id]<=0)delete S.col[id];continue;}
    if(id in UPGRADE_INDEX)continue;
    S.col[id]=(S.col[id]||0)-amt;if(S.col[id]<=0)delete S.col[id];
  }
}
function craftUpgrade(id){
  const up=UPGRADE_INDEX[id];if(!up)return false;
  const idx=UPGRADE_ITEMS.findIndex(u=>u.id===id);
  if(idx!==getCraftedCount())return false;
  if(!canCraftUpgrade(up))return false;
  S.dd-=up.dd;consumeMaterials(up.mats);S.upgrades.push(id);
  syncTimerToInterval();save();updateUI();buildInventory();buildWorkshop();buildCapWorkshop();buildAutoSellWorkshop();
  return true;
}
function canCraftCapUpgrade(up){
  const idx=CAP_CREDIT_ITEMS.findIndex(u=>u.id===up.id);
  if(idx!==getCapCraftedCount())return false;
  if(S.dd<up.dd)return false;
  for(const[id,amt]of Object.entries(up.mats)){if((S.col[id]||0)<amt)return false;}
  return true;
}
function craftCapUpgrade(id){
  const up=CAP_CREDIT_INDEX[id];if(!up)return false;
  const idx=CAP_CREDIT_ITEMS.findIndex(u=>u.id===id);
  if(idx!==getCapCraftedCount())return false;
  if(!canCraftCapUpgrade(up))return false;
  S.dd-=up.dd;consumeMaterials(up.mats);S.capUpgrades.push(id);
  S.credits=Math.min(S.credits,getMaxCredits());
  save();updateUI();buildInventory();buildCapWorkshop();buildAutoSellWorkshop();
  return true;
}

function canCraftAutoSellUpgrade(up){
  const idx=AUTOSELL_ITEMS.findIndex(u=>u.id===up.id);
  if(idx!==getAutoSellCraftedCount())return false;
  if(S.dd<up.dd)return false;
  for(const[id,amt]of Object.entries(up.mats)){if(!hasRequirement(id,amt))return false;}
  return true;
}
function craftAutoSellUpgrade(id){
  const up=AUTOSELL_INDEX[id];if(!up)return false;
  const idx=AUTOSELL_ITEMS.findIndex(u=>u.id===id);
  if(idx!==getAutoSellCraftedCount())return false;
  if(!canCraftAutoSellUpgrade(up))return false;
  S.dd-=up.dd;consumeMaterials(up.mats);S.autoSellUpgrades.push(id);
  normalizeAutoSellFilters();
  save();updateUI();buildInventory();buildWorkshop();buildCapWorkshop();buildAutoSellWorkshop();
  return true;
}

// ─── UI BUILDERS ──────────────────────────────────────────────────────
function buildInventory(){
  const grid=document.getElementById('ggrid');
  grid.innerHTML='';
  const col=TYPES.filter(t=>S.col[t.id]);
  if(!col.length){
    grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--dim);font-size:.8rem">No ores collected yet.<br>Tap balls in the dispenser to start filling your inventory!</div>';
    return;
  }
  col.sort((a,b)=>b.r-a.r||S.col[b.id]-S.col[a.id]);
  for(const type of col){
    const cnt=S.col[type.id];
    const price=orePrice(type);
    const div=document.createElement('div');div.className=`gi r${type.r}`;
    const c=document.createElement('canvas');c.width=60;c.height=60;c.dataset.tid=type.id;
    drawBall(c.getContext('2d'),type.id,30,30,26,gtime);
    div.appendChild(c);

    // ── FIX: ore name now shown ──
    const nm=document.createElement('div');nm.className='gname';nm.textContent=type.name;
    const gr=document.createElement('div');gr.className='gr';gr.textContent=RNAMES[type.r];
    const gc=document.createElement('div');gc.className='gc';gc.textContent=`${price} DD each`;
    const cntEl=document.createElement('div');cntEl.className='cnt';cntEl.textContent=`Owned ×${cnt}`;

    const btn=document.createElement('button');btn.className='sellbtn';
    btn.textContent=S.sellAllMode?'Sell All':'Sell 1';btn.disabled=cnt<1;
    btn.addEventListener('click',()=>sellOre(type.id,S.sellAllMode?(S.col[type.id]||0):1));

    div.appendChild(nm);div.appendChild(gr);div.appendChild(gc);div.appendChild(cntEl);div.appendChild(btn);
    grid.appendChild(div);
  }
}

function makeMiniBall(id,size=28){
  const c=document.createElement('canvas');c.width=size;c.height=size;
  const ctx=c.getContext('2d');
  const type=TYPES.find(t=>t.id===id);
  if(type){drawBall(ctx,id,size/2,size/2,size/2-2,gtime);}
  else{
    const g=ctx.createRadialGradient(size*.3,size*.3,0,size/2,size/2,size/2);
    g.addColorStop(0,'#4b4f57');g.addColorStop(.5,'#2b2f35');g.addColorStop(1,'#111418');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(size/2,size/2,size/2-2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.75)';
    ctx.font=`bold ${Math.max(10,size*.28)}px Georgia,serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('⚙',size/2,size/2+1);
  }
  return c;
}

function makeRecipeToken(id,amt){

  const lbl=document.createElement('div');lbl.className='lbl';lbl.textContent=getReqLabel(id);tok.appendChild(lbl);

  const grid=document.getElementById('autosellgrid');if(!grid)return;grid.innerHTML='';
  const idx=getAutoSellCraftedCount();
  const up=AUTOSELL_ITEMS[idx];
  const slots=getAutoSellSlots();

  if(up){
    const card=document.createElement('div');
    card.className='shopcard';

    const badge=document.createElement('div');
    badge.className='shopbadge';
    badge.textContent=`Next · Tier ${up.tier}`;
    card.appendChild(badge);

    const name=document.createElement('div');
    name.className='shopname';
    name.textContent=up.name;
    card.appendChild(name);

    const meta=document.createElement('div');
    meta.className='shopmeta';
    meta.textContent=`Tier ${up.tier} · ${up.slots} filter slot${up.slots>1?'s':''}`;
    card.appendChild(meta);

    const eff=document.createElement('div');
    eff.className='shopeff';
    eff.textContent=up.effect;
    card.appendChild(eff);

    const req=document.createElement('div');
    req.className='shopreq';
    req.appendChild(buildRecipeRow(up.mats));
    const ml=document.createElement('div');
    ml.className='recmeta';
    ml.textContent=`Only the next auto-sell upgrade is shown. Cost: ${up.dd} DD`;
    req.appendChild(ml);
    card.appendChild(req);

    const btn=document.createElement('button');
    btn.className='craftbtn';
    btn.textContent=`Craft for ${up.dd} DD`;
    btn.disabled=!canCraftAutoSellUpgrade(up);
    btn.addEventListener('click',()=>craftAutoSellUpgrade(up.id));
    card.appendChild(btn);

    grid.appendChild(card);
  }else{
    const done=document.createElement('div');
    done.className='shopcard';
    done.innerHTML='<div class="shopname">Auto Sell Maxed</div><div class="shopmeta">All auto-sell slots unlocked.</div>';
    grid.appendChild(done);
  }

  const cfg=document.createElement('div');
  cfg.className='autosell-config';
  const hdr=document.createElement('div');
  hdr.className='autosell-config-hdr';
  const t=document.createElement('div');
  t.className='autosell-config-title';
  t.textContent='Auto-sell filters';
  const c=document.createElement('div');
  c.className='autosell-config-count';
  c.textContent=`${Array.isArray(S.autoSellFilters)?S.autoSellFilters.length:0}/${slots} selected`;
  hdr.appendChild(t);hdr.appendChild(c);
  cfg.appendChild(hdr);

  const note=document.createElement('div');
  note.className='autosell-note';
  note.textContent=slots>0 ? 'Tap a discovered ore to toggle auto-sell.' : 'Craft the next auto-sell upgrade to unlock filters.';
  cfg.appendChild(note);

  const g=document.createElement('div');
  g.className='autosell-grid';
  for(const type of TYPES){
    if(type.id==='mystery') continue;
    const chip=document.createElement('div');
    const discovered=isOreDiscovered(type.id);
    const active=isAutoSellSelected(type.id);
    chip.className='autosell-chip'+(active?' on':'')+(discovered?'':' locked');
    const ico=makeMiniBall(type.id,20);
    chip.appendChild(ico);

    const main=document.createElement('div');
    main.className='autosell-chip-main';
    const nm=document.createElement('div');
    nm.className='autosell-chip-name';
    nm.textContent=discovered ? type.name : '???';
    const sub=document.createElement('div');
    sub.className='autosell-chip-sub';
    if(!slots) sub.textContent='Locked';
    else if(!discovered) sub.textContent='Undiscovered';
    else if(active) sub.textContent='Auto-sell on';
    else sub.textContent='Tap to enable';
    main.appendChild(nm);main.appendChild(sub);
    chip.appendChild(main);

    if(discovered){
      chip.addEventListener('click',()=>{
        const was=isAutoSellSelected(type.id);
        if(!was && getAutoSellSlots()<=0) return;
        if(!was && Array.isArray(S.autoSellFilters) && S.autoSellFilters.length>=getAutoSellSlots()) return;
        toggleAutoSellFilter(type.id);
        save();updateUI();
        buildAutoSellWorkshop();
      });
    }
    g.appendChild(chip);
  }
  cfg.appendChild(g);
  grid.appendChild(cfg);
}

// ─── MAIN UI UPDATE ───────────────────────────────────────────────────
function updateUI(){
  normalizeAutoSellFilters();
  document.getElementById('cred-count').textContent=`${S.credits} / ${getMaxCredits()}`;
  document.getElementById('dd-count').textContent=S.dd;
  const pill=document.getElementById('dd-pill-count');if(pill)pill.textContent=S.dd;
  const cyc=document.getElementById('cycle-count');if(cyc)cyc.textContent=`${getCreditInterval()}s`;
  const sellBtn=document.getElementById('sellmode-btn');
  if(sellBtn){sellBtn.textContent=S.sellAllMode?'Sell All':'Sell 1';sellBtn.classList.toggle('on',S.sellAllMode);}
  updateMineBar();
  updateRollButton();
}

// Credit timer
setInterval(()=>{
  const iv=getCreditInterval();
  if(nextIn>iv)nextIn=iv;
  nextIn--;
  if(nextIn<=0){nextIn=iv;addCredits(1);save();updateUI();}
  else S.nextIn=nextIn;
  document.getElementById('tmr').textContent=`+1 in ${Math.max(0,Math.ceil(nextIn))}s`;
  updateRollButton();
  updateUI();
},1000);


// ─── VAULT STATE ──────────────────────────────────────────────────────
let currentVaultTab = 'ores';

function switchVaultTab(tab){
  currentVaultTab = tab;
  ['ores','upgrades','autosell'].forEach(t=>{
    document.getElementById('vault-'+t).style.display = t===tab ? 'flex' : 'none';
    document.getElementById('vtab-'+t).className = 'vtab'+(t===tab?' on':'');
  });
  closeCraftDrawer();
  if(tab==='ores'){buildInventory();}
  else if(tab==='upgrades'){buildAllTracks();}
  else if(tab==='autosell'){buildAutoSellTrack();buildAutoSellFilters();}
}

// ─── TABS ─────────────────────────────────────────────────────────────
function switchTab(tab){
  document.getElementById('game').style.display=tab==='game'?'flex':'none';
  document.getElementById('gal-view').style.display=tab==='gal'?'flex':'none';
  document.getElementById('tab-game').className='tab'+(tab==='game'?' on':'');
  document.getElementById('tab-gal').className='tab'+(tab==='gal'?' on':'');
  if(tab==='gal'){switchVaultTab(currentVaultTab);}
  closeCraftDrawer();
}

// ─── CRAFT DRAWER ─────────────────────────────────────────────────────
let craftDrawerEl = null;
function closeCraftDrawer(){
  if(craftDrawerEl){craftDrawerEl.classList.remove('open');craftDrawerEl=null;}
}
function openCraftDrawer(up, craftFn, canFn){
  closeCraftDrawer();
  let drawer = document.getElementById('tier-craft-drawer');
  if(!drawer){
    drawer = document.createElement('div');
    drawer.id='tier-craft-drawer';
    drawer.className='tier-craft';
    document.body.appendChild(drawer);
  }
  craftDrawerEl = drawer;
  drawer.innerHTML='';

  const hdr=document.createElement('div');hdr.className='tier-craft-hdr';
  const nm=document.createElement('div');nm.className='tier-craft-name';nm.textContent=up.name;
  const cls=document.createElement('button');cls.className='tier-craft-close';cls.textContent='✕ Close';
  cls.onclick=closeCraftDrawer;
  hdr.appendChild(nm);hdr.appendChild(cls);drawer.appendChild(hdr);

  const body=document.createElement('div');body.className='tier-craft-body';

  const eff=document.createElement('div');eff.className='tier-craft-effect';eff.textContent=up.effect;
  body.appendChild(eff);

  const cost=document.createElement('div');cost.className='tier-craft-cost';
  cost.textContent='Cost: '+up.dd+' DD';
  body.appendChild(cost);

  const recipe=buildRecipeRow(up.mats);body.appendChild(recipe);

  const meta=document.createElement('div');meta.className='recmeta';
  meta.textContent='Tap ingredients to check your inventory.';
  body.appendChild(meta);

  const btn=document.createElement('button');btn.className='craftbtn';
  btn.textContent='Craft for '+up.dd+' DD';
  btn.disabled=!canFn(up);
  btn.onclick=()=>{craftFn(up.id);closeCraftDrawer();buildAllTracks();buildAutoSellTrack();buildAutoSellFilters();};
  body.appendChild(btn);

  drawer.appendChild(body);
  requestAnimationFrame(()=>drawer.classList.add('open'));
}

// ─── BUILD UPGRADE TRACK ───────────────────────────────────────────────
function buildTrack(railId, items, getCraftedFn, canCraftFn, craftFn, getLabelFn){
  const rail = document.getElementById(railId);
  if(!rail) return;
  rail.innerHTML='';
  const done = getCraftedFn();
  items.forEach((up, i)=>{
    const node = document.createElement('div');
    node.className = 'tier-node ' + (i<done ? 'node-done' : i===done ? 'node-next' : 'node-locked');

    const dot = document.createElement('div');
    dot.className='tier-dot';
    if(i>=done) dot.textContent = up.tier;
    node.appendChild(dot);

    const nm = document.createElement('div');
    nm.className='tier-name';
    nm.textContent = up.name;
    node.appendChild(nm);

    const st = document.createElement('div');
    st.className='tier-stat';
    st.textContent = getLabelFn(up);
    node.appendChild(st);

    if(i===done){
      const hint=document.createElement('div');
      hint.className='tier-tap-hint';
      hint.textContent='Tap to craft';
      node.appendChild(hint);
      node.addEventListener('click',()=>openCraftDrawer(up,craftFn,canCraftFn));
    }
    rail.appendChild(node);
  });
  // scroll to current
  const nextNode = rail.children[done];
  if(nextNode) setTimeout(()=>nextNode.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'}),50);
}

function buildAllTracks(){
  buildTrack('track-workshop', UPGRADE_ITEMS, getCraftedCount, canCraftUpgrade, craftUpgrade, up=>`−${up.pct}% wait`);
  buildTrack('track-vault', CAP_CREDIT_ITEMS, getCapCraftedCount, canCraftCapUpgrade, craftCapUpgrade, up=>`${up.max} max`);
}

function buildAutoSellTrack(){
  buildTrack('track-autosell', AUTOSELL_ITEMS, getAutoSellCraftedCount, canCraftAutoSellUpgrade, craftAutoSellUpgrade, up=>`${up.slots} slot${up.slots>1?'s':''}`);
}

// ─── BUILD AUTOSELL FILTERS ────────────────────────────────────────────
function buildAutoSellFilters(){
  const wrap = document.getElementById('autosell-filter-wrap');
  if(!wrap) return;
  wrap.innerHTML='';
  const slots = getAutoSellSlots();
  const active = Array.isArray(S.autoSellFilters)?S.autoSellFilters.length:0;

  const hdr=document.createElement('div');hdr.className='afs-hdr';
  const t=document.createElement('div');t.className='afs-title';t.textContent='Auto-sell filters';
  const c=document.createElement('div');c.className='afs-count';c.textContent=`${active} / ${slots} slots`;
  hdr.appendChild(t);hdr.appendChild(c);wrap.appendChild(hdr);

  const note=document.createElement('div');note.className='afs-note';
  note.textContent=slots>0?'Tap a discovered ore to toggle auto-sell.':'Craft the Auto Sorter above to unlock filter slots.';
  wrap.appendChild(note);

  const g=document.createElement('div');g.className='afs-grid';
  for(const type of TYPES){
    if(type.id==='mystery') continue;
    const chip=document.createElement('div');
    const discovered=isOreDiscovered(type.id);
    const isOn=isAutoSellSelected(type.id);
    chip.className='autosell-chip'+(isOn?' on':'')+(discovered?'':' locked');
    const ico=makeMiniBall(type.id,20);chip.appendChild(ico);
    const main=document.createElement('div');main.className='autosell-chip-main';
    const nm=document.createElement('div');nm.className='autosell-chip-name';
    nm.textContent=discovered?type.name:'???';
    const sub=document.createElement('div');sub.className='autosell-chip-sub';
    if(!slots) sub.textContent='Locked';
    else if(!discovered) sub.textContent='Undiscovered';
    else if(isOn) sub.textContent='Auto-selling';
    else sub.textContent='Tap to enable';
    main.appendChild(nm);main.appendChild(sub);chip.appendChild(main);
    if(discovered){
      chip.addEventListener('click',()=>{
        const was=isAutoSellSelected(type.id);
        if(!was&&getAutoSellSlots()<=0) return;
        if(!was&&Array.isArray(S.autoSellFilters)&&S.autoSellFilters.length>=getAutoSellSlots()) return;
        toggleAutoSellFilter(type.id);
        save();updateUI();buildAutoSellFilters();
      });
    }
    g.appendChild(chip);
  }
  wrap.appendChild(g);
}

// Stub out the old build functions so existing calls don't break
function buildWorkshop(){if(currentVaultTab==='upgrades')buildAllTracks();}
function buildCapWorkshop(){if(currentVaultTab==='upgrades')buildAllTracks();}
function buildAutoSellWorkshop(){if(currentVaultTab==='autosell'){buildAutoSellTrack();buildAutoSellFilters();}}
