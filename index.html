<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#080604">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>nodnalb</title>
<style>
:root{--bg:#080604;--surf:#111009;--brd:#2a2016;--gold:#c9a227;--txt:#d4b896;--dim:#6b5a42;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:'Georgia','Times New Roman',serif;touch-action:manipulation;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
body{display:flex;flex-direction:column;height:100dvh;}
button,.tab,.gi,#c{touch-action:manipulation;-webkit-user-select:none;user-select:none;}

#hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;
  background:var(--surf);border-bottom:1px solid var(--brd);flex-shrink:0;}
#ttl{font-size:1rem;letter-spacing:4px;text-transform:uppercase;color:var(--gold);text-shadow:0 0 12px rgba(201,162,39,.4);}
#cred-box{display:flex;align-items:center;gap:6px;font-size:.85rem;flex-wrap:wrap;justify-content:flex-end;}
#cred-count{color:var(--gold);font-size:1rem;}
#dd-count{color:#7cf8ff;font-size:1rem;}
#tmr{font-size:.65rem;color:var(--dim);min-width:60px;text-align:right;}

#tabs{display:flex;background:var(--surf);border-bottom:1px solid var(--brd);flex-shrink:0;}
.tab{flex:1;padding:9px;text-align:center;font-size:.75rem;letter-spacing:2px;text-transform:uppercase;
  cursor:pointer;color:var(--dim);transition:color .2s;border-bottom:2px solid transparent;}
.tab.on{color:var(--gold);border-bottom-color:var(--gold);}

#game{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;}
#gal-view{flex:1;overflow-y:auto;padding:14px;display:none;}
#inv-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;
  padding:12px 14px;margin-bottom:12px;background:var(--surf);border:1px solid var(--brd);border-radius:10px;}
#inv-title{font-size:.95rem;letter-spacing:2px;text-transform:uppercase;color:var(--gold);}
#inv-sub{margin-top:4px;font-size:.72rem;color:var(--dim);line-height:1.35;max-width:42ch;}
#dd-pill{display:flex;align-items:center;gap:8px;flex-shrink:0;background:#0c1620;border:1px solid #2d5672;
  border-radius:999px;padding:8px 12px;color:#c9f5ff;font-size:.82rem;letter-spacing:1px;text-transform:uppercase;}
#dd-pill b{font-size:1rem;color:#7cf8ff;}

#cwrap{flex:1;position:relative;min-height:0;}
#c{position:absolute;top:0;left:0;width:100%;height:100%;cursor:crosshair;}

#rollbar{padding:10px 14px;background:var(--surf);border-top:1px solid var(--brd);
  display:flex;align-items:center;justify-content:center;gap:14px;flex-shrink:0;}
#rbtn{background:linear-gradient(135deg,#5a3c0e,#c9a227 45%,#8a6010 55%,#5a3c0e);
  border:none;color:#0a0603;padding:11px 36px;font-size:.95rem;font-family:inherit;
  letter-spacing:3px;text-transform:uppercase;font-weight:bold;cursor:pointer;border-radius:3px;
  box-shadow:0 0 18px rgba(201,162,39,.3);transition:box-shadow .2s,opacity .2s;}
#rbtn:hover:not(:disabled){box-shadow:0 0 30px rgba(201,162,39,.6);}
#rbtn:disabled{opacity:.35;cursor:not-allowed;}
#rcost{font-size:.75rem;color:var(--dim);}

/* Gallery */
.ggrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(126px,1fr));gap:10px;}
.gi{background:var(--surf);border-radius:10px;padding:10px;text-align:center;
  cursor:default;border:1px solid;transition:transform .15s,box-shadow .15s;}
.gi:hover{transform:translateY(-1px);}
.gi canvas{display:block;margin:0 auto;}
.gi .gr{font-size:.62rem;color:var(--dim);margin-top:2px;text-transform:uppercase;letter-spacing:1px;}
.gi .gc{font-size:.72rem;color:var(--gold);margin-top:4px;}
.gi .cnt{font-size:.72rem;color:#c9f5ff;margin-top:2px;}
.gi .gname{font-size:.68rem;color:var(--txt);margin-top:4px;letter-spacing:.5px;line-height:1.15;min-height:1.35em;}
.sellbtn{width:100%;margin-top:8px;padding:7px 8px;border:none;border-radius:6px;
  background:linear-gradient(135deg,#123041,#2f718f 50%,#123041);color:#dff9ff;
  font-size:.72rem;letter-spacing:1px;text-transform:uppercase;cursor:pointer;}
.sellbtn:hover{filter:brightness(1.12);}
.sellbtn:disabled{opacity:.35;cursor:not-allowed;}
.r0{border-color:#444;}
.r1{border-color:#888;}
.r2{border-color:#3a9;}
.r3{border-color:#58f;}
.r4{border-color:#f5a;box-shadow:0 0 6px rgba(255,80,180,.3);}
.r5{border-color:#fd0;box-shadow:0 0 10px rgba(255,210,0,.4);}

#inv-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end;}
#cycle-pill{display:flex;align-items:center;gap:8px;flex-shrink:0;background:#1a140f;border:1px solid #4c3a24;
  border-radius:999px;padding:8px 12px;color:#eedfc4;font-size:.82rem;letter-spacing:1px;text-transform:uppercase;}
#cycle-pill b{font-size:1rem;color:var(--gold);}
.modebtn{border:none;border-radius:999px;padding:8px 12px;cursor:pointer;
  background:linear-gradient(135deg,#2d1f12,#5a3c0e 50%,#2d1f12);color:#f8ead0;
  font-size:.72rem;letter-spacing:1px;text-transform:uppercase;min-width:92px;}
.modebtn.on{background:linear-gradient(135deg,#173447,#2f718f 50%,#173447);color:#dff9ff;}
.modebtn:hover{filter:brightness(1.08);}

.shophead{margin:14px 0 10px;font-size:.78rem;letter-spacing:2px;text-transform:uppercase;color:var(--gold);}
.shopgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:18px;}
.shopcard{background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:10px;display:flex;flex-direction:column;gap:6px;}
.shopcard.locked{opacity:.62;filter:saturate(.75);}
.shopcard.owned{border-color:#2d8f75;box-shadow:0 0 0 1px rgba(60,255,190,.12) inset;}
.shopname{font-size:.9rem;letter-spacing:1px;color:var(--txt);}
.shopmeta{font-size:.62rem;color:var(--dim);text-transform:uppercase;letter-spacing:1px;}
.shopeff{font-size:.72rem;color:#c9f5ff;line-height:1.3;}
.shopreq{font-size:.68rem;color:var(--dim);line-height:1.35;}
.shopbadge{display:inline-block;width:max-content;padding:3px 7px;border-radius:999px;
  background:#0c1620;border:1px solid #2d5672;color:#b9edf6;font-size:.62rem;letter-spacing:1px;text-transform:uppercase;}
.craftbtn{width:100%;margin-top:4px;padding:8px 10px;border:none;border-radius:6px;
  background:linear-gradient(135deg,#4b2f09,#c9a227 55%,#4b2f09);color:#0b0603;
  font-size:.72rem;letter-spacing:1px;text-transform:uppercase;font-weight:bold;cursor:pointer;}
.craftbtn:hover:not(:disabled){filter:brightness(1.1);}
.craftbtn:disabled{opacity:.4;cursor:not-allowed;}

.recipe{
  display:flex;
  flex-direction:column;
  gap:6px;
}
.reqs{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  align-items:flex-start;
}
.reqtok{
  width:44px;
  min-height:58px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  gap:4px;
  padding:5px 4px 4px;
  border-radius:9px;
  background:#0d0b08;
  border:1px solid #3c3427;
  color:#f5ead6;
  position:relative;
}
.reqtok.locked{
  opacity:.38;
  filter:grayscale(1);
}
.reqtok canvas{
  display:block;
}
.reqtok .qty{
  font-size:.62rem;
  line-height:1;
  letter-spacing:1px;
  color:var(--gold);
}
.reqtok .lbl{
  font-size:.52rem;
  line-height:1;
  color:var(--dim);
  text-transform:uppercase;
  letter-spacing:.6px;
  max-width:100%;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.recmeta{
  font-size:.66rem;
  color:var(--dim);
  line-height:1.25;
}

/* Rarity popup */
#popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
  background:var(--surf);border:1px solid var(--brd);border-radius:12px;
  padding:18px 24px;text-align:center;z-index:9999;
  min-width:210px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  box-shadow:0 0 28px rgba(0,0,0,.35);transition:transform .25s cubic-bezier(.34,1.56,.64,1);pointer-events:none;}
#popup.show{transform:translate(-50%,-50%) scale(1);}
#pop-canvas{display:block;margin:0;}
#pop-name{font-size:1.08rem;letter-spacing:1.5px;color:var(--gold);text-align:center;line-height:1.2;}
#pop-rar{font-size:.75rem;color:var(--dim);margin-top:1px;letter-spacing:1px;text-align:center;}

</style>
</head>
<body>

<div id="hdr">
  <div id="ttl">⛏ nodnalb</div>
  <div id="cred-box">
    <span style="color:var(--gold)">◈</span>
    <span id="cred-count">10</span>
    <span style="color:#7cf8ff">DD</span>
    <span id="dd-count">0</span>
    <span id="tmr"></span>
  </div>
</div>

<div id="tabs">
  <div class="tab on" id="tab-game" onclick="switchTab('game')">Dispenser</div>
  <div class="tab"    id="tab-gal"  onclick="switchTab('gal')">Inventory</div>
</div>

<div id="game">
  <div id="cwrap">
    <canvas id="c"></canvas>
    <div id="hint">Tap a ball to collect it</div>
  </div>
  <div id="rollbar">
    <span id="rcost">◈ 1 credit per roll</span>
    <button id="rbtn" onclick="roll()">ROLL</button>
  </div>
</div>

<div id="gal-view">
  <div id="inv-top">
    <div>
      <div id="inv-title">Inventory</div>
      <div id="inv-sub">Sell ores for DD. Credits stay separate and keep powering rolls.</div>
    </div>
    <div id="inv-actions">
      <div id="dd-pill">DD <b id="dd-pill-count">0</b></div>
      <div id="cycle-pill">Cycle <b id="cycle-count">30s</b></div>
      <button id="sellmode-btn" class="modebtn" onclick="toggleSellMode()">Sell 1</button>
    </div>
  </div>

  <div class="shophead">Ore Inventory</div>
  <div class="ggrid" id="ggrid"></div>

  <div class="shophead">Workshop Upgrades</div>
  <div class="shopgrid" id="shopgrid"></div>
</div>

<div id="popup">
  <canvas id="pop-canvas" width="80" height="80"></canvas>
  <div id="pop-name"></div>
  <div id="pop-rar"></div>
</div>

<script>
// ─── TYPES ────────────────────────────────────────────────────────────
const RNAMES = ['Common','Uncommon','Rare','Epic','Legendary','Mythic'];
const TYPES = [
  {id:'coal',       name:'Coal',        r:0, w:16,  style:'rock',   c:['#4a4540','#1e1a16','#0d0b09']},
  {id:'anthracite', name:'Anthracite',  r:0, w:12,  style:'rock',   c:['#433a35','#171310','#070605']},
  {id:'limestone',  name:'Limestone',   r:0, w:10,  style:'rock',   c:['#dad3c4','#9c927f','#65604f']},
  {id:'slate',      name:'Slate',       r:0, w:8,   style:'rock',   c:['#6a7078','#2c3138','#0f1115']},
  {id:'ash',        name:'Ash',         r:0, w:6,   style:'rock',   c:['#9c958c','#5e554b','#2b251f']},
  {id:'peat',       name:'Peat',        r:0, w:2,   style:'rock',   c:['#5d4a35','#3a2a1b','#1f1610']},
  {id:'mudstone',   name:'Mudstone',    r:0, w:1,   style:'rock',   c:['#7a5e47','#4a3827','#251a13']},

  {id:'iron',       name:'Iron',        r:1, w:7,   style:'metal',  c:['#d4cdc4','#9a9590','#6e6a65']},
  {id:'copper',     name:'Copper',      r:1, w:6,   style:'metal',  c:['#e8855a','#b85c30','#7a3318']},
  {id:'tin',        name:'Tin',         r:1, w:5,   style:'metal',  c:['#d7dbe0','#9ea8b2','#5b6774']},
  {id:'nickel',     name:'Nickel',      r:1, w:4,   style:'metal',  c:['#b8c2b0','#7f8d7b','#495347']},
  {id:'zinc',       name:'Zinc',        r:1, w:3,   style:'metal',  c:['#d8d0a8','#a79e67','#6c6338']},
  {id:'silver',     name:'Silver',      r:1, w:2,   style:'metal',  c:['#f2f4f7','#b3bcc6','#75818f']},
  {id:'lead',       name:'Lead',        r:1, w:2,   style:'metal',  c:['#8f98a8','#59606d','#2d3138']},
  {id:'sulfur',     name:'Sulfur',      r:1, w:1,   style:'toxic',  c:['#f6e66a','#c0a51a','#615000']},

  {id:'gold',       name:'Gold',        r:2, w:4,   style:'metal',  c:['#ffe87c','#d4a018','#6b4500']},
  {id:'lapis',      name:'Lapis',       r:2, w:3,   style:'gem',    c:['#4a7af0','#1a3aaa','#0a1a5a']},
  {id:'redstone',   name:'Redstone',    r:2, w:3,   style:'energy', c:['#ff6a40','#c01010','#580000']},
  {id:'quartz',     name:'Quartz',      r:2, w:2.5, style:'crystal',c:['#fff5f8','#f0d0dc','#a07090']},
  {id:'obsidian',   name:'Obsidian',    r:2, w:2,   style:'shadow', c:['#2a1a3a','#0d0814','#050308']},
  {id:'topaz',      name:'Topaz',       r:2, w:2,   style:'gem',    c:['#ffe0a0','#e89020','#a04000']},
  {id:'pyrite',     name:'Pyrite',      r:2, w:1.5, style:'metal',  c:['#d4c060','#a08820','#606010']},
  {id:'malachite',  name:'Malachite',   r:2, w:1.5, style:'gem',    c:['#7fffbb','#1fb06a','#065334']},
  {id:'hematite',   name:'Hematite',    r:2, w:1,   style:'metal',  c:['#d89a8a','#9c5b4b','#551f18']},
  {id:'bismuth',    name:'Bismuth',     r:2, w:1,   style:'crystal',c:['#8be3ff','#7d7bff','#ff7ab8']},

  {id:'amethyst',   name:'Amethyst',    r:3, w:1.8, style:'crystal',c:['#e0b0ff','#9040d0','#2a0060']},
  {id:'emerald',    name:'Emerald',     r:3, w:1.6, style:'gem',    c:['#80ffa0','#20c060','#023018']},
  {id:'diamond',    name:'Diamond',     r:3, w:1.4, style:'crystal',c:['#e8f8ff','#a0d8f8','#1050a0']},
  {id:'ruby',       name:'Ruby',        r:3, w:1.2, style:'gem',    c:['#ff8090','#d01030','#3a0008']},
  {id:'sapphire',   name:'Sapphire',    r:3, w:1,   style:'crystal',c:['#90b0ff','#2050e0','#020840']},
  {id:'titanium',   name:'Titanium',    r:3, w:1,   style:'metal',  c:['#c8d4e0','#7090a8','#182030']},
  {id:'peridot',    name:'Peridot',     r:3, w:0.8, style:'gem',    c:['#d8ff86','#7fd02a','#224800']},
  {id:'fluorite',   name:'Fluorite',    r:3, w:0.8, style:'crystal',c:['#ffd8ff','#b86cff','#3a1d6f']},

  {id:'opal',       name:'Opal',        r:4, w:0.9, style:'aurora', c:['#fff8f2','#f0e8f8','#d8d0e8']},
  {id:'netherite',  name:'Netherite',   r:4, w:0.8, style:'shadow', c:['#5a5055','#2a2028','#0f0d10']},
  {id:'plutonium',  name:'Plutonium',   r:4, w:0.6, style:'toxic',  c:['#b4ff6a','#30a010','#0a3a02']},
  {id:'iridium',    name:'Iridium',     r:4, w:0.5, style:'metal',  c:['#eef1f6','#90a0b5','#465065']},
  {id:'adamantite', name:'Adamantite',  r:4, w:0.4, style:'gem',    c:['#8cf0ff','#19b4d0','#04526c']},
  {id:'auric',      name:'Auric',       r:4, w:0.3, style:'metal',  c:['#fff0a8','#f0c14a','#725100']},

  {id:'void',       name:'Void',        r:5, w:0.3, style:'void',   c:['#200035','#080015','#000000']},
  {id:'celestial',  name:'Celestial',   r:5, w:0.25,style:'cosmic', c:['#1a0828','#080420','#020108']},
  {id:'singularity',name:'Singularity', r:5, w:0.2, style:'void',   c:['#0c0015','#040007','#000000']},
  {id:'mystery',    name:'Mystery',     r:4, w:0.28,style:'mystery', c:['#f2d27a','#9b6c1d','#3c2400']},
  {id:'aeon',       name:'Aeon',        r:5, w:0.15,style:'cosmic', c:['#0d1336','#17082f','#020108']},
  {id:'starcore',   name:'Starcore',    r:5, w:0.1, style:'energy', c:['#ffe8ff','#7cf8ff','#ff7ad9']},
];
const TOT_W = TYPES.reduce((s,t)=>s+t.w,0);
const PRICE_BY_RAR = [1, 4, 12, 35, 100, 300];
function orePrice(type){ return PRICE_BY_RAR[type.r] ?? 1; }
function pick(){let v=Math.random()*TOT_W;for(const t of TYPES){v-=t.w;if(v<=0)return t;}return TYPES[0];}

// ─── DRAW ─────────────────────────────────────────────────────────────
function clamp01(v){return Math.max(0,Math.min(1,v));}
function addStop(g, stops){for(const [o,c] of stops)g.addColorStop(o,c);return g;}
function drawSpecks(ctx,cx,cy,R,n,baseAlpha=0.16,palette=['#fff']){
  for(let i=0;i<n;i++){
    const a=i*2.39996323;
    const d=R*(0.1+0.75*((i*13)%17)/17);
    const sz=R*(0.02+0.03*((i*7)%5));
    const col=palette[i%palette.length];
    ctx.fillStyle=col.replace(')',`,${baseAlpha + ((i%3)*0.04)})`).replace('rgb(', 'rgba(');
    ctx.beginPath();ctx.arc(cx+Math.cos(a)*d,cy+Math.sin(a)*d,sz,0,Math.PI*2);ctx.fill();
  }
}
function drawFacets(ctx,cx,cy,R,lines=4,alpha=.35){
  ctx.strokeStyle=`rgba(255,255,255,${alpha})`;
  ctx.lineWidth=1;
  for(let i=0;i<lines;i++){
    const a=i*(Math.PI*2/lines)+.2;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(cx+Math.cos(a)*R*.76, cy+Math.sin(a)*R*.76);
    ctx.stroke();
  }
}
function drawCoreGlow(ctx,cx,cy,R,colors,throb=0){
  const g=ctx.createRadialGradient(cx,cy,0,cx,cy,R);
  addStop(g, [[0,colors[0]], [.42,colors[1]], [1,colors[2]]]);
  ctx.fillStyle=g;
  ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fill();
  const hg=ctx.createRadialGradient(cx,cy,0,cx,cy,R*.85);
  addStop(hg, [[0,`rgba(255,255,255,${.12+.05*Math.sin(throb)})`],[.55,'rgba(255,255,255,0)'],[1,'rgba(255,255,255,0)']]);
  ctx.fillStyle=hg;ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fill();
}
const STYLES = {
  rock(ctx,cx,cy,R,t,tp){
    const c=tp.c;
    const g=ctx.createRadialGradient(cx-R*.28,cy-R*.3,0,cx,cy,R);
    addStop(g, [[0,c[0]], [.5,c[1]], [1,c[2]]]);
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.06)';ctx.lineWidth=1;
    for(let i=0;i<3;i++){
      const a=i*2.2+t*.08;
      ctx.beginPath();
      ctx.moveTo(cx-Math.cos(a)*R*.36,cy-Math.sin(a)*R*.18);
      ctx.lineTo(cx+Math.cos(a*1.12)*R*.42,cy+Math.sin(a*1.12)*R*.38);
      ctx.stroke();
    }
    ctx.strokeStyle='rgba(0,0,0,.28)';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(cx,cy,R*.72,0,Math.PI*2);ctx.stroke();
  },
  metal(ctx,cx,cy,R,t,tp){
    const c=tp.c;
    const g=ctx.createRadialGradient(cx-R*.2,cy-R*.22,0,cx,cy,R);
    addStop(g, [[0,c[0]], [.42,c[1]], [1,c[2]]]);
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.12)';ctx.lineWidth=1;
    for(let i=-2;i<=2;i++){
      ctx.beginPath();
      ctx.moveTo(cx-R,cy+i*R*.24);
      ctx.lineTo(cx+R,cy+i*R*.24);
      ctx.stroke();
    }
    const h=ctx.createLinearGradient(cx-R,cy-R,cx+R,cy+R);
    addStop(h, [[0,'rgba(255,255,255,0)'], [.48,'rgba(255,255,255,0)'], [.52,'rgba(255,255,255,.22)'], [1,'rgba(255,255,255,0)']]);
    ctx.fillStyle=h;ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fill();
  },
  gem(ctx,cx,cy,R,t,tp){
    const c=tp.c;

    for(let i=0;i<6;i++){

      ctx.beginPath();ctx.arc(cx+Math.cos(a)*d,cy+Math.sin(a)*d,R*.04,0,Math.PI*2);ctx.fill();
    }
  },
  toxic(ctx,cx,cy,R,t,tp){
    const c=tp.c;
    const g=ctx.createRadialGradient(cx-R*.15,cy-R*.18,0,cx,cy,R);
    addStop(g, [[0,c[0]], [.45,c[1]], [1,c[2]]]);
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fill();
    const fog=ctx.createRadialGradient(cx,cy,R*.15,cx,cy,R);

    ctx.fillStyle=fog;ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fill();
    for(let i=0;i<5;i++){

      ctx.fillStyle=`rgba(210,255,120,${.14+.1*Math.sin(t*2+i)})`;
      ctx.beginPath();ctx.arc(cx+Math.cos(a)*d,cy+Math.sin(a)*d,R*(.04+.01*(i%3)),0,Math.PI*2);ctx.fill();
    }
  },
  shadow(ctx,cx,cy,R,t,tp){
    const c=tp.c;
    const g=ctx.createRadialGradient(cx,cy,0,cx,cy,R);
    addStop(g, [[0,c[0]], [.45,c[1]], [1,c[2]]]);

    const rim=ctx.createRadialGradient(cx,cy,R*.52,cx,cy,R);

    for(let i=0;i<8;i++){

      ctx.fillStyle=`rgba(120,80,255,${.18+.1*Math.sin(t+i)})`;
      ctx.beginPath();ctx.arc(cx+Math.cos(a)*d,cy+Math.sin(a)*d,R*(.028+.012*(i%2)),0,Math.PI*2);ctx.fill();

  void(ctx,cx,cy,R,t,tp){

    for(let i=0;i<10;i++){

      const d=R*(.12+.36*(i/10));
      ctx.fillStyle=`rgba(${40+i*10},0,${90+i*12},${.24+.18*Math.abs(Math.sin(t+i))})`;
      ctx.beginPath();ctx.arc(cx+Math.cos(a)*d,cy+Math.sin(a)*d,R*(.03+.015*(i%3)),0,Math.PI*2);ctx.fill();
    }
    ctx.strokeStyle='rgba(255,255,255,.08)';ctx.lineWidth=1;

  },
  cosmic(ctx,cx,cy,R,t,tp){
    const c=tp.c;

    addStop(g, [[0,c[0]], [.45,c[1]], [1,c[2]]]);

    addStop(neb, [[0,'rgba(120,200,255,.28)'], [.4,'rgba(220,100,255,.16)'], [1,'rgba(40,80,200,0)']]);
    ctx.fillStyle=neb;ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fill();
    for(let i=0;i<14;i++){

    ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fill();

  mystery(ctx,cx,cy,R,t,tp){

    addStop(g, [[0,`rgba(255,245,180,${pulse})`], [.42,c[0]], [1,c[2]]]);
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(255,235,170,.75)';ctx.lineWidth=1.4;
    ctx.beginPath();ctx.arc(cx,cy,R*.62,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.arc(cx,cy,R*.88,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,.55)';
    ctx.font=`bold ${Math.max(12,R*.9)}px Georgia, serif`;
    ctx.textAlign='center';

};
function drawBall(ctx, id, cx, cy, R, t=0){
  const tp=TYPES.find(x=>x.id===id) || TYPES[0];
  const fn = STYLES[tp.style] || STYLES.rock;
  ctx.save();
  ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.clip();
  fn(ctx,cx,cy,R,t,tp);
  // specular
  if(id!=='void'){
    const h=ctx.createRadialGradient(cx-R*.3,cy-R*.38,0,cx-R*.15,cy-R*.2,R*.6);
    h.addColorStop(0,'rgba(255,255,255,.38)');h.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=h;ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
  // glow ring for rare+
  const rar=tp.r;
  if(rar>=3){
    const rc=['','','','rgba(80,110,255,.7)','rgba(255,60,200,.8)','rgba(255,215,0,.9)'][rar];
    ctx.save();ctx.strokeStyle=rc;ctx.lineWidth=1.5;
    ctx.shadowColor=rc;ctx.shadowBlur=10;
    ctx.beginPath();ctx.arc(cx,cy,R+1,0,Math.PI*2);ctx.stroke();ctx.restore();
  }
}

// ─── PHYSICS ──────────────────────────────────────────────────────────
const GR=0.46, BNC=0.46, FRC=0.984, BR=26;
let balls=[], gtime=0;

const cv=document.getElementById('c');
function logW(){return cv.width/(window.devicePixelRatio||1);}
function logH(){return cv.height/(window.devicePixelRatio||1);}

function mkBall(type){
  return {type,x:logW()/2+(Math.random()-.5)*8,y:88,vx:(Math.random()-.5)*1.5,vy:.5,r:BR,collected:false};
}

function step(){
  const W=logW(), H=logH(), floor=H-BR-8;
  for(const b of balls){
    if(b.collected)continue;
    b.vy+=GR; b.x+=b.vx; b.y+=b.vy;
    if(b.y>=floor){b.y=floor;b.vy*=-BNC;b.vx*=FRC;if(Math.abs(b.vy)<0.8)b.vy=0;}
    if(b.x-b.r<0){b.x=b.r;b.vx=Math.abs(b.vx)*.65;}
    if(b.x+b.r>W){b.x=W-b.r;b.vx=-Math.abs(b.vx)*.65;}
    if(b.y-b.r<0){b.y=b.r;b.vy=Math.abs(b.vy)*.5;}
    for(const b2 of balls){
      if(b2===b||b2.collected)continue;
      const dx=b2.x-b.x, dy=b2.y-b.y, dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<b.r+b2.r&&dist>0){
        const nx=dx/dist, ny=dy/dist, ov=(b.r+b2.r-dist)/2;
        b.x-=nx*ov;b.y-=ny*ov;b2.x+=nx*ov;b2.y+=ny*ov;
        const rv=(b.vx-b2.vx)*nx+(b.vy-b2.vy)*ny;
        if(rv>0){b.vx-=rv*nx*.5;b.vy-=rv*ny*.5;b2.vx+=rv*nx*.5;b2.vy+=rv*ny*.5;}
      }
    }
  }
  balls=balls.filter(b=>!b.collected);
}

// ─── RENDER ───────────────────────────────────────────────────────────
function render(){
  const ctx=cv.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const W=logW(), H=logH();
  ctx.save(); ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,H);

  // bg
  ctx.fillStyle='#080604'; ctx.fillRect(0,0,W,H);

  // subtle grid
  ctx.strokeStyle='rgba(50,38,20,.4)'; ctx.lineWidth=1;
  for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  // floor glow
  const fg=ctx.createLinearGradient(0,H-50,0,H);
  fg.addColorStop(0,'rgba(201,162,39,0)'); fg.addColorStop(1,'rgba(201,162,39,.12)');
  ctx.fillStyle=fg; ctx.fillRect(0,H-50,W,50);
  ctx.strokeStyle='rgba(201,162,39,.3)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(0,H-8); ctx.lineTo(W,H-8); ctx.stroke();

  // dispenser chute
  const dx=W/2;
  ctx.strokeStyle='#3a2e1a'; ctx.lineWidth=4;
  ctx.beginPath(); ctx.moveTo(dx-18,0); ctx.lineTo(dx-18,88); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(dx+18,0); ctx.lineTo(dx+18,88); ctx.stroke();
  ctx.fillStyle='#1a1208';
  ctx.fillRect(dx-22,-4,44,20);
  ctx.strokeStyle='#4a3a1c'; ctx.lineWidth=2;
  ctx.strokeRect(dx-22,-4,44,20);

  // balls
  for(const b of balls) drawBall(ctx, b.type.id, b.x, b.y, b.r, gtime);

  ctx.restore();
  gtime+=0.016;
}

function resizeCv(){
  const dpr=window.devicePixelRatio||1;
  const wrap=document.getElementById('cwrap');
  const W=wrap.clientWidth, H=wrap.clientHeight;
  if(cv.width!==W*dpr||cv.height!==H*dpr){cv.width=W*dpr;cv.height=H*dpr;}
}

function loop(){resizeCv();step();render();requestAnimationFrame(loop);}

// ─── INTERACTION ──────────────────────────────────────────────────────
function getXY(e,rect){
  const dpr=window.devicePixelRatio||1;
  const sx=cv.width/rect.width, sy=cv.height/rect.height;
  return[(e.clientX-rect.left)*sx/dpr, (e.clientY-rect.top)*sy/dpr];
}

cv.addEventListener('click',e=>{
  const rect=cv.getBoundingClientRect();
  const[x,y]=getXY(e,rect);
  for(let i=balls.length-1;i>=0;i--){
    const b=balls[i];
    if(!b.collected){
      const dx=b.x-x, dy=b.y-y;
      if(dx*dx+dy*dy<b.r*b.r){
        b.collected=true;
        if(b.type.id === 'mystery'){
          const gain = 5 + Math.floor(Math.random()*26); // 5-30 inclusive
          S.credits += gain;
          S.mysteryLock = {grant: gain, spent: 0};
          save();
          updateUI();
          showPopup(b.type, {title:`BONUS +${gain} CREDITS`, color:'#7cf8ff', sub:'Mystery reward'});
        }else{
          addToCollection(b.type);
          showPopup(b.type);
        }
        break;
      }
    }
  }
});
cv.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.changedTouches[0];
  cv.dispatchEvent(new MouseEvent('click',{clientX:t.clientX,clientY:t.clientY}));
},{passive:false});

let popTimer=null;
function showPopup(type, opts={}){
  const pop=document.getElementById('popup');
  const pc=document.getElementById('pop-canvas');
  const ctx=pc.getContext('2d');
  ctx.clearRect(0,0,80,80);
  drawBall(ctx,type.id,40,40,36,gtime);
  const nameEl=document.getElementById('pop-name');
  const rarEl=document.getElementById('pop-rar');
  nameEl.textContent=(opts.title || type.name).toUpperCase();
  nameEl.style.color=opts.color || ['#888','#bbb','#4ac','#88f','#f5a','#fd0'][type.r] || '#d4b896';
  rarEl.textContent=opts.sub || RNAMES[type.r];
  pop.classList.add('show');
  clearTimeout(popTimer);
  popTimer=setTimeout(()=>pop.classList.remove('show'),1600);
}

// ─── STATE & CREDITS ──────────────────────────────────────────────────
let S={credits:10,dd:0,col:{},upgrades:[],sellAllMode:false,mysteryLock:null,lastSeen:Date.now(),nextIn:30};
let nextIn=30;

const UPGRADE_ITEMS = [
  {id:'clockwork',   name:'Clockwork Module',  tier:'I',   reduce:3, dd:25,  mats:{coal:4, iron:2, copper:2}, effect:'Reduces credit wait by 3s.'},
  {id:'brassgov',    name:'Brass Governor',    tier:'II',  reduce:3, dd:50,  mats:{clockwork:1, tin:10, zinc:10, gold:4}, effect:'Reduces credit wait by 3s.'},
  {id:'silvercap',   name:'Silver Capacitor',  tier:'III', reduce:4, dd:80,  mats:{brassgov:1, silver:12, quartz:8, lapis:4}, effect:'Reduces credit wait by 4s.'},
  {id:'arcreg',      name:'Arcane Regulator',  tier:'IV',  reduce:4, dd:140, mats:{silvercap:1, amethyst:6, topaz:4, redstone:12}, effect:'Reduces credit wait by 4s.'},
  {id:'corestab',    name:'Core Stabilizer',   tier:'V',   reduce:3, dd:260, mats:{arcreg:1, diamond:6, titanium:4, emerald:3}, effect:'Reduces credit wait by 3s.'},
  {id:'chrono',      name:'Chrono Furnace',    tier:'VI',  reduce:3, dd:500, mats:{corestab:1, opal:3, netherite:2, void:1, celestial:1}, effect:'Reduces credit wait by 3s.'},
  {id:'singularity', name:'Singularity Engine', tier:'VII',reduce:2, dd:900, mats:{chrono:1, singularity:1, aeon:1, starcore:1, plutonium:4}, effect:'Reduces credit wait by 2s.'},
];

function getOreLabel(id){
  if(id in UPGRADE_INDEX) return UPGRADE_INDEX[id].name;
  const t=TYPES.find(x=>x.id===id);
  return t?t.name:id;
}
const UPGRADE_INDEX = Object.fromEntries(UPGRADE_ITEMS.map(u=>[u.id,u]));

function getCraftedCount(){ return Array.isArray(S.upgrades) ? S.upgrades.length : 0; }

function getOwnedAmount(id){
  if(id in UPGRADE_INDEX) return (S.upgrades||[]).includes(id) ? 1 : 0;
  return S.col[id] || 0;
}

function hasRequirement(id, amt){
  return getOwnedAmount(id) >= amt;
}

function getReqLabel(id){
  if(id in UPGRADE_INDEX) return UPGRADE_INDEX[id].name;
  const t=TYPES.find(x=>x.id===id);
  return t ? t.name : id;
}

function getCreditInterval(){
  const reduce = (S.upgrades||[]).reduce((sum,id)=>sum + (UPGRADE_INDEX[id]?.reduce||0),0);
  return Math.max(8, 30 - reduce);
}


function getMysteryLock(){
  if(!S.mysteryLock || typeof S.mysteryLock!=='object') return null;
  if(!Number.isFinite(S.mysteryLock.grant) || S.mysteryLock.grant<=0) return null;
  if(!Number.isFinite(S.mysteryLock.spent)) S.mysteryLock.spent = 0;
  if(S.mysteryLock.spent >= S.mysteryLock.grant){
    S.mysteryLock = null;
    return null;
  }
  return S.mysteryLock;
}

function mysteryAllowed(){
  return !getMysteryLock();
}

function pickWithoutMystery(){
  let t = pick();
  if(t.id==='mystery'){
    const non = TYPES.filter(x=>x.id!=='mystery');
    const total = non.reduce((s,x)=>s+x.w,0);
    let v=Math.random()*total;
    for(const x of non){ v-=x.w; if(v<=0) return x; }
    return non[0] || TYPES[0];
  }
  return t;
}

function syncTimerToInterval(){
  const iv = getCreditInterval();
  if(!Number.isFinite(nextIn) || nextIn<=0) nextIn = iv;
  nextIn = Math.min(nextIn, iv);
  S.nextIn = nextIn;
}

function save(){
  S.lastSeen=Date.now();
  S.nextIn=nextIn;
  try{localStorage.setItem('ore_g1',JSON.stringify(S));}catch(e){}
}

function load(){
  try{
    const raw=localStorage.getItem('ore_g1');
    if(raw){
      const parsed=JSON.parse(raw);
      S={...S,...parsed,col:{...S.col,...(parsed.col||{})}};
      if(!Array.isArray(S.upgrades)) S.upgrades=[];
      if(typeof S.sellAllMode!=='boolean') S.sellAllMode=false;
      if(typeof S.dd!=='number' || !Number.isFinite(S.dd)) S.dd=0;
      if(typeof S.credits!=='number' || !Number.isFinite(S.credits)) S.credits=10;
      if(typeof S.lastSeen!=='number' || !Number.isFinite(S.lastSeen)) S.lastSeen=Date.now();
      if(S.mysteryLock && typeof S.mysteryLock==='object'){
        if(!Number.isFinite(S.mysteryLock.grant) || S.mysteryLock.grant<=0 || S.mysteryLock.spent>=S.mysteryLock.grant){
          S.mysteryLock = null;
        }else{
          if(!Number.isFinite(S.mysteryLock.spent)) S.mysteryLock.spent = 0;
        }
      }else{
        S.mysteryLock = null;
      }
      const secs=(Date.now()-S.lastSeen)/1000;
      const earn=Math.floor(secs/Math.max(1,getCreditInterval()));
      if(earn>0){S.credits+=earn;S.lastSeen=Date.now();}
      nextIn = typeof S.nextIn==='number' && Number.isFinite(S.nextIn) ? S.nextIn : getCreditInterval();
      syncTimerToInterval();
    } else {
      nextIn = getCreditInterval();
      syncTimerToInterval();
    }
  }catch(e){
    nextIn = getCreditInterval();
    syncTimerToInterval();
  }
}

function addToCollection(type){
  S.col[type.id]=(S.col[type.id]||0)+1;
  save(); updateUI();
  if(document.getElementById('gal-view').style.display==='block'){ buildInventory(); buildWorkshop(); }
}

function sellOre(id, amount=1){
  const type=TYPES.find(t=>t.id===id);
  const have=S.col[id]||0;
  if(!type || have<amount || amount<=0) return false;
  S.col[id]=have-amount;
  if(S.col[id]<=0) delete S.col[id];
  S.dd += orePrice(type)*amount;
  save();
  updateUI();
  if(document.getElementById('gal-view').style.display==='block'){ buildInventory(); buildWorkshop(); }
  return true;
}

function toggleSellMode(){
  S.sellAllMode=!S.sellAllMode;
  save(); updateUI();
  buildInventory();
}

function canCraftUpgrade(up){
  const idx = UPGRADE_ITEMS.findIndex(u=>u.id===up.id);
  if(idx!==getCraftedCount()) return false;
  if(S.dd < up.dd) return false;
  for(const [id,amt] of Object.entries(up.mats)){
    if(id in UPGRADE_INDEX){
      if(!S.upgrades.includes(id)) return false;
    }else if((S.col[id]||0) < amt){
      return false;
    }
  }
  return true;
}

function consumeMaterials(mats){
  for(const [id,amt] of Object.entries(mats)){
    if(id in UPGRADE_INDEX) continue;
    S.col[id] = (S.col[id]||0) - amt;
    if(S.col[id] <= 0) delete S.col[id];
  }
}

function craftUpgrade(id){
  const up = UPGRADE_INDEX[id];
  if(!up) return false;
  const idx = UPGRADE_ITEMS.findIndex(u=>u.id===id);
  if(idx!==getCraftedCount()) return false;
  if(!canCraftUpgrade(up)) return false;

  S.dd -= up.dd;
  consumeMaterials(up.mats);
  S.upgrades.push(id);
  syncTimerToInterval();
  save(); updateUI();
  buildInventory();
  buildWorkshop();
  return true;
}

function updateUI(){
  document.getElementById('cred-count').textContent=S.credits;
  document.getElementById('dd-count').textContent=S.dd;
  const pill=document.getElementById('dd-pill-count');
  if(pill) pill.textContent=S.dd;
  const cyc=document.getElementById('cycle-count');
  if(cyc) cyc.textContent=`${getCreditInterval()}s`;
  const sellBtn=document.getElementById('sellmode-btn');
  if(sellBtn){
    sellBtn.textContent=S.sellAllMode?'Sell All':'Sell 1';
    sellBtn.classList.toggle('on', S.sellAllMode);
  }
  document.getElementById('rbtn').disabled=S.credits<1;
  document.getElementById('tmr').textContent=`+1 in ${Math.max(0,Math.ceil(nextIn))}s`;
}

// Credit timer
setInterval(()=>{
  const iv = getCreditInterval();
  if(nextIn > iv) nextIn = iv;
  nextIn--;
  if(nextIn<=0){
    nextIn=iv;
    S.credits++;
    save();
    updateUI();
  }else{
    S.nextIn = nextIn;
  }
  document.getElementById('tmr').textContent=`+1 in ${Math.max(0,Math.ceil(nextIn))}s`;
  updateUI();
},1000);

// ─── ROLL ─────────────────────────────────────────────────────────────
function roll(){
  if(S.credits<1)return;
  S.credits--;
  if(getMysteryLock()){
    S.mysteryLock.spent = Math.min(S.mysteryLock.grant, (S.mysteryLock.spent||0)+1);
    if(S.mysteryLock.spent >= S.mysteryLock.grant) S.mysteryLock = null;
  }
  save();updateUI();
  const type = mysteryAllowed() ? pick() : pickWithoutMystery();
  balls.push(mkBall(type));
}

// ─── INVENTORY / SHOP ────────────────────────────────────────────────
function buildInventory(){
  const grid=document.getElementById('ggrid');
  grid.innerHTML='';
  const col=TYPES.filter(t=>S.col[t.id]);
  if(!col.length){
    grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--dim);font-size:.8rem">No ores collected yet.<br>Tap balls in the dispenser to start filling your inventory!</div>';
    return;
  }
  col.sort((a,b)=>b.r-a.r||S.col[b.id]-S.col[a.id]);
  for(const type of col){
    const cnt=S.col[type.id];
    const price=orePrice(type);
    const div=document.createElement('div');
    div.className=`gi r${type.r}`;
    const c=document.createElement('canvas');
    c.width=60;c.height=60;c.dataset.tid=type.id;
    const ctx=c.getContext('2d');
    drawBall(ctx,type.id,30,30,26,gtime);
    div.appendChild(c);

    const gr=document.createElement('div');gr.className='gr';gr.textContent=RNAMES[type.r];
    const gc=document.createElement('div');gc.className='gc';gc.textContent=`${price} DD each`;
    const cntEl=document.createElement('div');cntEl.className='cnt';cntEl.textContent=`Owned ×${cnt}`;
    const nameEl=document.createElement('div');nameEl.className='gname';nameEl.textContent=type.name;

    const btn=document.createElement('button');
    btn.className='sellbtn';
    btn.textContent=S.sellAllMode ? 'Sell All' : 'Sell 1';
    btn.disabled=cnt<1;
    btn.addEventListener('click',()=>{
      sellOre(type.id, S.sellAllMode ? (S.col[type.id]||0) : 1);
    });

    div.appendChild(gr);
    div.appendChild(gc);
    div.appendChild(cntEl);
    div.appendChild(nameEl);
    div.appendChild(btn);
    grid.appendChild(div);
  }
}

function makeMiniBall(id, size=28){
  const c=document.createElement('canvas');
  c.width=size; c.height=size;
  const ctx=c.getContext('2d');
  const type = TYPES.find(t=>t.id===id);
  if(type){
    drawBall(ctx, id, size/2, size/2, size/2 - 2, gtime);
  }else{
    ctx.clearRect(0,0,size,size);
    const g=ctx.createRadialGradient(size*0.3,size*0.3,0,size/2,size/2,size/2);
    g.addColorStop(0,'#4b4f57');
    g.addColorStop(.5,'#2b2f35');
    g.addColorStop(1,'#111418');
    ctx.fillStyle=g;
    ctx.beginPath();ctx.arc(size/2,size/2,size/2-2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.75)';
    ctx.font=`bold ${Math.max(10, size*0.28)}px Georgia, serif`;
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText('⚙', size/2, size/2+1);
  }
  return c;
}

function makeRecipeToken(id, amt){
  const tok=document.createElement('div');
  tok.className='reqtok';
  const enough = hasRequirement(id, amt);
  if(!enough) tok.classList.add('locked');

  const icon = makeMiniBall(id, 28);
  tok.appendChild(icon);

  const qty=document.createElement('div');
  qty.className='qty';
  qty.textContent=`×${amt}`;
  tok.appendChild(qty);

  const lbl=document.createElement('div');
  lbl.className='lbl';
  lbl.textContent=getReqLabel(id);
  tok.appendChild(lbl);

  return tok;
}

function buildRecipeRow(mats){
  const wrap=document.createElement('div');
  wrap.className='recipe';
  const row=document.createElement('div');
  row.className='reqs';
  for(const [id,amt] of Object.entries(mats)){
    row.appendChild(makeRecipeToken(id, amt));
  }
  wrap.appendChild(row);
  return wrap;
}

function recipeToText(mats){
  return Object.entries(mats).map(([id,amt])=>{
    const name = getOreLabel(id);
    return `${amt} ${name}`;
  }).join(' · ');
}

function buildWorkshop(){
  const grid=document.getElementById('shopgrid');
  grid.innerHTML='';
  const crafted = getCraftedCount();

  for(let i=0;i<UPGRADE_ITEMS.length;i++){
    const up=UPGRADE_ITEMS[i];
    const owned = S.upgrades.includes(up.id);
    const active = i===crafted;
    const locked = i>crafted;

    const card=document.createElement('div');
    card.className=`shopcard ${owned?'owned':''} ${locked?'locked':''}`;

    const badge=document.createElement('div');
    badge.className='shopbadge';
    badge.textContent = owned ? 'Crafted' : (active ? 'Available' : `Tier ${up.tier}`);
    card.appendChild(badge);

    const name=document.createElement('div');
    name.className='shopname';
    name.textContent = up.name;
    card.appendChild(name);

    const meta=document.createElement('div');
    meta.className='shopmeta';
    meta.textContent = `Tier ${up.tier} · -${up.reduce}s credit wait`;
    card.appendChild(meta);

    const eff=document.createElement('div');
    eff.className='shopeff';
    eff.textContent = up.effect;
    card.appendChild(eff);

    const req=document.createElement('div');
    req.className='shopreq';
    if(owned){
      req.textContent = 'Already installed. The factory cycle bonus is active.';
    }else if(locked){
      req.textContent = `Locked. Craft ${UPGRADE_ITEMS[i-1].name} first.`;
    }else{
      const recipeWrap = buildRecipeRow(up.mats);
      req.appendChild(recipeWrap);
      const metaLine = document.createElement('div');
      metaLine.className='recmeta';
      metaLine.textContent = `Recipe icons show what you need. Grey means you do not have enough yet. Cost: ${up.dd} DD`;
      req.appendChild(metaLine);
    }
    card.appendChild(req);

    const btn=document.createElement('button');
    btn.className='craftbtn';
    if(owned){
      btn.textContent='Crafted';
      btn.disabled=true;
    }else if(locked){
      btn.textContent='Locked';
      btn.disabled=true;
    }else{
      btn.textContent=`Craft for ${up.dd} DD`;
      btn.disabled=!canCraftUpgrade(up);
      btn.addEventListener('click',()=>craftUpgrade(up.id));
    }
    card.appendChild(btn);

    grid.appendChild(card);
  }
}

// Animate inventory
setInterval(()=>{
  if(document.getElementById('gal-view').style.display==='block'){
    document.querySelectorAll('#ggrid canvas[data-tid]').forEach(c=>{
      const ctx=c.getContext('2d');
      ctx.clearRect(0,0,60,60);
      drawBall(ctx,c.dataset.tid,30,30,26,gtime);
    });
  }
},50);

// ─── TABS ─────────────────────────────────────────────────────────────
function switchTab(tab){
  document.getElementById('game').style.display=tab==='game'?'flex':'none';
  document.getElementById('gal-view').style.display=tab==='gal'?'block':'none';
  document.getElementById('tab-game').className='tab'+(tab==='game'?' on':'');
  document.getElementById('tab-gal').className='tab'+(tab==='gal'?' on':'');
  if(tab==='gal'){buildInventory();buildWorkshop();}
}

// ─── PWA ──────────────────────────────────────────────────────────────
// Manifest via blob
const mf={name:'nodnalb',short_name:'nodnalb',start_url:'.',display:'standalone',
  background_color:'#080604',theme_color:'#080604',
  icons:[{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23c9a227'/%3E%3Ctext x='50' y='65' font-size='40' text-anchor='middle'%3E⛏%3C/text%3E%3C/svg%3E",sizes:'any',type:'image/svg+xml'}]};
const ml=document.createElement('link');
ml.rel='manifest';ml.href=URL.createObjectURL(new Blob([JSON.stringify(mf)],{type:'application/manifest+json'}));
document.head.appendChild(ml);

// Service worker
if('serviceWorker' in navigator){
  const sw=`self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>self.clients.claim());self.addEventListener('fetch',e=>e.respondWith(fetch(e.request).catch(()=>caches.match(e.request))));`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'text/javascript'}))).catch(()=>{});
}

// Prevent iPad/iPhone gesture zoom and text selection quirks
document.addEventListener('gesturestart',e=>e.preventDefault(),{passive:false});
document.addEventListener('gesturechange',e=>e.preventDefault(),{passive:false});
document.addEventListener('gestureend',e=>e.preventDefault(),{passive:false});
document.addEventListener('selectstart',e=>e.preventDefault());
document.addEventListener('dblclick',e=>e.preventDefault());

// ─── INIT ─────────────────────────────────────────────────────────────
load();updateUI();
loop();
</script>
